<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>海之契約：離岸之爭 預告片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-dark: #010409;
            --sea-deep: #051923;
            --sea-mid: #003554;
            --sea-glow: #2dd4bf;
            --contract-cyan: rgba(45, 212, 191, 0.4);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
        }

        body {
            margin: 0;
            background-color: var(--sea-dark);
            color: white;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        .viewport {
            width: 100vw;
            height: calc(var(--vh, 1vh) * 100);
            position: relative;
            background: radial-gradient(circle at center, var(--sea-mid) 0%, var(--sea-dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--sea-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .boot-btn {
            border: 1px solid var(--sea-glow);
            padding: 20px 60px;
            color: var(--sea-glow);
            text-transform: uppercase;
            letter-spacing: 0.6em;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(45, 212, 191, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .boot-btn:hover {
            background: var(--sea-glow);
            color: var(--sea-dark);
            box-shadow: 0 0 50px var(--sea-glow);
            letter-spacing: 0.8em;
        }

        .boot-btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 70px rgba(45, 212, 191, 0.95), inset 0 0 18px rgba(255, 255, 255, 0.28);
        }

        .touch-ripple {
            position: fixed;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(45, 212, 191, 0.9);
            border-radius: 999px;
            transform: translate(-50%, -50%);
            animation: touch-ripple-expand 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 1200;
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.6);
        }

        @keyframes touch-ripple-expand {
            0% {
                opacity: 0.85;
                transform: translate(-50%, -50%) scale(0.4);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(5);
            }
        }

        .boot-kicker {
            color: rgba(45, 212, 191, 0.55);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .boot-title-main {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(2.6rem, 7vw, 6.2rem);
            letter-spacing: 0.28em;
            line-height: 1.2;
            text-align: center;
            color: #f8ffff;
            text-shadow: 0 0 24px rgba(45, 212, 191, 0.65), 0 0 80px rgba(0, 53, 84, 0.8);
            margin-bottom: 18px;
            padding-left: 0.28em;
        }

        .boot-title-sub {
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255, 255, 255, 0.28);
            font-size: 11px;
            letter-spacing: 0.65em;
            text-transform: uppercase;
            margin-bottom: 44px;
        }

        .boot-seal {
            width: 72%;
            max-width: 760px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.8), transparent);
            box-shadow: 0 0 24px rgba(45, 212, 191, 0.8);
            margin-bottom: 42px;
        }

        #opening-visual {
            position: fixed;
            inset: 0;
            z-index: 80;
            background: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
        }

        #opening-visual.active {
            opacity: 1;
        }

        #opening-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.08) saturate(1.08) brightness(0.9);
        }

        #gameplay-visual {
            position: fixed;
            inset: 0;
            z-index: 35;
            background: #010409;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.85s ease, filter 0.85s ease;
            overflow: hidden;
        }

        #gameplay-visual.active {
            opacity: 1;
        }

        #gameplay-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.08) saturate(1.05) brightness(0.82);
            transform: scale(1.015);
        }

        .gameplay-veil {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0, 53, 84, 0.06), rgba(1, 4, 9, 0.52) 75%),
                linear-gradient(180deg, rgba(1, 4, 9, 0.12), rgba(1, 4, 9, 0.56));
            box-shadow: inset 0 0 120px rgba(1, 4, 9, 0.88);
            pointer-events: none;
        }

        .gameplay-corner {
            position: absolute;
            left: 42px;
            top: 42px;
            color: rgba(125, 255, 242, 0.68);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            text-shadow: 0 0 18px rgba(45, 212, 191, 0.8);
            pointer-events: none;
        }

        #gameplay-visual::after {
            content: '';
            position: absolute;
            inset: 28px;
            border: 1px solid rgba(45, 212, 191, 0.18);
            box-shadow: inset 0 0 34px rgba(45, 212, 191, 0.07), 0 0 28px rgba(45, 212, 191, 0.08);
            pointer-events: none;
        }

        .opening-frame {
            position: absolute;
            inset: 34px;
            border: 1px solid rgba(45, 212, 191, 0.35);
            box-shadow: inset 0 0 40px rgba(45, 212, 191, 0.08), 0 0 40px rgba(45, 212, 191, 0.08);
            pointer-events: none;
        }

        .opening-caption {
            position: absolute;
            left: 48px;
            bottom: 44px;
            color: rgba(224, 255, 252, 0.78);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            text-shadow: 0 0 18px rgba(45, 212, 191, 0.65);
        }

        .team-title {
            max-width: 980px;
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(1.7rem, 4.4vw, 4.5rem) !important;
            letter-spacing: 0.25em !important;
            line-height: 1.45;
            padding-left: 0.25em;
            color: #f7ffff;
            text-shadow: 0 0 24px rgba(45, 212, 191, 0.72), 0 0 80px rgba(45, 212, 191, 0.25);
            white-space: pre-line;
        }

        .system-timer {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 100;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }

        .timer-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px var(--contract-cyan);
            font-variant-numeric: tabular-nums;
        }

        .grid-3d {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(var(--contract-cyan) 1px, transparent 1px),
                linear-gradient(90deg, var(--contract-cyan) 1px, transparent 1px);
            background-size: 100px 100px;
            transform: rotateX(75deg) translateZ(-100px);
            opacity: 0.08;
            z-index: 1;
            animation: sea-flow 30s linear infinite;
        }

        @keyframes sea-flow {
            0% {
                transform: rotateX(75deg) translateY(0);
            }

            100% {
                transform: rotateX(75deg) translateY(100px);
            }
        }

        .dialogue-window {
            width: 85%;
            max-width: 850px;
            background: rgba(2, 8, 15, 0.85);
            backdrop-filter: blur(20px);
            border-left: 4px solid var(--sea-glow);
            padding: 35px 45px;
            position: absolute;
            bottom: 15%;
            opacity: 0;
            transform: translateY(30px) rotateX(10deg);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .dialogue-window.active {
            opacity: 1;
            transform: translateY(0) rotateX(0deg);
        }

        #text-content {
            font-size: clamp(1.75rem, 2.65vw, 2.45rem) !important;
            line-height: 1.48 !important;
            letter-spacing: 0.075em !important;
        }

        .speaker-container {
            position: absolute;
            top: -15px;
            left: 40px;
            display: flex;
            align-items: center;
        }

        .speaker-name {
            background: var(--sea-glow);
            color: var(--sea-dark);
            padding: 6px 20px;
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transform: skewX(-12deg);
        }

        .speaker-emotion {
            background: rgba(45, 212, 191, 0.15);
            border: 1px solid var(--sea-glow);
            color: var(--sea-glow);
            padding: 4px 12px;
            font-size: 10px;
            letter-spacing: 0.2em;
            transform: skewX(-12deg);
            margin-left: -5px;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 10px rgba(45, 212, 191, 0.3);
        }

        .speaker-emotion.show {
            opacity: 1;
        }

        /* ＝＝＝ 情緒字幕特效 CSS ＝＝＝ */
        .effect-angry {
            color: #fca5a5 !important;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
            font-weight: 700 !important;
            font-size: 1.15em !important;
            animation: text-shake 0.4s infinite;
            display: inline-block;
        }

        .effect-furious {
            color: #ef4444 !important;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.9);
            font-weight: 700 !important;
            font-size: 1.25em !important;
            animation: text-shake-hard 0.2s infinite;
            display: inline-block;
        }

        .effect-arrogant {
            color: #fde047 !important;
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.6);
            font-weight: 700 !important;
            font-size: 1.1em !important;
            animation: text-bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        .effect-mocking {
            color: #d8b4fe !important;
            font-style: italic;
            letter-spacing: 0.15em !important;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5), -1px -1px 8px rgba(168, 85, 247, 0.6);
            display: inline-block;
        }

        .effect-weak {
            color: #cbd5e1 !important;
            font-size: 0.85em !important;
            opacity: 0.7;
            animation: text-fade-weak 2s infinite alternate;
            display: inline-block;
        }

        .effect-anxious {
            color: #5eead4 !important;
            font-weight: 700 !important;
            animation: text-pulse-fast 0.6s infinite alternate;
            display: inline-block;
        }

        .effect-firm {
            color: #6ee7b7 !important;
            font-weight: 700 !important;
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.8);
            font-size: 1.05em !important;
            display: inline-block;
        }

        .effect-normal {
            color: #f1f5f9 !important;
        }



        /* ＝＝＝ 角色立繪層：僅在角色對話時顯示，不改原字幕與時間軸 ＝＝＝ */
        #character-portrait {
            position: absolute;
            right: clamp(24px, 7vw, 132px);
            bottom: clamp(88px, 10vh, 126px);
            width: min(40vw, 520px);
            height: min(66vh, 660px);
            z-index: 92;
            pointer-events: none;
            opacity: 0;
            transform: translateX(42px) scale(0.96);
            transition: opacity 0.45s ease, transform 0.55s cubic-bezier(0.16, 1, 0.3, 1), filter 0.45s ease, left 0.45s ease, right 0.45s ease;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            filter: saturate(1.06);
        }

        #character-portrait.portrait-right {
            right: clamp(24px, 7vw, 132px);
            left: auto;
            transform: translateX(42px) scale(0.96);
        }

        #character-portrait.portrait-left {
            left: clamp(24px, 6vw, 112px);
            right: auto;
            transform: translateX(-42px) scale(0.96);
        }

        #character-portrait.active {
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        #character-portrait.portrait-missing {
            display: none;
        }

        #character-portrait .portrait-aura {
            position: absolute;
            inset: 11% 3% 2% 3%;
            border-radius: 46% 54% 18% 18%;
            background: radial-gradient(circle at 52% 42%, rgba(45, 212, 191, 0.22), rgba(1, 4, 9, 0) 62%);
            filter: blur(18px);
            opacity: 0.76;
            transform: scale(0.94);
        }

        #character-portrait .portrait-ring {
            position: absolute;
            width: 78%;
            aspect-ratio: 1 / 1;
            top: 8%;
            border-radius: 999px;
            border: 1px solid rgba(45, 212, 191, 0.24);
            box-shadow: 0 0 36px rgba(45, 212, 191, 0.18), inset 0 0 34px rgba(45, 212, 191, 0.08);
            opacity: 0.55;
            animation: portrait-ring-pulse 3.8s ease-in-out infinite;
        }

        #character-portrait .portrait-img {
            position: relative;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            object-position: bottom center;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 24px rgba(45, 212, 191, 0.26));
            transform-origin: bottom center;
        }

        #character-portrait .portrait-nameplate {
            position: absolute;
            right: 0;
            bottom: 9%;
            padding: 7px 13px;
            background: rgba(1, 4, 9, 0.72);
            border: 1px solid rgba(45, 212, 191, 0.32);
            border-left: 3px solid var(--sea-glow);
            color: rgba(231, 255, 253, 0.76);
            font-size: 10px;
            letter-spacing: 0.28em;
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            text-transform: uppercase;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.45);
        }


        #character-portrait.portrait-left .portrait-nameplate {
            left: 0;
            right: auto;
            border-left: 1px solid rgba(45, 212, 191, 0.32);
            border-right: 3px solid var(--sea-glow);
        }

        #character-portrait.portrait-left .portrait-ring {
            transform-origin: center center;
        }

        #character-portrait.effect-portrait-angry .portrait-img,
        #character-portrait.effect-portrait-furious .portrait-img {
            animation: portrait-shake 0.26s infinite;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.78)) drop-shadow(0 0 26px rgba(239, 68, 68, 0.62));
        }

        #character-portrait.effect-portrait-furious .portrait-aura,
        #character-portrait.effect-portrait-angry .portrait-aura {
            background: radial-gradient(circle at 52% 42%, rgba(239, 68, 68, 0.28), rgba(1, 4, 9, 0) 64%);
        }

        #character-portrait.effect-portrait-arrogant .portrait-img {
            animation: portrait-bob 2.1s ease-in-out infinite;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 28px rgba(250, 204, 21, 0.56));
        }

        #character-portrait.effect-portrait-mocking .portrait-img {
            animation: portrait-taunt 2.5s ease-in-out infinite;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 28px rgba(168, 85, 247, 0.58));
        }

        #character-portrait.effect-portrait-weak .portrait-img {
            animation: portrait-weak 2.4s ease-in-out infinite;
            opacity: 0.82;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 20px rgba(148, 163, 184, 0.44));
        }

        #character-portrait.effect-portrait-anxious .portrait-img {
            animation: portrait-pulse 0.72s ease-in-out infinite alternate;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 25px rgba(94, 234, 212, 0.58));
        }

        #character-portrait.effect-portrait-firm .portrait-img {
            animation: portrait-resolve 2.9s ease-in-out infinite;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 28px rgba(16, 185, 129, 0.58));
        }

        #character-portrait.effect-portrait-narrator .portrait-img {
            animation: portrait-narrator-float 4.3s ease-in-out infinite;
            filter: drop-shadow(0 28px 34px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 26px rgba(125, 211, 252, 0.46));
        }

        @keyframes portrait-ring-pulse {

            0%,
            100% {
                transform: scale(0.94);
                opacity: 0.42;
            }

            50% {
                transform: scale(1.02);
                opacity: 0.72;
            }
        }

        @keyframes portrait-shake {

            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }

            25% {
                transform: translate(-3px, 2px) rotate(-0.8deg);
            }

            50% {
                transform: translate(3px, -2px) rotate(0.8deg);
            }

            75% {
                transform: translate(2px, 2px) rotate(-0.4deg);
            }
        }

        @keyframes portrait-bob {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-10px) scale(1.015);
            }
        }

        @keyframes portrait-taunt {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-7px) rotate(-1.8deg);
            }
        }

        @keyframes portrait-weak {

            0%,
            100% {
                transform: translateY(0) scale(0.985);
                opacity: 0.72;
            }

            50% {
                transform: translateY(7px) scale(1);
                opacity: 0.9;
            }
        }

        @keyframes portrait-pulse {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.028);
            }
        }

        @keyframes portrait-resolve {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        @keyframes portrait-narrator-float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-9px);
            }
        }



        /* 角色立繪避讓：對話時，對話框會依立繪所在側稍微移到相反側，避免遮住立繪 */
        .dialogue-window.portrait-dialogue-shift-left,
        .dialogue-window.portrait-dialogue-shift-right {
            width: min(60vw, 780px);
            max-width: min(60vw, 780px);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1), width 0.55s ease, max-width 0.55s ease;
        }

        .dialogue-window.portrait-dialogue-shift-left.active {
            transform: translateX(clamp(-260px, -16vw, -120px)) translateY(0) rotateX(0deg);
        }

        .dialogue-window.portrait-dialogue-shift-right.active {
            transform: translateX(clamp(120px, 16vw, 260px)) translateY(0) rotateX(0deg);
        }

        /* 第二大段遊戲介紹：立繪跟隨關卡字幕同步縮小到左下角，避免遮住遊戲畫面 */
        #character-portrait.portrait-gameplay-guide {
            z-index: 126;
            width: min(34vw, 420px);
            height: min(58vh, 560px);
        }

        #character-portrait.portrait-gameplay-guide.portrait-compact {
            left: max(42px, env(safe-area-inset-left)) !important;
            right: auto !important;
            bottom: max(26px, calc(env(safe-area-inset-bottom) + 24px)) !important;
            width: min(170px, 16vw) !important;
            height: min(190px, 25vh) !important;
            opacity: 0.58 !important;
            filter: saturate(0.72) brightness(0.72) contrast(0.95) !important;
        }

        #character-portrait.portrait-gameplay-guide.portrait-compact.active {
            transform: translateX(0) scale(0.74) !important;
        }

        #character-portrait.portrait-gameplay-guide.portrait-compact .portrait-img {
            filter: drop-shadow(0 18px 22px rgba(0, 0, 0, 0.72)) drop-shadow(0 0 12px rgba(45, 212, 191, 0.18)) !important;
        }

        #character-portrait.portrait-gameplay-guide.portrait-compact .portrait-aura {
            opacity: 0.26 !important;
            filter: blur(14px) !important;
        }

        #character-portrait.portrait-gameplay-guide.portrait-compact .portrait-ring,
        #character-portrait.portrait-gameplay-guide.portrait-compact .portrait-nameplate {
            opacity: 0.22 !important;
        }

        @keyframes text-shake {

            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(-1px, 1px);
            }

            50% {
                transform: translate(1px, -1px);
            }

            75% {
                transform: translate(1px, 1px);
            }
        }

        @keyframes text-shake-hard {

            0%,
            100% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(2px, -2px);
            }

            60% {
                transform: translate(-2px, -1px);
            }

            80% {

        function switchAudio(key) {
            try {
                if (activeBgmKey === key) return;
                if (currentAudio) {
                    const oldAudio = currentAudio;
                    const fadeOut = setInterval(() => {
                        if (oldAudio.volume > 0.1) oldAudio.volume -= 0.1;
                        else {
                            oldAudio.pause();
                            oldAudio.currentTime = 0;
                            clearInterval(fadeOut);
                        }
                    }, 80);
                }
                const nextAudio = audioAssets[key];
                if (!nextAudio) return;
                currentAudio = nextAudio;
                activeBgmKey = key;
                currentAudio.currentTime = 0;
                currentAudio.volume = 1;
                currentAudio.loop = true;

                const p = currentAudio.play();
                if (p !== undefined) p.catch(() => {});

                const found = audioSchedule.find(s => s.key === key);
                document.getElementById('audio-info').innerText = `STREAMING_BGM: [${found ? found.label : key}]`;
            } catch (e) {
                console.error('Audio error:', e);
            }
        }

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = null;
            activeBgmKey = null;
            document.getElementById('audio-info').innerText = 'BGM: STANDBY';
        }

        function switchVoiceover(key) {
            if (activeVoiceKey === key) return;
            Object.keys(voiceoverAssets).forEach(vKey => {
                const audio = voiceoverAssets[vKey];
                if (vKey !== key) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            });
            const nextVoice = voiceoverAssets[key];
            if (!nextVoice) return;
            activeVoiceKey = key;
            nextVoice.currentTime = 0;
            nextVoice.volume = 1;
            const p = nextVoice.play();
            if (p !== undefined) p.catch(() => {});
        }

        function stopVoiceover() {
            Object.keys(voiceoverAssets).forEach(key => {
                const audio = voiceoverAssets[key];
                audio.pause();
                audio.currentTime = 0;
            });
            activeVoiceKey = null;
        }

        function handleVoiceoverSchedule(elapsed) {
            const segment = voiceoverSchedule.find(s => elapsed >= s.start && elapsed < s.end);
            if (segment) switchVoiceover(segment.key);
            else if (activeVoiceKey) stopVoiceover();
        }


        function handleAudioSchedule(elapsed) {
            const segment = audioSchedule.find(s => elapsed >= s.start && elapsed <= s.end);
            if (segment) switchAudio(segment.key);
            else if (activeBgmKey) stopCurrentAudio();
        }


        function setBgmPositionForElapsed(elapsed) {
            const segment = audioSchedule.find(s => elapsed >= s.start && elapsed <= s.end);
            if (!segment) return;
            const audio = audioAssets[segment.key];
            if (!audio) return;
            try {
                const offset = Math.max(0, elapsed - segment.start);
                if (Number.isFinite(audio.duration)) {
                    audio.currentTime = Math.min(offset, Math.max(0, audio.duration - 0.1));
                } else {
                    audio.currentTime = offset;
                }
            } catch (e) {}
        }

        const canvas = document.getElementById('sea-canvas');

        function initSea() {
            const scale = performanceScale();
            const dpr = Math.min(window.devicePixelRatio || 1, deviceProfile.smallScreen ? 1.25 : 1.75);
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const areaFactor = Math.min(1.2, Math.max(0.55, (window.innerWidth * window.innerHeight) / (1280 * 720)));
            const bubbleCount = Math.max(28, Math.floor(100 * scale * areaFactor));
            bubbles = Array.from({
                length: bubbleCount
            }, () => ({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: Math.random() * 1.5 + 0.5,
                speedY: (Math.random() * 0.5 + 0.2) * Math.max(0.7, scale),
                opacity: Math.random() * 0.5 + 0.1,
                pulse: (Math.random() * 0.02) * Math.max(0.7, scale)
            }));
        }

        function drawSea() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            bubbles.forEach(b => {
                b.y -= b.speedY;
                b.opacity += b.pulse;
                if (b.opacity > 0.6 || b.opacity < 0.1) b.pulse *= -1;
                if (b.y < -10) b.y = window.innerHeight + 10;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(45, 212, 191, ${b.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(drawSea);
        }

            wrap.classList.remove('portrait-missing');
            wrap.classList.add('active');

            const cachedUrl = portraitUrlCache.get(mapKey) || urls.find(url => {
                const cached = portraitImageCache.get(url);
                return cached && cached.complete && cached.naturalWidth > 0;
            });

            function useUrl(url) {
                if (token !== portraitLoadToken) return;
                img.onload = () => {
                    if (token !== portraitLoadToken) return;
                    cachePortraitUrl(mapKey, url);
                    wrap.classList.remove('portrait-missing');
                    wrap.classList.add('active');
                };
                img.onerror = tryNext;
                img.src = url;
            }

            function tryNext() {
                if (token !== portraitLoadToken) return;
                if (idx < urls.length) {
                    useUrl(urls[idx++]);
                } else {
                    img.src = TRANSPARENT_PIXEL;
                    wrap.classList.add('portrait-missing');
                    wrap.classList.remove('active');
                }
            }

            if (cachedUrl) {
                useUrl(cachedUrl);
                return;
            }

            // 先清空舊圖，避免上一位角色圖像在新角色圖片載入前殘留。
            img.src = TRANSPARENT_PIXEL;
            tryNext();
        }

        const PORTRAIT_LEAD_SECONDS = 0.3;

        function getPortraitStepForElapsed(elapsed) {
            if (elapsed < 0) return null;
            if (elapsed >= 233) return null;
            let chosen = null;
            for (let i = 0; i < script.length; i++) {
                const step = script[i];
                const info = getPortraitInfo(step);
                if (!info) continue;
                const startAt = step.t - PORTRAIT_LEAD_SECONDS;
                let endAt = TRAILER_DURATION;
                for (let j = i + 1; j < script.length; j++) {
                    if (getPortraitInfo(script[j])) {
                        endAt = script[j].t - PORTRAIT_LEAD_SECONDS;
                        break;
                    }
                    if (script[j].type === 'blank' || script[j].type === 'final' || script[j].type === 'team' || script[j].type === 'video') {
                        endAt = script[j].t;
                        break;
                    }
                }
                if (elapsed >= startAt && elapsed < endAt) chosen = step;
                if (elapsed < startAt) break;
            }
            return chosen;
        }


        function updateCharacterPortraitByTime(elapsed) {
            const step = getPortraitStepForElapsed(elapsed);
            if (step) showCharacterPortrait(step);
            else hideCharacterPortrait();
        }

        function updateEmotionUI(emotion) {
            const emotionTag = document.getElementById('emotion-tag');
            if (emotion) {
                emotionTag.innerText = emotion;
                const bg = emotionColors[emotion] || 'rgba(45, 212, 191, 0.15)';
                emotionTag.style.backgroundColor = bg;
                emotionTag.classList.add('show');
            } else {
                emotionTag.classList.remove('show');
            }
        }

        async function typeWriter(text, durationInSeconds) {
            if (typeInterval) clearInterval(typeInterval);
            if (currentTypeResolve) currentTypeResolve();

            const el = document.getElementById('text-content');
            el.innerHTML = '';
            let i = 0;

            const availableTime = Math.max(0.35, Math.min(durationInSeconds * 0.45, 2.4)) * 1000;
            let speed = availableTime / Math.max(1, text.length);
            speed = Math.max(8, Math.min(speed, 38));

            typeWriterPromise = new Promise(resolve => {
                currentTypeResolve = resolve;
                typeInterval = setInterval(() => {
                    if (i < text.length) {
                        el.innerHTML += text[i];
                        i++;
                    } else {
                        clearInterval(typeInterval);
                        currentTypeResolve = null;
                        resolve();
                    }
                }, speed);
            });

            return typeWriterPromise;
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }



        function isGameplayStageStep(step) {
            return !!(step && step.type === 'visual' && step.label && step.label.includes('GAMEPLAY // STAGE'));
        }

        function updateGameplayCaptionPlacement(elapsed) {
            const bigTitle = document.getElementById('big-title');
            const subTitle = document.getElementById('sub-title');
            const chapterLabel = document.getElementById('chapter-label');
            const step = script[currentIdx];
            const shouldCompact = isGameplayStageStep(step) && (elapsed - step.t >= 1.5);
            [bigTitle, subTitle, chapterLabel].forEach(el => {
                if (!el) return;
                el.classList.toggle('gameplay-compact', shouldCompact);
            });
            document.body.classList.toggle('gameplay-focus-mode', shouldCompact);
            const portrait = document.getElementById('character-portrait');
            if (portrait) {
                portrait.classList.toggle('portrait-compact', !!(shouldCompact && portrait.classList.contains('portrait-gameplay-guide')));
            }
        }

        function updateUI(step) {
            const total = TRAILER_DURATION;
            const percent = Math.min(100, Math.floor((step.t / total) * 100));
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-val').innerText = `SYNC ${percent.toString().padStart(2, '0')}%`;

            const dialogueBox = document.getElementById('dialogue-box');
            const bigTitle = document.getElementById('big-title');
            const subTitle = document.getElementById('sub-title');
            const chapterLabel = document.getElementById('chapter-label');
            const statusTag = document.getElementById('status-tag');
            const openingVisual = document.getElementById('opening-visual');
            const openingVideo = document.getElementById('opening-video');
            const textContent = document.getElementById('text-content');

            bigTitle.classList.remove('team-title', 'final-tagline', 'gameplay-main', 'title-pop', 'gameplay-compact');
            subTitle.classList.remove('gameplay-subtitle', 'subtitle-pop', 'gameplay-compact');
            chapterLabel.classList.remove('gameplay-label', 'gameplay-compact');

            if (step.type === 'video') {
                statusTag.innerText = 'MAIN_VISUAL';
                dialogueBox.classList.remove('active');
                bigTitle.classList.remove('show');
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                openingVisual.classList.add('active');
                boostOpeningVideoAudio();
                openingVideo.currentTime = Math.max(0, lastRenderedElapsed - step.t);

                const p = openingVideo.play();
                if (p !== undefined) p.catch(() => {});

                document.getElementById('audio-info').innerText = 'OPENING_VIDEO_AUDIO: BOOSTED';
                return;
            } else {
                openingVisual.classList.remove('active');
                if (!openingVideo.paused) openingVideo.pause();
            }

            if (step.type === 'team') {
                statusTag.innerText = 'PRODUCTION_TEAM';
                dialogueBox.classList.remove('active');
                bigTitle.innerText = step.main;
                bigTitle.classList.add('team-title');
                subTitle.innerText = '';
                chapterLabel.innerText = '';
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                setTimeout(() => bigTitle.classList.add('show'), 100);
                return;
            }

            if (step.type === 'blank') {
                statusTag.innerText = 'PAUSE';
                dialogueBox.classList.remove('active');
                bigTitle.classList.remove('show');
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                return;
            }

            if (step.type === 'final') {
                statusTag.innerText = 'FINAL_MESSAGE';
                dialogueBox.classList.remove('active');
                bigTitle.innerText = step.main;
                bigTitle.classList.add('final-tagline');
                subTitle.innerText = '';
                chapterLabel.innerText = step.label;
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '1';
                setTimeout(() => bigTitle.classList.add('show'), 100);
                return;
            }

            if (step.type !== 'talk') {
                statusTag.innerText = 'VISUAL_SEQUENCE';
                dialogueBox.classList.remove('active');
                const isGameplayCard = step.label && (step.label.includes('GAMEPLAY') || step.label.includes('CLEAR CONDITION'));
                bigTitle.innerText = step.main;
                if (isGameplayCard) {
                    const parts = String(step.sub || '').split('\n');
                    const stageName = parts.shift() || '';
                    const stageDesc = parts.join(' ').trim();
                    subTitle.innerHTML = `<span class="gameplay-stage-name">${escapeHtml(stageName)}</span><span class="gameplay-stage-desc">${escapeHtml(stageDesc)}</span>`;
                    bigTitle.classList.add('gameplay-main');
                    subTitle.classList.add('gameplay-subtitle');
                    chapterLabel.classList.add('gameplay-label');
                    bigTitle.classList.remove('show', 'title-pop');
                    subTitle.classList.remove('subtitle-pop');
                    void bigTitle.offsetWidth;
                    void subTitle.offsetWidth;
                } else {
                    subTitle.innerText = step.sub;
                }
                chapterLabel.innerText = step.label;

                setTimeout(() => {
                    bigTitle.classList.add('show');
                    subTitle.style.opacity = isGameplayCard ? '1' : '0.4';
                    chapterLabel.style.opacity = '1';
                    if (isGameplayCard) {
                        bigTitle.classList.add('title-pop');
                        subTitle.classList.add('subtitle-pop');
                    }
                    updateGameplayCaptionPlacement(lastRenderedElapsed);
                }, 100);
                if (step.type === 'visual' || step.type === 'montage') {
                    spawnSonar();
                    if (step.type === 'montage') {
                        document.getElementById('flash').classList.add('flash-anim');
                        setTimeout(() => document.getElementById('flash').classList.remove('flash-anim'), 1100);
                    }
                }
            } else {
                statusTag.innerText = 'COMM_LINK';
                bigTitle.classList.remove('show');
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('speaker').innerText = step.who;
                    updateEmotionUI(step.emotion);

                    textContent.className = 'text-xl md:text-2xl leading-relaxed font-light tracking-widest min-h-[3em] transition-all duration-300';
                    if (step.emotion && textEmotionClasses[step.emotion]) {
                        textContent.classList.add(textEmotionClasses[step.emotion]);
                    } else {
                        textContent.classList.add('text-slate-100');
                    }

                    dialogueBox.classList.add('active');

                    const currentIndex = script.indexOf(step);
                    const nextStep = script[currentIndex + 1];
                    const duration = nextStep ? nextStep.t - step.t : 5;

                    typeWriter(step.msg, duration);
                }, 80);
            }
        }

        function formatTime(s) {
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            const ms = Math.floor((s % 1) * 100);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        }

        let currentIdx = -1;

        function resetToBootScreen() {
            stopCurrentAudio();

            stopVoiceover();

            const openingVideo = document.getElementById('opening-video');
            openingVideo.pause();
            openingVideo.currentTime = 0;
            document.getElementById('opening-visual').classList.remove('active');
            document.getElementById('dialogue-box').classList.remove('active');
            document.getElementById('big-title').classList.remove('show', 'team-title', 'final-tagline', 'gameplay-main', 'title-pop');
            document.getElementById('sub-title').classList.remove('gameplay-subtitle', 'subtitle-pop');
            document.getElementById('sub-title').style.opacity = '0';
            document.getElementById('chapter-label').style.opacity = '0';
            document.getElementById('runtime-clock').innerText = '00:00.00';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-val').innerText = 'SYNC 00%';
            const scrubber = document.getElementById('timeline-scrubber');
            if (scrubber) scrubber.value = 0;
            playbackStartOffset = 0;
            trailerStartTime = 0;
            isPaused = false;
            updatePlayPauseButton();
            document.getElementById('status-tag').innerText = 'IDLE';
            updateEmotionUI(null);
            hideCharacterPortrait();
            document.body.classList.remove('gameplay-focus-mode');

            const fade = document.getElementById('final-fade');
            const boot = document.getElementById('boot-screen');
            boot.style.display = 'flex';
            boot.style.opacity = '1';
            setTimeout(() => fade.classList.remove('active'), 500);
            isStarted = false;
            currentIdx = -1;
            endingStarted = false;
        }

        function beginEndingSequence() {
            if (endingStarted) return;
            endingStarted = true;
            document.getElementById('status-tag').innerText = 'FADE_TO_BLACK';
            stopCurrentAudio();
            stopVoiceover();
            const fade = document.getElementById('final-fade');
            fade.classList.add('active');
            setTimeout(resetToBootScreen, 4300);
        }

        function getOpeningSyncedElapsed(rawElapsed) {
            if (!openingGateActive || playbackStartOffset >= OPENING_TIMELINE_END) return null;
            const openingVideo = document.getElementById('opening-video');
            const waitedMs = Date.now() - openingGateFallbackStart;
            if (openingVideo && !openingVideo.error) {
                const videoTime = Number.isFinite(openingVideo.currentTime) ? openingVideo.currentTime : 0;
                if (!openingVideo.ended && videoTime < OPENING_TIMELINE_END - 0.05) {
                    if (waitedMs < 14000 || openingVideo.readyState > 0 || videoTime > 0.05) {
                        return Math.max(0, Math.min(OPENING_TIMELINE_END - 0.01, videoTime));
                    }
                }
            }
            openingGateActive = false;
            playbackStartOffset = OPENING_TIMELINE_END;
            trailerStartTime = Date.now();
            return OPENING_TIMELINE_END;
        }

        function getSyncedElapsed(rawElapsed) {
            // 以使用者指定的字幕時間軸為主，避免配音檔長度或瀏覽器播放延遲造成字幕漂移。
            return rawElapsed;
        }


        function updateTimelineControls(elapsed) {
            const clamped = Math.max(0, Math.min(TRAILER_DURATION, elapsed));
            const percent = Math.min(100, Math.max(0, (clamped / TRAILER_DURATION) * 100));
            document.getElementById('runtime-clock').innerText = formatTime(clamped);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-val').innerText = `SYNC ${Math.floor(percent).toString().padStart(2, '0')}%`;
            const scrubber = document.getElementById('timeline-scrubber');
            if (scrubber && !isScrubbing) scrubber.value = clamped.toFixed(2);
        }

        function renderAtTime(elapsed, autoplayMedia = true) {
            const clamped = Math.max(0, Math.min(TRAILER_DURATION, elapsed));
            lastRenderedElapsed = clamped;
            updateTimelineControls(clamped);
            handleGameplayVideo(clamped, autoplayMedia);

            let idx = -1;
            for (let i = script.length - 1; i >= 0; i--) {
                if (script[i].t <= clamped + SUBTITLE_SYNC_OFFSET) {
                    idx = i;
                    break;
                }
            }

            if (idx !== currentIdx && idx !== -1) {
                currentIdx = idx;
                updateUI(script[idx]);
            }
            updateGameplayCaptionPlacement(clamped);
            updateCharacterPortraitByTime(clamped);
        }

        function seekToTime(targetTime, autoplayMedia = true) {
            const clamped = Math.max(0, Math.min(TRAILER_DURATION, Number(targetTime) || 0));
            playbackStartOffset = clamped;
            trailerStartTime = Date.now();
            openingGateActive = autoplayMedia && clamped < OPENING_TIMELINE_END;
            openingGateFallbackStart = Date.now();
            endingStarted = false;
            document.getElementById('final-fade').classList.remove('active');
            currentIdx = -1;
            renderAtTime(clamped, autoplayMedia);
            if (!autoplayMedia) pauseVisibleVideos();
            if (autoplayMedia && isStarted) {
                handleAudioSchedule(clamped);
                setBgmPositionForElapsed(clamped);
                handleVoiceoverSchedule(clamped);
                setVoicePositionForElapsed(clamped);
            }
        }

        function pauseVisibleVideos() {
            const openingVideo = document.getElementById('opening-video');
            const gameplayVideo = document.getElementById('gameplay-video');
            if (openingVideo && !openingVideo.paused) openingVideo.pause();
            if (gameplayVideo && !gameplayVideo.paused) gameplayVideo.pause();
        }

        function updatePlayPauseButton() {
            const btn = document.getElementById('play-toggle-btn');
            if (!btn) return;
            if (!isStarted || isPaused) {
                btn.innerText = '播放';
                btn.setAttribute('aria-label', '播放預告片');
            } else {
                btn.innerText = '暫停';
                btn.setAttribute('aria-label', '暫停預告片');
            }
        }

        function pauseTrailerPlayback() {
            if (!isStarted || isPaused) return;
            isPaused = true;
            playbackStartOffset = Math.max(0, Math.min(TRAILER_DURATION, lastRenderedElapsed));
            trailerStartTime = Date.now();
            stopCurrentAudio();
            stopVoiceover();
            pauseVisibleVideos();
            document.getElementById('status-tag').innerText = 'PAUSED';
            updatePlayPauseButton();
        }

        function resumeTrailerPlayback() {
            if (!isStarted || !isPaused) return;
            isPaused = false;
            endingStarted = false;
            trailerStartTime = Date.now();
            openingGateActive = playbackStartOffset < OPENING_TIMELINE_END;
            openingGateFallbackStart = Date.now();
            document.getElementById('final-fade').classList.remove('active');
            renderAtTime(playbackStartOffset, true);
            handleAudioSchedule(playbackStartOffset);
            setBgmPositionForElapsed(playbackStartOffset);
            handleVoiceoverSchedule(playbackStartOffset);
            setVoicePositionForElapsed(playbackStartOffset);
            updatePlayPauseButton();
        }

        function toggleTrailerPlayback() {
            if (!isStarted) return;
            if (isPaused) resumeTrailerPlayback();
            else pauseTrailerPlayback();
        }

        function startTrailer() {
            trailerStartTime = Date.now();
            playbackStartOffset = 0;
            openingGateActive = true;
            openingGateFallbackStart = Date.now();
            isPaused = false;
            updatePlayPauseButton();
            initSea();
            if (!seaAnimationStarted) {
                drawSea();
                seaAnimationStarted = true;
            }
            if (sonarLoop) clearInterval(sonarLoop);
            sonarLoop = setInterval(() => {
                if (isStarted && Math.random() > (deviceProfile.smallScreen ? 0.72 : 0.5)) spawnSonar();
            }, deviceProfile.smallScreen ? 5200 : 3000);
            if (trailerLoop) clearInterval(trailerLoop);
            trailerLoop = setInterval(() => {
                if (isPaused) {
                    updateTimelineControls(playbackStartOffset);
                    return;
                }
                let rawElapsed = playbackStartOffset + ((Date.now() - trailerStartTime) / 1000);
                const openingSyncedElapsed = getOpeningSyncedElapsed(rawElapsed);
                const elapsed = openingSyncedElapsed !== null ? openingSyncedElapsed : getSyncedElapsed(rawElapsed);
                updateTimelineControls(elapsed);
                handleAudioSchedule(elapsed);
                handleVoiceoverSchedule(elapsed);
                renderAtTime(elapsed, true);

                if (elapsed >= TRAILER_DURATION) {
                    clearInterval(trailerLoop);
                    trailerLoop = null;
                    beginEndingSequence();
                }
            }, deviceProfile.smallScreen ? 50 : 30);
        }

        document.addEventListener('pointerdown', (event) => {
            playTouchSfx(event.target && event.target.id === 'start-btn' ? 'confirm' : 'tap');
            spawnTouchRipple(event.clientX, event.clientY);
        });

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' || event.code === 'Enter') playTouchSfx('key');
        });



        const timelineScrubber = document.getElementById('timeline-scrubber');
        if (timelineScrubber) {
            timelineScrubber.max = TRAILER_DURATION;
            timelineScrubber.addEventListener('pointerdown', () => {
                wasPausedBeforeScrub = isPaused;
                isScrubbing = true;
                isPaused = true;
                playbackStartOffset = Math.max(0, Math.min(TRAILER_DURATION, lastRenderedElapsed));
                stopCurrentAudio();
                stopVoiceover();
                pauseVisibleVideos();
                updatePlayPauseButton();
            });
            timelineScrubber.addEventListener('input', (event) => {
                isScrubbing = true;
                const value = parseFloat(event.target.value || '0');
                renderAtTime(value, false);
            });
            const finishScrub = (event) => {
                if (!isScrubbing) return;
                const value = parseFloat(event.target.value || '0');
                isScrubbing = false;
                isPaused = wasPausedBeforeScrub;
                seekToTime(value, !isPaused);
                if (isPaused) {
                    playbackStartOffset = Math.max(0, Math.min(TRAILER_DURATION, value));
                    pauseVisibleVideos();
                    document.getElementById('status-tag').innerText = 'PAUSED';
                }
                updatePlayPauseButton();
            };
            timelineScrubber.addEventListener('change', finishScrub);
            timelineScrubber.addEventListener('pointerup', finishScrub);
            timelineScrubber.addEventListener('pointercancel', finishScrub);
        }

        const playToggleBtn = document.getElementById('play-toggle-btn');
        if (playToggleBtn) {
            playToggleBtn.addEventListener('click', () => {
                playTouchSfx('confirm');
                toggleTrailerPlayback();
            });
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (isStarted) return;
            playTouchSfx('confirm');

            try {
                Object.keys(voiceoverAssets).forEach(key => {
                    const audio = voiceoverAssets[key];
                    audio.load();
                    const p1 = audio.play();
                    if (p1 !== undefined) {
                        p1.then(() => {
                            audio.pause();
                            audio.currentTime = 0;
                        }).catch(() => {});
                    } else {
                        audio.pause();
                        audio.currentTime = 0;
                    }
                });

                Object.keys(audioAssets).forEach(key => {
                    const audio = audioAssets[key];
                    audio.load();
                    const p2 = audio.play();
                    if (p2 !== undefined) {
                        p2.then(() => {
                            audio.pause();
                        }).catch(() => {});
                    } else {
                        audio.pause();
                    }
                });
            } catch (e) {
                console.warn("Audio unlock skipped", e);
            }

            boostOpeningVideoAudio();
            prepareGameplayVideo();
            preloadPortraitAssets();
            isStarted = true;
            isPaused = false;
            updatePlayPauseButton();
            const fade = document.getElementById('final-fade');
            fade.classList.remove('active');
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                startTrailer();
            }, 1500);
        });

        if ('requestIdleCallback' in window) requestIdleCallback(preloadPortraitAssets);
        else setTimeout(preloadPortraitAssets, 600);

        window.addEventListener('resize', () => {
            setAppHeight();
            initSea();
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                setAppHeight();
                initSea();
            }, 250);
        });
    </script>

</body>
