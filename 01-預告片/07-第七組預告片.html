<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>海之契約：離岸之爭 預告片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sea-dark: #010409;
            --sea-deep: #051923;
            --sea-mid: #003554;
            --sea-glow: #2dd4bf;
            --contract-cyan: rgba(45, 212, 191, 0.4);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overscroll-behavior: none;
        }

        body {
            margin: 0;
            background-color: var(--sea-dark);
            color: white;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            user-select: none;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            opacity: 0.3;
        }

        .viewport {
            width: 100vw;
            height: calc(var(--vh, 1vh) * 100);
            position: relative;
            background: radial-gradient(circle at center, var(--sea-mid) 0%, var(--sea-dark) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1200px;
        }

        #boot-screen {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--sea-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .boot-btn {
            border: 1px solid var(--sea-glow);
            padding: 20px 60px;
            color: var(--sea-glow);
            text-transform: uppercase;
            letter-spacing: 0.6em;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            background: rgba(45, 212, 191, 0.05);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .boot-btn:hover {
            background: var(--sea-glow);
            color: var(--sea-dark);
            box-shadow: 0 0 50px var(--sea-glow);
            letter-spacing: 0.8em;
        }

        .boot-btn:active {
            transform: scale(0.96);
            box-shadow: 0 0 70px rgba(45, 212, 191, 0.95), inset 0 0 18px rgba(255, 255, 255, 0.28);
        }

        .touch-ripple {
            position: fixed;
            width: 18px;
            height: 18px;
            border: 1px solid rgba(45, 212, 191, 0.9);
            border-radius: 999px;
            transform: translate(-50%, -50%);
            animation: touch-ripple-expand 0.7s ease-out forwards;
            pointer-events: none;
            z-index: 1200;
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.6);
        }

        @keyframes touch-ripple-expand {
            0% {
                opacity: 0.85;
                transform: translate(-50%, -50%) scale(0.4);
            }

            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(5);
            }
        }

        .boot-kicker {
            color: rgba(45, 212, 191, 0.55);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.8em;
            text-transform: uppercase;
            margin-bottom: 28px;
        }

        .boot-title-main {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(2.6rem, 7vw, 6.2rem);
            letter-spacing: 0.28em;
            line-height: 1.2;
            text-align: center;
            color: #f8ffff;
            text-shadow: 0 0 24px rgba(45, 212, 191, 0.65), 0 0 80px rgba(0, 53, 84, 0.8);
            margin-bottom: 18px;
            padding-left: 0.28em;
        }

        .boot-title-sub {
            font-family: 'JetBrains Mono', monospace;
            color: rgba(255, 255, 255, 0.28);
            font-size: 11px;
            letter-spacing: 0.65em;
            text-transform: uppercase;
            margin-bottom: 44px;
        }

        .boot-seal {
            width: 72%;
            max-width: 760px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.8), transparent);
            box-shadow: 0 0 24px rgba(45, 212, 191, 0.8);
            margin-bottom: 42px;
        }

        #opening-visual {
            position: fixed;
            inset: 0;
            z-index: 80;
            background: #010409;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.9s ease;
        }

        #opening-visual.active {
            opacity: 1;
        }

        #opening-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.08) saturate(1.08) brightness(0.9);
        }

        #gameplay-visual {
            position: fixed;
            inset: 0;
            z-index: 35;
            background: #010409;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.85s ease, filter 0.85s ease;
            overflow: hidden;
        }

        #gameplay-visual.active {
            opacity: 1;
        }

        #gameplay-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: contrast(1.08) saturate(1.05) brightness(0.82);
            transform: scale(1.015);
        }

        .gameplay-veil {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(0, 53, 84, 0.06), rgba(1, 4, 9, 0.52) 75%),
                linear-gradient(180deg, rgba(1, 4, 9, 0.12), rgba(1, 4, 9, 0.56));
            box-shadow: inset 0 0 120px rgba(1, 4, 9, 0.88);
            pointer-events: none;
        }

        .gameplay-corner {
            position: absolute;
            left: 42px;
            top: 42px;
            color: rgba(125, 255, 242, 0.68);
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            text-shadow: 0 0 18px rgba(45, 212, 191, 0.8);
            pointer-events: none;
        }

        #gameplay-visual::after {
            content: '';
            position: absolute;
            inset: 28px;
            border: 1px solid rgba(45, 212, 191, 0.18);
            box-shadow: inset 0 0 34px rgba(45, 212, 191, 0.07), 0 0 28px rgba(45, 212, 191, 0.08);
            pointer-events: none;
        }

        .opening-frame {
            position: absolute;
            inset: 34px;
            border: 1px solid rgba(45, 212, 191, 0.35);
            box-shadow: inset 0 0 40px rgba(45, 212, 191, 0.08), 0 0 40px rgba(45, 212, 191, 0.08);
            pointer-events: none;
        }

        .opening-caption {
            position: absolute;
            left: 48px;
            bottom: 44px;
            color: rgba(224, 255, 252, 0.78);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            text-shadow: 0 0 18px rgba(45, 212, 191, 0.65);
        }

        .team-title {
            max-width: 980px;
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(1.7rem, 4.4vw, 4.5rem) !important;
            letter-spacing: 0.25em !important;
            line-height: 1.45;
            padding-left: 0.25em;
            color: #f7ffff;
            text-shadow: 0 0 24px rgba(45, 212, 191, 0.72), 0 0 80px rgba(45, 212, 191, 0.25);
            white-space: pre-line;
        }

        .system-timer {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 100;
            text-align: right;
            font-family: 'JetBrains Mono', monospace;
        }

        .timer-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 0 20px var(--contract-cyan);
            font-variant-numeric: tabular-nums;
        }

        .grid-3d {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image:
                linear-gradient(var(--contract-cyan) 1px, transparent 1px),
                linear-gradient(90deg, var(--contract-cyan) 1px, transparent 1px);
            background-size: 100px 100px;
            transform: rotateX(75deg) translateZ(-100px);
            opacity: 0.08;
            z-index: 1;
            animation: sea-flow 30s linear infinite;
        }

        @keyframes sea-flow {
            0% {
                transform: rotateX(75deg) translateY(0);
            }

            100% {
                transform: rotateX(75deg) translateY(100px);
            }
        }

        .dialogue-window {
            width: 85%;
            max-width: 850px;
            background: rgba(2, 8, 15, 0.85);
            backdrop-filter: blur(20px);
            border-left: 4px solid var(--sea-glow);
            padding: 35px 45px;
            position: absolute;
            bottom: 15%;
            opacity: 0;
            transform: translateY(30px) rotateX(10deg);
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 100;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        }

        .dialogue-window.active {
            opacity: 1;
            transform: translateY(0) rotateX(0deg);
        }

        .speaker-container {
            position: absolute;
            top: -15px;
            left: 40px;
            display: flex;
            align-items: center;
        }

        .speaker-name {
            background: var(--sea-glow);
            color: var(--sea-dark);
            padding: 6px 20px;
            font-family: 'JetBrains Mono', 'Noto Sans TC', monospace;
            font-weight: 700;
            font-size: 11px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            transform: skewX(-12deg);
        }

        .speaker-emotion {
            background: rgba(45, 212, 191, 0.15);
            border: 1px solid var(--sea-glow);
            color: var(--sea-glow);
            padding: 4px 12px;
            font-size: 10px;
            letter-spacing: 0.2em;
            transform: skewX(-12deg);
            margin-left: -5px;
            opacity: 0;
            transition: opacity 0.3s ease;
            box-shadow: 0 0 10px rgba(45, 212, 191, 0.3);
        }

        .speaker-emotion.show {
            opacity: 1;
        }

        /* ＝＝＝ 情緒字幕特效 CSS ＝＝＝ */
        .effect-angry {
            color: #fca5a5 !important;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.8);
            font-weight: 700 !important;
            font-size: 1.15em !important;
            animation: text-shake 0.4s infinite;
            display: inline-block;
        }

        .effect-furious {
            color: #ef4444 !important;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.9);
            font-weight: 700 !important;
            font-size: 1.25em !important;
            animation: text-shake-hard 0.2s infinite;
            display: inline-block;
        }

        .effect-arrogant {
            color: #fde047 !important;
            text-shadow: 0 0 15px rgba(234, 179, 8, 0.6);
            font-weight: 700 !important;
            font-size: 1.1em !important;
            animation: text-bounce 2s infinite ease-in-out;
            display: inline-block;
        }

        .effect-mocking {
            color: #d8b4fe !important;
            font-style: italic;
            letter-spacing: 0.15em !important;
            text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.5), -1px -1px 8px rgba(168, 85, 247, 0.6);
            display: inline-block;
        }

        .effect-weak {
            color: #cbd5e1 !important;
            font-size: 0.85em !important;
            opacity: 0.7;
            animation: text-fade-weak 2s infinite alternate;
            display: inline-block;
        }

        .effect-anxious {
            color: #5eead4 !important;
            font-weight: 700 !important;
            animation: text-pulse-fast 0.6s infinite alternate;
            display: inline-block;
        }

        .effect-firm {
            color: #6ee7b7 !important;
            font-weight: 700 !important;
            text-shadow: 0 0 12px rgba(16, 185, 129, 0.8);
            font-size: 1.05em !important;
            display: inline-block;
        }

        .effect-normal {
            color: #f1f5f9 !important;
        }

        @keyframes text-shake {

            0%,
            100% {
                transform: translate(0, 0);
            }

            25% {
                transform: translate(-1px, 1px);
            }

            50% {
                transform: translate(1px, -1px);
            }

            75% {
                transform: translate(1px, 1px);
            }
        }

        @keyframes text-shake-hard {

            0%,
            100% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(2px, -2px);
            }

            60% {
                transform: translate(-2px, -1px);
            }

            80% {
                transform: translate(2px, 1px);
            }
        }

        @keyframes text-fade-weak {
            0% {
                opacity: 0.3;
                filter: blur(0.5px);
            }

            100% {
                opacity: 0.8;
                filter: blur(0px);
            }
        }

        @keyframes text-pulse-fast {
            0% {
                text-shadow: 0 0 5px rgba(45, 212, 191, 0.4);
                transform: scale(1);
            }

            100% {
                text-shadow: 0 0 15px rgba(45, 212, 191, 0.9);
                transform: scale(1.02);
            }
        }

        @keyframes text-bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-3px);
            }
        }

        .chapter-title {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(3rem, 8vw, 6.5rem);
            letter-spacing: 2rem;
            opacity: 0;
            transform: scale(0.95);
            transition: all 3s cubic-bezier(0.16, 1, 0.3, 1);
            color: white;
            text-shadow: 0 0 50px rgba(45, 212, 191, 0.5);
            text-align: center;
        }

        .chapter-title.show {
            opacity: 1;
            letter-spacing: 2.8rem;
            transform: scale(1);
        }

        canvas#sea-canvas {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .scene-flash {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            z-index: 999;
            pointer-events: none;
        }

        .flash-anim {
            animation: flash-effect 1s ease-out forwards;
        }

        @keyframes flash-effect {
            0% {
                opacity: 0.8;
            }

            100% {
                opacity: 0;
            }
        }

        .sonar-pulse {
            position: absolute;
            border: 2px solid var(--sea-glow);
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 2;
        }

        @keyframes sonar-expand {
            0% {
                transform: scale(0);
                opacity: 0.5;
            }

            100% {
                transform: scale(4);
                opacity: 0;
            }
        }

        .final-tagline {
            max-width: 1120px;
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(2.2rem, 5.5vw, 5.2rem) !important;
            letter-spacing: 0.18em !important;
            line-height: 1.45;
            padding-left: 0.18em;
            color: #f8ffff;
            text-shadow: 0 0 28px rgba(45, 212, 191, 0.85), 0 0 90px rgba(45, 212, 191, 0.35);
            white-space: pre-line;
        }

        .gameplay-main {
            font-size: clamp(3.4rem, 8.2vw, 7rem) !important;
            letter-spacing: 0.72em !important;
            padding-left: 0.72em;
            text-shadow: 0 0 28px rgba(45, 212, 191, 0.9), 0 0 92px rgba(45, 212, 191, 0.35);
        }

        .gameplay-subtitle {
            display: block;
            max-width: min(1080px, 86vw);
            margin-top: 30px !important;
            color: rgba(236, 255, 252, 0.96) !important;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: clamp(1.75rem, 3.2vw, 3.3rem) !important;
            line-height: 1.35;
            letter-spacing: 0.12em !important;
            text-transform: none !important;
            font-weight: 700 !important;
            text-align: center;
            text-shadow: 0 0 18px rgba(45, 212, 191, 0.82), 0 0 42px rgba(0, 53, 84, 0.95);
            background: linear-gradient(90deg, rgba(2, 8, 15, 0), rgba(2, 8, 15, 0.58), rgba(2, 8, 15, 0));
            border-top: 1px solid rgba(45, 212, 191, 0.28);
            border-bottom: 1px solid rgba(45, 212, 191, 0.28);
            padding: 18px 26px;
            border-radius: 18px;
        }

        .gameplay-label {
            color: rgba(45, 212, 191, 0.78) !important;
            font-size: 12px !important;
            letter-spacing: 0.7em !important;
            text-shadow: 0 0 18px rgba(45, 212, 191, 0.65);
        }

        .title-pop {
            animation: gameplay-title-pop 0.82s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .subtitle-pop {
            animation: gameplay-subtitle-pop 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: 0.12s;
        }

        @keyframes gameplay-title-pop {
            0% {
                opacity: 0;
                transform: translateY(24px) scale(0.86);
                filter: blur(8px);
            }

            58% {
                opacity: 1;
                transform: translateY(-4px) scale(1.035);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        @keyframes gameplay-subtitle-pop {
            0% {
                opacity: 0;
                transform: translateY(28px) scale(0.9);
                filter: blur(10px);
            }

            62% {
                opacity: 1;
                transform: translateY(-3px) scale(1.02);
                filter: blur(0);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        .final-fade-overlay {
            position: fixed;
            inset: 0;
            z-index: 1500;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 4s ease-in-out;
        }

        .final-fade-overlay.active {
            opacity: 1;
        }

        @media (max-width: 1024px) {
            body::after {
                opacity: 0.18;
                background-size: 100% 5px, 4px 100%;
            }

            .viewport {
                perspective: 800px;
            }

            #opening-video,
            #gameplay-video {
                object-fit: contain;
                background: #010409;
                transform: none;
            }

            #opening-video {
                filter: contrast(1.04) saturate(1.04) brightness(0.95);
            }

            #gameplay-video {
                filter: contrast(1.05) saturate(1.02) brightness(0.74);
            }

            .opening-frame {
                inset: max(14px, env(safe-area-inset-top)) max(14px, env(safe-area-inset-right)) max(14px, env(safe-area-inset-bottom)) max(14px, env(safe-area-inset-left));
            }

            .opening-caption {
                left: max(20px, env(safe-area-inset-left));
                bottom: max(22px, env(safe-area-inset-bottom));
                font-size: 9px;
                letter-spacing: 0.28em;
            }

            .gameplay-corner {
                left: max(18px, env(safe-area-inset-left));
                top: max(18px, env(safe-area-inset-top));
                font-size: 8px;
                letter-spacing: 0.24em;
            }

            #gameplay-visual::after {
                inset: 14px;
            }

            .grid-3d {
                background-size: 72px 72px;
                opacity: 0.055;
                animation-duration: 42s;
            }

            .system-timer {
                top: max(16px, env(safe-area-inset-top));
                right: max(16px, env(safe-area-inset-right));
            }

            .timer-value {
                font-size: clamp(1.15rem, 4vw, 2rem);
            }

            .dialogue-window {
                width: min(92vw, 780px);
                bottom: max(12%, calc(env(safe-area-inset-bottom) + 76px));
                padding: clamp(20px, 4.5vw, 32px) clamp(22px, 5vw, 38px);
                border-left-width: 3px;
                backdrop-filter: blur(12px);
            }

            #text-content {
                font-size: clamp(1rem, 3.6vw, 1.65rem) !important;
                line-height: 1.55 !important;
                letter-spacing: 0.08em !important;
            }

            .speaker-container {
                left: 24px;
                top: -12px;
            }

            .speaker-name {
                font-size: 9px !important;
                letter-spacing: 0.22em !important;
                padding: 4px 14px !important;
            }

            .speaker-emotion {
                font-size: 8px !important;
                padding: 3px 8px !important;
            }

            .chapter-title {
                font-size: clamp(2.2rem, 10vw, 5rem);
                letter-spacing: clamp(0.28rem, 4vw, 1.4rem);
                padding-left: clamp(0.28rem, 4vw, 1.4rem);
            }

            .chapter-title.show {
                letter-spacing: clamp(0.42rem, 5vw, 1.8rem);
            }

            .team-title {
                max-width: 92vw;
                font-size: clamp(1.55rem, 6.6vw, 3.4rem) !important;
                letter-spacing: 0.16em !important;
                padding-left: 0.16em;
            }

            .final-tagline {
                max-width: 92vw;
                font-size: clamp(1.65rem, 7vw, 3.6rem) !important;
                letter-spacing: 0.08em !important;
                padding-left: 0.08em;
            }

            .gameplay-main {
                font-size: clamp(2.45rem, 11vw, 5.5rem) !important;
                letter-spacing: clamp(0.28rem, 4vw, 0.72em) !important;
                padding-left: clamp(0.28rem, 4vw, 0.72em);
            }

            .gameplay-subtitle {
                max-width: 92vw;
                margin-top: clamp(16px, 3.5vw, 26px) !important;
                font-size: clamp(1.25rem, 5.5vw, 2.65rem) !important;
                line-height: 1.42;
                letter-spacing: 0.055em !important;
                padding: clamp(14px, 3.5vw, 20px) clamp(14px, 4.5vw, 24px);
                border-radius: 14px;
            }

            .gameplay-label {
                font-size: 9px !important;
                letter-spacing: 0.28em !important;
            }

            .viewport>.absolute.bottom-10 {
                left: max(16px, env(safe-area-inset-left)) !important;
                right: max(16px, env(safe-area-inset-right)) !important;
                bottom: max(14px, env(safe-area-inset-bottom)) !important;
            }

            .viewport>.absolute.bottom-10 .flex.justify-between {
                gap: 10px;
                align-items: flex-end;
            }

            #audio-info {

            {

        ];

        function switchAudio(key) {
            try {
                if (activeBgmKey === key) return;
                if (currentAudio) {
                    const oldAudio = currentAudio;
                    const fadeOut = setInterval(() => {
                        if (oldAudio.volume > 0.1) oldAudio.volume -= 0.1;
                        else {
                            oldAudio.pause();
                            oldAudio.currentTime = 0;
                            clearInterval(fadeOut);
                        }
                    }, 80);
                }
                const nextAudio = audioAssets[key];
                if (!nextAudio) return;
                currentAudio = nextAudio;
                activeBgmKey = key;
                currentAudio.currentTime = 0;
                currentAudio.volume = 1;
                currentAudio.loop = true;

                const p = currentAudio.play();
                if (p !== undefined) p.catch(() => {});

                const found = audioSchedule.find(s => s.key === key);
                document.getElementById('audio-info').innerText = `STREAMING_BGM: [${found ? found.label : key}]`;
            } catch (e) {
                console.error('Audio error:', e);
            }
        }

        function stopCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentAudio = null;
            activeBgmKey = null;
            document.getElementById('audio-info').innerText = 'BGM: STANDBY';
        }

        function switchVoiceover(key) {
            if (activeVoiceKey === key) return;
            Object.keys(voiceoverAssets).forEach(vKey => {
                const audio = voiceoverAssets[vKey];
                if (vKey !== key) {
                    audio.pause();
                    audio.currentTime = 0;
                }
            });
            const nextVoice = voiceoverAssets[key];
            if (!nextVoice) return;
            activeVoiceKey = key;
            nextVoice.currentTime = 0;
            nextVoice.volume = 1;
            const p = nextVoice.play();
            if (p !== undefined) p.catch(() => {});
        }

        function stopVoiceover() {
            Object.keys(voiceoverAssets).forEach(key => {
                const audio = voiceoverAssets[key];
                audio.pause();
                audio.currentTime = 0;
            });
            activeVoiceKey = null;
        }

        function handleVoiceoverSchedule(elapsed) {
            const segment = voiceoverSchedule.find(s => elapsed >= s.start && elapsed < s.end);
            if (segment) switchVoiceover(segment.key);
            else if (activeVoiceKey) stopVoiceover();
        }


        function handleAudioSchedule(elapsed) {
            const segment = audioSchedule.find(s => elapsed >= s.start && elapsed <= s.end);
            if (segment) switchAudio(segment.key);
            else if (activeBgmKey) stopCurrentAudio();
        }

        const canvas = document.getElementById('sea-canvas');
        const ctx = canvas.getContext('2d');
        let bubbles = [];

        function initSea() {
            const scale = performanceScale();
            const dpr = Math.min(window.devicePixelRatio || 1, deviceProfile.smallScreen ? 1.25 : 1.75);
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            canvas.style.width = window.innerWidth + 'px';
            canvas.style.height = window.innerHeight + 'px';
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            const areaFactor = Math.min(1.2, Math.max(0.55, (window.innerWidth * window.innerHeight) / (1280 * 720)));
            const bubbleCount = Math.max(28, Math.floor(100 * scale * areaFactor));
            bubbles = Array.from({
                length: bubbleCount
            }, () => ({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                radius: Math.random() * 1.5 + 0.5,
                speedY: (Math.random() * 0.5 + 0.2) * Math.max(0.7, scale),
                opacity: Math.random() * 0.5 + 0.1,
                pulse: (Math.random() * 0.02) * Math.max(0.7, scale)
            }));
        }

        function drawSea() {
            ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            bubbles.forEach(b => {
                b.y -= b.speedY;
                b.opacity += b.pulse;
                if (b.opacity > 0.6 || b.opacity < 0.1) b.pulse *= -1;
                if (b.y < -10) b.y = window.innerHeight + 10;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(45, 212, 191, ${b.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(drawSea);
        }

        function spawnSonar() {
            if (deviceProfile.reduceMotion) return;
            const sonar = document.createElement('div');
            sonar.className = 'sonar-pulse';
            const size = deviceProfile.smallScreen ? 180 : 300;
            sonar.style.width = size + 'px';
            sonar.style.height = size + 'px';
            sonar.style.left = (Math.random() * 100) + '%';
            sonar.style.top = (Math.random() * 100) + '%';
            sonar.style.animation = 'sonar-expand 4s ease-out forwards';
            document.getElementById('sonar-container').appendChild(sonar);
            setTimeout(() => sonar.remove(), 4000);
        }

        let typeInterval = null;
        let typeWriterPromise = null;
        let currentTypeResolve = null;

        const emotionColors = {
            '憤怒': 'rgba(239, 68, 68, 0.3)',
            '拍桌怒吼': 'rgba(239, 68, 68, 0.4)',
            '氣急敗壞': 'rgba(249, 115, 22, 0.3)',
            '得意大笑': 'rgba(234, 179, 8, 0.3)',
            '狂妄': 'rgba(234, 179, 8, 0.25)',
            '冷笑': 'rgba(56, 189, 248, 0.2)',
            '嘲諷': 'rgba(168, 85, 247, 0.2)',
            '虛弱': 'rgba(148, 163, 184, 0.3)',
            '急切': 'rgba(20, 184, 166, 0.3)',
            '宣示': 'rgba(20, 184, 166, 0.3)',
            '堅定': 'rgba(16, 185, 129, 0.25)',
            '守護': 'rgba(16, 185, 129, 0.25)',
            '質問': 'rgba(99, 102, 241, 0.25)',
            '陳述': 'rgba(255, 255, 255, 0.1)',
            '引導': 'rgba(255, 255, 255, 0.15)',
            '沉思': 'rgba(255, 255, 255, 0.1)',
        };

        const textEmotionClasses = {
            '憤怒': 'effect-angry',
            '拍桌怒吼': 'effect-furious',
            '氣急敗壞': 'effect-angry',
            '得意大笑': 'effect-arrogant',
            '狂妄': 'effect-arrogant',
            '冷笑': 'effect-mocking',
            '嘲諷': 'effect-mocking',
            '虛弱': 'effect-weak',
            '急切': 'effect-anxious',
            '質問': 'effect-anxious',
            '宣示': 'effect-firm',
            '堅定': 'effect-firm',
            '守護': 'effect-firm',
            '陳述': 'effect-normal',
            '引導': 'effect-normal',
            '沉思': 'effect-normal'
        };

        function updateEmotionUI(emotion) {
            const emotionTag = document.getElementById('emotion-tag');
            if (emotion) {
                emotionTag.innerText = emotion;
                const bg = emotionColors[emotion] || 'rgba(45, 212, 191, 0.15)';
                emotionTag.style.backgroundColor = bg;
                emotionTag.classList.add('show');
            } else {
                emotionTag.classList.remove('show');
            }
        }

        async function typeWriter(text, durationInSeconds) {
            if (typeInterval) clearInterval(typeInterval);
            if (currentTypeResolve) currentTypeResolve();

            const el = document.getElementById('text-content');
            el.innerHTML = '';
            let i = 0;

            const availableTime = Math.max(0.35, Math.min(durationInSeconds * 0.45, 2.4)) * 1000;
            let speed = availableTime / Math.max(1, text.length);
            speed = Math.max(8, Math.min(speed, 38));

            typeWriterPromise = new Promise(resolve => {
                currentTypeResolve = resolve;
                typeInterval = setInterval(() => {
                    if (i < text.length) {
                        el.innerHTML += text[i];
                        i++;
                    } else {
                        clearInterval(typeInterval);
                        currentTypeResolve = null;
                        resolve();
                    }
                }, speed);
            });

            return typeWriterPromise;
        }

        function updateUI(step) {
            const total = 243;
            const percent = Math.min(100, Math.floor((step.t / total) * 100));
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-val').innerText = `SYNC ${percent.toString().padStart(2, '0')}%`;

            const dialogueBox = document.getElementById('dialogue-box');
            const bigTitle = document.getElementById('big-title');
            const subTitle = document.getElementById('sub-title');
            const chapterLabel = document.getElementById('chapter-label');
            const statusTag = document.getElementById('status-tag');
            const openingVisual = document.getElementById('opening-visual');
            const openingVideo = document.getElementById('opening-video');
            const textContent = document.getElementById('text-content');

            bigTitle.classList.remove('team-title', 'final-tagline', 'gameplay-main', 'title-pop');
            subTitle.classList.remove('gameplay-subtitle', 'subtitle-pop');
            chapterLabel.classList.remove('gameplay-label');

            if (step.type === 'video') {
                statusTag.innerText = 'MAIN_VISUAL';
                dialogueBox.classList.remove('active');
                bigTitle.classList.remove('show');
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                openingVisual.classList.add('active');
                boostOpeningVideoAudio();
                openingVideo.currentTime = 0;

                const p = openingVideo.play();
                if (p !== undefined) p.catch(() => {});

                document.getElementById('audio-info').innerText = 'OPENING_VIDEO_AUDIO: BOOSTED';
                return;
            } else {
                openingVisual.classList.remove('active');
                if (!openingVideo.paused) openingVideo.pause();
            }

            if (step.type === 'team') {
                statusTag.innerText = 'PRODUCTION_TEAM';
                dialogueBox.classList.remove('active');
                bigTitle.innerText = step.main;
                bigTitle.classList.add('team-title');
                subTitle.innerText = '';
                chapterLabel.innerText = '';
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                setTimeout(() => bigTitle.classList.add('show'), 100);
                return;
            }

            if (step.type === 'final') {
                statusTag.innerText = 'FINAL_MESSAGE';
                dialogueBox.classList.remove('active');
                bigTitle.innerText = step.main;
                bigTitle.classList.add('final-tagline');
                subTitle.innerText = '';
                chapterLabel.innerText = step.label;
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '1';
                setTimeout(() => bigTitle.classList.add('show'), 100);
                return;
            }

            if (step.type !== 'talk') {
                statusTag.innerText = 'VISUAL_SEQUENCE';
                dialogueBox.classList.remove('active');
                bigTitle.innerText = step.main;
                subTitle.innerText = step.sub;
                chapterLabel.innerText = step.label;

                const isGameplayCard = step.label && (step.label.includes('GAMEPLAY') || step.label.includes('CLEAR CONDITION'));
                if (isGameplayCard) {
                    bigTitle.classList.add('gameplay-main');
                    subTitle.classList.add('gameplay-subtitle');
                    chapterLabel.classList.add('gameplay-label');
                    bigTitle.classList.remove('show', 'title-pop');
                    subTitle.classList.remove('subtitle-pop');
                    void bigTitle.offsetWidth;
                    void subTitle.offsetWidth;
                }

                setTimeout(() => {
                    bigTitle.classList.add('show');
                    subTitle.style.opacity = isGameplayCard ? '1' : '0.4';
                    chapterLabel.style.opacity = '1';
                    if (isGameplayCard) {
                        bigTitle.classList.add('title-pop');
                        subTitle.classList.add('subtitle-pop');
                    }
                }, 100);
                if (step.type === 'visual' || step.type === 'montage') {
                    spawnSonar();
                    if (step.type === 'montage') {
                        document.getElementById('flash').classList.add('flash-anim');
                        setTimeout(() => document.getElementById('flash').classList.remove('flash-anim'), 1100);
                    }
                }
            } else {
                statusTag.innerText = 'COMM_LINK';
                bigTitle.classList.remove('show');
                subTitle.style.opacity = '0';
                chapterLabel.style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('speaker').innerText = step.who;
                    updateEmotionUI(step.emotion);

                    textContent.className = 'text-xl md:text-2xl leading-relaxed font-light tracking-widest min-h-[3em] transition-all duration-300';
                    if (step.emotion && textEmotionClasses[step.emotion]) {
                        textContent.classList.add(textEmotionClasses[step.emotion]);
                    } else {
                        textContent.classList.add('text-slate-100');
                    }

                    dialogueBox.classList.add('active');

                    const currentIndex = script.indexOf(step);
                    const nextStep = script[currentIndex + 1];
                    const duration = nextStep ? nextStep.t - step.t : 5;

                    typeWriter(step.msg, duration);
                }, 80);
            }
        }

        function formatTime(s) {
            const mins = Math.floor(s / 60);
            const secs = Math.floor(s % 60);
            const ms = Math.floor((s % 1) * 100);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}.${ms.toString().padStart(2, '0')}`;
        }

        let currentIdx = -1;

        function resetToBootScreen() {
            stopCurrentAudio();

            stopVoiceover();

            const openingVideo = document.getElementById('opening-video');
            openingVideo.pause();
            openingVideo.currentTime = 0;
            document.getElementById('opening-visual').classList.remove('active');
            document.getElementById('dialogue-box').classList.remove('active');
            document.getElementById('big-title').classList.remove('show', 'team-title', 'final-tagline', 'gameplay-main', 'title-pop');
            document.getElementById('sub-title').classList.remove('gameplay-subtitle', 'subtitle-pop');
            document.getElementById('sub-title').style.opacity = '0';
            document.getElementById('chapter-label').style.opacity = '0';
            document.getElementById('runtime-clock').innerText = '00:00.00';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('progress-val').innerText = 'SYNC 00%';
            document.getElementById('status-tag').innerText = 'IDLE';
            updateEmotionUI(null);

            const fade = document.getElementById('final-fade');
            const boot = document.getElementById('boot-screen');
            boot.style.display = 'flex';
            boot.style.opacity = '1';
            setTimeout(() => fade.classList.remove('active'), 500);
            isStarted = false;
            currentIdx = -1;
            endingStarted = false;
        }

        function beginEndingSequence() {
            if (endingStarted) return;
            endingStarted = true;
            document.getElementById('status-tag').innerText = 'FADE_TO_BLACK';
            stopCurrentAudio();
            stopVoiceover();
            const fade = document.getElementById('final-fade');
            fade.classList.add('active');
            setTimeout(resetToBootScreen, 4300);
        }

        function getSyncedElapsed(rawElapsed) {
            // 以使用者指定的字幕時間軸為主，避免配音檔長度或瀏覽器播放延遲造成字幕漂移。
            return rawElapsed;
        }

        function startTrailer() {
            const startTime = Date.now();
            initSea();
            if (!seaAnimationStarted) {
                drawSea();
                seaAnimationStarted = true;
            }
            if (sonarLoop) clearInterval(sonarLoop);
            sonarLoop = setInterval(() => {
                if (isStarted && Math.random() > (deviceProfile.smallScreen ? 0.72 : 0.5)) spawnSonar();
            }, deviceProfile.smallScreen ? 5200 : 3000);
            if (trailerLoop) clearInterval(trailerLoop);
            trailerLoop = setInterval(() => {
                const rawElapsed = (Date.now() - startTime) / 1000;

                const elapsed = getSyncedElapsed(rawElapsed);
                document.getElementById('runtime-clock').innerText = formatTime(elapsed);
                handleAudioSchedule(elapsed);
                handleVoiceoverSchedule(elapsed);
                handleGameplayVideo(elapsed);

                let idx = -1;
                for (let i = script.length - 1; i >= 0; i--) {
                    if (script[i].t <= elapsed + SUBTITLE_SYNC_OFFSET) {
                        idx = i;
                        break;
                    }
                }

                if (idx !== currentIdx && idx !== -1) {
                    currentIdx = idx;
                    updateUI(script[idx]);
                }
                if (elapsed >= 243) {
                    clearInterval(trailerLoop);
                    trailerLoop = null;
                    beginEndingSequence();
                }
            }, deviceProfile.smallScreen ? 50 : 30);
        }

        document.addEventListener('pointerdown', (event) => {
            playTouchSfx(event.target && event.target.id === 'start-btn' ? 'confirm' : 'tap');
            spawnTouchRipple(event.clientX, event.clientY);
        });

        document.addEventListener('keydown', (event) => {
            if (event.code === 'Space' || event.code === 'Enter') playTouchSfx('key');
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            if (isStarted) return;
            playTouchSfx('confirm');

            try {
                Object.keys(voiceoverAssets).forEach(key => {
                    const audio = voiceoverAssets[key];
                    audio.load();
                    const p1 = audio.play();
                    if (p1 !== undefined) {
                        p1.then(() => {
                            audio.pause();
                            audio.currentTime = 0;
                        }).catch(() => {});
                    } else {
                        audio.pause();
                        audio.currentTime = 0;
                    }
                });

                Object.keys(audioAssets).forEach(key => {
                    const audio = audioAssets[key];
                    audio.load();
                    const p2 = audio.play();
                    if (p2 !== undefined) {
                        p2.then(() => {
                            audio.pause();
                        }).catch(() => {});
                    } else {
                        audio.pause();
                    }
                });
            } catch (e) {
                console.warn("Audio unlock skipped", e);
            }

            boostOpeningVideoAudio();
            prepareGameplayVideo();
            isStarted = true;
            const fade = document.getElementById('final-fade');
            fade.classList.remove('active');
            document.getElementById('boot-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('boot-screen').style.display = 'none';
                startTrailer();
            }, 1500);
        });

        window.addEventListener('resize', () => {
            setAppHeight();
            initSea();
        });
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                setAppHeight();
                initSea();
            }, 250);
        });
    </script>
