<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>四接疑雲｜第一組互動預告片</title>
    <style>
        :root {
            --ui-bg: rgba(15, 23, 42, 0.9);
            --text-main: #f1f5f9;
            --accent: #38bdf8;
            --accent-soft: rgba(56, 189, 248, 0.18);
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: "PingFang TC", "Microsoft JhengHei", "Noto Sans TC", sans-serif;
            color: var(--text-main);
            user-select: none;
        }

        button { font-family: inherit; }

        /* 開場畫面 */
        #overlay {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 50% 35%, rgba(56, 189, 248, 0.22), transparent 32%),
                radial-gradient(circle at 50% 100%, rgba(8, 47, 73, 0.82), transparent 48%),
                linear-gradient(180deg, #020617 0%, #061826 50%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 120;
            transition: opacity 1s ease;
            text-align: center;
            padding: 24px;
        }

        #overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(56, 189, 248, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.08) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(circle at center, black 0%, transparent 74%);
            pointer-events: none;
        }

        .opening-card {
            position: relative;
            z-index: 1;
            width: min(920px, 92vw);
            padding: clamp(36px, 7vw, 70px) clamp(22px, 6vw, 64px);
            border-radius: 32px;
            border: 1px solid rgba(125, 211, 252, 0.34);
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.72), rgba(2, 6, 23, 0.66));
            box-shadow: 0 0 70px rgba(14, 165, 233, 0.24), inset 0 0 60px rgba(56, 189, 248, 0.08);
            backdrop-filter: blur(14px);
        }

        .title {
            font-size: clamp(54px, 11vw, 126px);
            line-height: 1;
            font-weight: 950;
            color: var(--accent);
            letter-spacing: 0.18em;
            text-indent: 0.18em;
            margin: 0 0 22px;
            text-shadow: 0 0 18px rgba(56, 189, 248, 0.82), 0 0 62px rgba(56, 189, 248, 0.42);
        }

        .subtitle-line {
            color: #cbd5e1;
            font-size: clamp(15px, 2.2vw, 21px);
            line-height: 1.8;
            letter-spacing: 0.12em;
            margin-bottom: 34px;
        }

        #play-btn {
            padding: 18px 54px;
            font-size: clamp(18px, 2.5vw, 24px);
            font-weight: 800;
            letter-spacing: 0.14em;
            background: rgba(56, 189, 248, 0.1);
            color: #e0f2fe;
            border: 2px solid var(--accent);
            border-radius: 999px;
            cursor: pointer;
            transition: all 0.28s ease;
            box-shadow: 0 0 30px rgba(56, 189, 248, 0.22);
        }

        #play-btn:hover,
        #play-btn:focus-visible {
            background: var(--accent);
            color: #082f49;
            box-shadow: 0 0 42px rgba(56, 189, 248, 0.62);
            transform: translateY(-2px) scale(1.02);
            outline: none;
        }

        #play-btn.clicked {
            animation: sonarClick 520ms ease-out;
        }

        @keyframes sonarClick {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.68), 0 0 42px rgba(56, 189, 248, 0.62); }
            100% { box-shadow: 0 0 0 34px rgba(56, 189, 248, 0), 0 0 42px rgba(56, 189, 248, 0.28); }
        }

        /* 10 秒主視覺影片：完整顯示，不裁切 */
        #intro-video-stage {
            position: fixed;
            inset: 0;
            z-index: 110;
            display: none;
            align-items: center;
            justify-content: center;
            width: 100vw;
            min-height: 100vh;
            min-height: 100svh;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            background: #000;
            opacity: 0;
            transition: opacity 0.7s ease;
        }

        #intro-video-stage.active { display: flex; opacity: 1; }

        #intro-video {
            display: block;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: 100dvh;
            object-fit: contain;
            object-position: center center;
            background: #000;
        }

        .video-note {
            position: absolute;
            left: 50%;
            bottom: max(20px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            padding: 8px 16px;
            border-radius: 999px;
            color: rgba(226, 232, 240, 0.88);
            background: rgba(0, 0, 0, 0.42);
            border: 1px solid rgba(148, 163, 184, 0.22);
            font-size: 13px;
            letter-spacing: 0.12em;
            pointer-events: none;
        }

        /* 製作團隊 5 秒 */
        #team-stage {
            position: fixed;
            inset: 0;
            z-index: 108;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            background:
                radial-gradient(circle at 50% 34%, rgba(14, 165, 233, 0.30), transparent 34%),
                linear-gradient(180deg, #020617 0%, #05111d 52%, #000 100%);
            opacity: 0;
            transition: opacity 0.7s ease;
            padding: 24px;
        }

        #team-stage.active { display: flex; opacity: 1; }

        .team-text {
            line-height: 1.9;
            text-shadow: 0 0 22px rgba(56, 189, 248, 0.55), 0 8px 26px rgba(0,0,0,0.88);
            animation: teamIn 4.9s ease forwards;
        }

        .team-school {
            font-size: clamp(28px, 4.8vw, 64px);
            font-weight: 900;
            letter-spacing: 0.18em;
            color: #f8fafc;
        }

        .team-name {
            font-size: clamp(34px, 6vw, 78px);
            font-weight: 950;
            letter-spacing: 0.24em;
            text-indent: 0.24em;
            color: #7dd3fc;
        }

        .team-members {
            font-size: clamp(20px, 3.2vw, 42px);
            font-weight: 800;
            letter-spacing: 0.10em;
            color: #e0f2fe;
        }

        @keyframes teamIn {
            0% { opacity: 0; filter: blur(10px); transform: translateY(20px) scale(0.96); }
            16%, 82% { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); }
            100% { opacity: 0; filter: blur(8px); transform: translateY(-16px) scale(1.02); }
        }

        /* 電影黑邊 */
        .letterbox {
            position: absolute;
            left: 0;
            width: 100%;
            height: 12%;
            background: #000;
            z-index: 50;
        }
        #letterbox-top { top: 0; }
        #letterbox-bottom { bottom: 0; }

        /* 字幕區 */
        #subtitle-container {
            position: absolute;
            bottom: 15%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 60;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            padding: 0 16px;
        }

        #speaker-name {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 5px;
            font-weight: bold;
            background: rgba(15, 23, 42, 0.8);
            padding: 4px 12px;
            border-radius: 4px;
            border-left: 3px solid var(--accent);
        }

        #subtitle {
            font-size: clamp(18px, 2.3vw, 30px);
            line-height: 1.6;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,1);
            max-width: min(960px, 86vw);
            background: rgba(0, 0, 0, 0.6);
            padding: clamp(12px, 2vw, 18px) clamp(18px, 3vw, 34px);
            border-radius: 12px;
            backdrop-filter: blur(8px);
            letter-spacing: 1.2px;
            white-space: pre-wrap;
        }

        /* 角色名牌 */
        #labels-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 40;
        }

        .name-label {
            position: absolute;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: bold;
            color: white;
            background: rgba(30, 41, 59, 0.8);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            opacity: 0;
            white-space: nowrap;
        }

        /* 特效層 */
        #flash-fx {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            opacity: 0;
            z-index: 90;
            pointer-events: none;
        }

        #sub-hud {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            border: 30px solid rgba(56, 189, 248, 0.15);
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 1s;
            z-index: 45;
        }
        
        .hud-line {
            position: absolute;
            width: 100%; height: 1px;
            background: rgba(56, 189, 248, 0.3);
            top: 50%;
        }

        #music-indicator {
            position: absolute;
            z-index: 70;
            right: max(18px, env(safe-area-inset-right));
            top: max(18px, env(safe-area-inset-top));
            padding: 8px 12px;
            border-radius: 999px;
            color: #bae6fd;
            background: rgba(15, 23, 42, 0.58);
            border: 1px solid rgba(56, 189, 248, 0.28);
            font-size: 12px;
            letter-spacing: 0.08em;
            backdrop-filter: blur(8px);
        }

        canvas { display: block; }

        @media (orientation: portrait) {
            #intro-video {
                width: 100vw;
                height: 100dvh;
                object-fit: contain;
            }
            .letterbox { height: 9%; }
            #subtitle-container { bottom: 11%; }
            #sub-hud { border-width: 18px; }
        }

        @media (max-width: 680px) {
            .title { letter-spacing: 0.10em; text-indent: 0.10em; }
            #play-btn { width: min(100%, 340px); padding-inline: 24px; }
            .video-note { font-size: 11px; width: max-content; max-width: 88vw; }
            .team-school, .team-name, .team-members { letter-spacing: 0.08em; text-indent: 0; }
            #music-indicator { display: none; }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="opening-card">
            <h1 class="title">四接疑雲</h1>
            <div class="subtitle-line">高雄市立瑞祥高中｜海洋探險隊</div>
            <button id="play-btn">點擊開始</button>
        </div>
    </div>

    <section id="intro-video-stage" aria-label="01-第一組主視覺動畫">
        <video id="intro-video" playsinline webkit-playsinline preload="auto"></video>
        <div class="video-note">01-第一組主視覺動畫｜完整顯示・自適應比例</div>
    </section>

    <section id="team-stage" aria-label="製作團隊介紹">
        <div class="team-text">
            <div class="team-school">高雄市立瑞祥高中</div>
            <div class="team-name">海洋探險隊</div>
            <div class="team-members">安翊、子晴、舜丞、威仁</div>
        </div>
    </section>

    <div id="flash-fx"></div>
    <div id="sub-hud"><div class="hud-line"></div></div>
    <div id="music-indicator">配樂：待機</div>

    <div class="letterbox" id="letterbox-top"></div>
    <div class="letterbox" id="letterbox-bottom"></div>

    <div id="labels-container"></div>

    <div id="subtitle-container">
        <div id="speaker-name"></div>
        <div id="subtitle"></div>
    </div>

    <script>
        // 不依賴 Three.js / module 的啟動備援：避免手機或 CDN 模組載入失敗時按鈕無反應。
        window.__sijieSequenceStarted = false;

        window.playOceanClickSound = function playOceanClickSound() {
            const AudioContextClass = window.AudioContext || window.webkitAudioContext;
            if (!AudioContextClass) return;
            const ctx = window.__sijieAudioContext || new AudioContextClass();
            window.__sijieAudioContext = ctx;
            if (ctx.state === 'suspended') ctx.resume();

            const now = ctx.currentTime;
            const master = ctx.createGain();
            master.gain.setValueAtTime(0.0001, now);
            master.gain.exponentialRampToValueAtTime(0.42, now + 0.015);
            master.gain.exponentialRampToValueAtTime(0.0001, now + 0.52);
            master.connect(ctx.destination);

            // 低頻「深海艙門啟動」
            const low = ctx.createOscillator();
            low.type = 'sine';
            low.frequency.setValueAtTime(88, now);
            low.frequency.exponentialRampToValueAtTime(48, now + 0.46);
            low.connect(master);
            low.start(now);
            low.stop(now + 0.55);

            // 高頻「聲納 ping」
            const pingGain = ctx.createGain();
            pingGain.gain.setValueAtTime(0.0001, now + 0.04);
            pingGain.gain.exponentialRampToValueAtTime(0.24, now + 0.075);
            pingGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.36);
            pingGain.connect(master);

            const ping = ctx.createOscillator();
            ping.type = 'triangle';
            ping.frequency.setValueAtTime(620, now + 0.04);
            ping.frequency.exponentialRampToValueAtTime(1100, now + 0.14);
            ping.frequency.exponentialRampToValueAtTime(420, now + 0.34);
            ping.connect(pingGain);
            ping.start(now + 0.04);
            ping.stop(now + 0.38);
        };

        window.__startThreeTrailerWhenReady = function __startThreeTrailerWhenReady() {
            const subtitleBox = document.getElementById('subtitle-container');
            const speaker = document.getElementById('speaker-name');
            const subtitle = document.getElementById('subtitle');
            const note = document.getElementById('music-indicator');
            const startedAt = Date.now();

            function showLoadingMessage() {
                if (note) note.textContent = '系統：正在載入 Three.js 海底場景';
                if (subtitleBox && speaker && subtitle) {
                    speaker.textContent = '系統';
                    subtitle.textContent = '正在載入原本 Three.js 海底畫面，請稍候……';
                    subtitleBox.style.opacity = 1;
                }
            }

            function tryStart() {
                if (typeof window.__startThreeTrailer === 'function') {
                    if (subtitleBox) subtitleBox.style.opacity = 0;
                    window.__startThreeTrailer();
                    return;
                }
                showLoadingMessage();
                if (Date.now() - startedAt < 12000) {
                    setTimeout(tryStart, 250);
                } else if (subtitleBox && speaker && subtitle) {
                    speaker.textContent = '系統';
                    subtitle.textContent = 'Three.js 海底場景尚未載入完成。請確認網路可連接 cdnjs.cloudflare.com，或重新整理後再點擊開始。';
                    subtitleBox.style.opacity = 1;
                }
            }

            tryStart();
        };

        window.__fallbackStartOpening = function __fallbackStartOpening() {
            if (window.__sijieSequenceStarted) return;
            window.__sijieSequenceStarted = true;
            window.__sijieFallbackOpening = true;
            const playBtn = document.getElementById('play-btn');
            const overlay = document.getElementById('overlay');
            const stage = document.getElementById('intro-video-stage');
            const video = document.getElementById('intro-video');
            const team = document.getElementById('team-stage');

            if (playBtn) playBtn.disabled = true;
            if (overlay) {
                overlay.style.opacity = 0;
                setTimeout(() => overlay.style.display = 'none', 900);
            }

            const introUrl = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/5ebc03782161436801091e4f91d3fdba1e1c116c/01-%E7%AC%AC%E4%B8%80%E7%B5%84%E8%B3%87%E6%BA%90/002-%E5%BD%B1%E7%89%87%E4%B8%BB%E8%A6%96%E8%A6%BA/01-%E7%AC%AC%E4%B8%80%E7%B5%84%E4%B8%BB%E8%A6%96%E8%A6%BA%E5%8B%95%E7%95%AB.mp4';
            if (stage) {
                stage.style.display = 'flex';
                requestAnimationFrame(() => stage.classList.add('active'));
            }
            if (video) {
                video.src = introUrl;
                video.playsInline = true;
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');
                try { video.currentTime = 0; } catch (error) {}
                const playAttempt = video.play();
                if (playAttempt && playAttempt.catch) playAttempt.catch(() => {});
            }

            setTimeout(() => {
                try { if (video) video.pause(); } catch (error) {}
                if (stage) {
                    stage.classList.remove('active');
                    setTimeout(() => stage.style.display = 'none', 650);
                }
                if (team) {
                    team.style.display = 'flex';
                    requestAnimationFrame(() => team.classList.add('active'));
                }
            }, 10000);

            setTimeout(() => {
                if (team) {
                    team.classList.remove('active');
                    setTimeout(() => team.style.display = 'none', 650);
                }
                window.__startThreeTrailerWhenReady();
            }, 15000);
        };

        document.addEventListener('DOMContentLoaded', () => {
            const btn = document.getElementById('play-btn');
            if (!btn) return;
            btn.addEventListener('pointerdown', () => {
                window.playOceanClickSound();
                btn.classList.remove('clicked');
                void btn.offsetWidth;
                btn.classList.add('clicked');
            }, { passive: true });
            btn.addEventListener('click', () => {
                setTimeout(() => {
                    if (!window.__sijieSequenceStarted && !btn.disabled) window.__fallbackStartOpening();
                }, 180);
            }, { passive: true });
        });
    </script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.module.min.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const RESOURCE_BASE = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/5ebc03782161436801091e4f91d3fdba1e1c116c/01-%E7%AC%AC%E4%B8%80%E7%B5%84%E8%B3%87%E6%BA%90/';
        const INTRO_VIDEO_URL = RESOURCE_BASE + '002-%E5%BD%B1%E7%89%87%E4%B8%BB%E8%A6%96%E8%A6%BA/01-%E7%AC%AC%E4%B8%80%E7%B5%84%E4%B8%BB%E8%A6%96%E8%A6%BA%E5%8B%95%E7%95%AB.mp4';
        const MUSIC_URLS = {
            first: RESOURCE_BASE + '003-%E8%83%8C%E6%99%AF%E9%9F%B3%E6%A8%82/%E6%B5%B7%E5%BA%95%E5%A3%93%E7%97%95.mp3%20%E7%AC%AC%E4%B8%80%E6%AE%B5.mp3',
            second: RESOURCE_BASE + '003-%E8%83%8C%E6%99%AF%E9%9F%B3%E6%A8%82/%E7%8B%B9%E7%B8%AB%E5%A5%94%E9%80%83.mp3%20%E7%AC%AC%E4%BA%8C%E6%AE%B5.mp3',
            third: RESOURCE_BASE + '003-%E8%83%8C%E6%99%AF%E9%9F%B3%E6%A8%82/%E7%A0%B4%E6%9B%89%E5%9B%9E%E8%81%B2.mp3%20%E7%AC%AC%E4%B8%89%E6%AE%B5.mp3'
        };

        const INTRO_VIDEO_MS = 10000;
        const TEAM_MS = 5000;
        const MUSIC_BOUNDARIES = {
            firstEnd: 59000,
            secondEnd: 143000
        };

        // --- 變數定義 ---
        let scene, camera, renderer, clock = new THREE.Clock();
        let npcs = {}, corals = [], seaFloor, submarine;
        let isPlaying = false, startTime = 0, currentTimelineIndex = -1;
        let currentMusicKey = null;
        const musicIndicator = document.getElementById('music-indicator');

        const audioTracks = {
            first: new Audio(MUSIC_URLS.first),
            second: new Audio(MUSIC_URLS.second),
            third: new Audio(MUSIC_URLS.third)
        };

        Object.values(audioTracks).forEach(audio => {
            audio.preload = 'auto';
            audio.loop = true;
            audio.volume = 0;
            audio.crossOrigin = 'anonymous';
        });

        // 目標狀態 (用於 Lerp 平滑動畫)
        let dirState = {
            camPos: new THREE.Vector3(20, 20, 20),
            camLook: new THREE.Vector3(0, 0, 0),
            bgColor: new THREE.Color(0x001e3c),
            oil: 0,
            coralS: 1.0,
            coralC: new THREE.Color(0x4ade80),
            shake: 0,
            labels: false,
            hud: 0
        };

        // 當前狀態
        let curState = {
            camPos: new THREE.Vector3(20, 20, 20),
            camLook: new THREE.Vector3(0, 0, 0),
            bgColor: new THREE.Color(0x001e3c),
            oil: 0,
            coralS: 1.0,
            coralC: new THREE.Color(0x4ade80)
        };

        const CHARS = {
            shun: { name: "科學家 舜丞", color: 0x38bdf8, pos: [0, 0, -2] },
            zi: { name: "白海豚 子晴", color: 0xffffff, pos: [-5, 1.5, 4] },
            yi: { name: "安翊 (人類)", color: 0x94a3b8, pos: [5, 0, 5] },
            wei: { name: "師妹 威仁", color: 0xf472b6, pos: [-3, 0, -4] }
        };

        // --- 核心工具：設定鏡頭目標 ---
        function setCamera(px, py, pz, lx, ly, lz) {
            dirState.camPos.set(px, py, pz);
            dirState.camLook.set(lx, ly, lz);
        }

        // --- 主預告片時間軸：開頭影片與製作團隊已獨立處理，因此此處從第一大段開始 ---
        const TIMELINE = [
            { time: 0, speaker: "子晴 (白海豚)", text: "看看這片清澈的大海，珊瑚好漂亮啊！\n欸怎麼了？為什麼海上突然出現一片灰色？那些魚都逃走了！", action: () => {
                setCamera(-8, 3, 6, -5, 1.5, 4);
                dirState.labels = true;
                dirState.oil = 0.2;
                dirState.bgColor.setHex(0x2a3a4a);
                playMusic('first');
            }},
            { time: 13000, speaker: "安翊 (人類)", text: "應該是最近四接的議題吧，吵得沸沸騰騰的。\n有民眾在環保署抗議。不知道最後會怎麼發展。", action: () => {
                setCamera(8, 2, 7, 5, 0, 5);
            }},
            { time: 26000, speaker: "子晴 (白海豚)", text: "我不知道到底是做還是不做這個政策，哪個決定會對海洋比較好...\n我只希望大海能永遠是我記憶中美好的樣子。", action: () => {
                setCamera(0, 15, 20, 0, 0, 0);
                dirState.shake = 0.03;
            }},
            { time: 59000, speaker: "師妹 威仁", text: "看！巨大的機具陰影壟罩了海床，猛烈的水流捲起泥沙！\n清澈的藍色被污泥與油膜覆蓋，魚群驚慌竄逃。", action: () => {
                playMusic('second');
                dirState.hud = 1;
                dirState.oil = 0.8;
                dirState.bgColor.setHex(0x111827);
                setCamera(0, 2, 10, 0, 1, 0); 
            }},
            { time: 79000, speaker: "科學家 舜丞", text: "曾經這片蔚藍的基隆海域是漁民的根基，是生命的搖籃。\n直到四接議題出現，激烈的論戰打破了寧靜。", action: () => {
                setCamera(2, 2, -3, 0, 0, -2);
                dirState.coralC.setHex(0x94a3b8);
                dirState.coralS = 0.7;
            }},
            { time: 102000, speaker: "師妹 威仁", text: "真的沒有什麼解決辦法嗎？我真的會很傷心...\n海洋科學家，真的沒有辦法了嗎？", action: () => {
                setCamera(-4, 1.5, -5, -3, 0, -4);
                dirState.shake = 0.08;
            }},
            { time: 119000, speaker: "科學家 舜丞", text: "有是有啦...但需要一位技術高超的勘探員和靈活的潛水艇。\n我們不能再給海洋造成第二次傷害。", action: () => {
                dirState.shake = 0;
                flashEffect();
                dirState.bgColor.setHex(0x0077be);
                setCamera(0, 10, 25, 0, 0, 0);
            }},
            { time: 143000, speaker: "安翊 (人類)", text: "這是一款關於「四接」爭議的遊戲。\n你將駕駛潛艇在海底探索，在開發與保育間做出兩難抉擇。", action: () => {
                dirState.hud = 1;
                setCamera(0, 3, 8, 0, 2, -10);
            }},
            { time: 160000, speaker: "科學家 舜丞", text: "這不只是幾度電的取捨，這是與海的共存。\n開發，不該以犧牲海洋作為代價。", action: () => {
                playMusic('third');
                dirState.coralS = 1.0;
                dirState.coralC.setHex(0x4ade80);
                dirState.oil = 0.3;
                setCamera(10, 5, 10, 0, 0, 0);
            }},
            { time: 172000, speaker: "結語", text: "「在開發的腳步前行時，不妨留下一點空間，去感受海洋的回應。」\n立即下載：四接疑雲", action: () => {
                dirState.hud = 0;
                dirState.labels = false;
                setCamera(40, 30, 40, 0, 0, 0);
            }},
            { time: 180000, action: () => endTrailer() }
        ];

        // --- 初始化 ---
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            // 海床
            seaFloor = new THREE.Mesh(
                new THREE.PlaneGeometry(300, 300),
                new THREE.MeshStandardMaterial({ color: 0x001e3c })
            );
            seaFloor.rotation.x = -Math.PI/2;
            scene.add(seaFloor);

            createEnvironment();
            setupNPCs();

            window.__threeSceneReady = true;
            window.__startThreeTrailer = startTrailer;
            window.startOpeningSequence = startOpeningSequence;
            const playButton = document.getElementById('play-btn');
            playButton.onclick = () => {
                if (window.__sijieSequenceStarted) return;
                if (window.playOceanClickSound) window.playOceanClickSound();
                playButton.classList.remove('clicked');
                void playButton.offsetWidth;
                playButton.classList.add('clicked');
                startOpeningSequence();
            };
            window.addEventListener('resize', onWindowResize);
            
            renderer.render(scene, camera);
        }

        function setupNPCs() {
            const container = document.getElementById('labels-container');
            for (const [id, data] of Object.entries(CHARS)) {
                const group = new THREE.Group();
                const body = new THREE.Mesh(
                    new THREE.CapsuleGeometry(0.3, 1, 4, 12), 
                    new THREE.MeshStandardMaterial({ color: data.color })
                );
                body.position.y = 0.8;
                group.add(body);
                group.position.set(...data.pos);
                scene.add(group);
                npcs[id] = group;

                const label = document.createElement('div');
                label.className = 'name-label';
                label.innerText = data.name;
                label.id = `label-${id}`;
                container.appendChild(label);
            }

            // 潛水艇
            const subGeo = new THREE.BoxGeometry(2, 1, 3);
            submarine = new THREE.Mesh(subGeo, new THREE.MeshStandardMaterial({ color: 0xfacc15 }));
            submarine.position.set(0, 3, 0);
            scene.add(submarine);
        }

        function createEnvironment() {
            for(let i=0; i<120; i++) {
                const h = Math.random() * 1.5 + 0.5;
                const c = new THREE.Mesh(
                    new THREE.ConeGeometry(0.2, h, 6),
                    new THREE.MeshStandardMaterial({ color: 0x4ade80 })
                );
                c.position.set(Math.random()*80-40, h/2, Math.random()*80-40);
                corals.push(c);
                scene.add(c);
            }
        }

        function animate() {
            if (!isPlaying) return;
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1);
            const elapsed = Date.now() - startTime;

            syncMusicByTime(elapsed);

            // 時間軸邏輯
            if (currentTimelineIndex < TIMELINE.length - 1) {
                if (elapsed >= TIMELINE[currentTimelineIndex + 1].time) {
                    currentTimelineIndex++;
                    const ev = TIMELINE[currentTimelineIndex];
                    if (ev.action) ev.action();
                    updateSubtitle(ev.speaker, ev.text);
                }
            }

            // 平滑過渡狀態
            curState.camPos.lerp(dirState.camPos, dt * 2);
            curState.camLook.lerp(dirState.camLook, dt * 2);
            curState.bgColor.lerp(dirState.bgColor, dt);
            curState.oil = THREE.MathUtils.lerp(curState.oil, dirState.oil, dt);
            curState.coralS = THREE.MathUtils.lerp(curState.coralS, dirState.coralS, dt);
            curState.coralC.lerp(dirState.coralC, dt);

            // 更新畫面
            let s = (Math.random()-0.5) * dirState.shake;
            camera.position.set(curState.camPos.x + s, curState.camPos.y + s, curState.camPos.z + s);
            camera.lookAt(curState.camLook);

            scene.background = curState.bgColor;
            scene.fog = new THREE.FogExp2(curState.bgColor, 0.04);
            seaFloor.material.color.set(0x001e3c).lerp(new THREE.Color(0x000000), curState.oil);

            corals.forEach(c => {
                c.scale.y = curState.coralS;
                c.material.color.copy(curState.coralC);
            });

            // 潛水艇移動
            if(dirState.hud > 0) {
                submarine.position.z -= dt * 5;
                if(submarine.position.z < -40) submarine.position.z = 40;
            }
            document.getElementById('sub-hud').style.opacity = dirState.hud;

            updateLabels();
            renderer.render(scene, camera);
        }

        function updateSubtitle(speaker, text) {
            const container = document.getElementById('subtitle-container');
            const spk = document.getElementById('speaker-name');
            const sub = document.getElementById('subtitle');
            
            container.style.opacity = 0;
            if(!text) return;

            setTimeout(() => {
                spk.innerText = speaker || '';
                sub.innerText = text;
                container.style.opacity = 1;
                spk.style.display = speaker ? 'block' : 'none';
            }, 300);
        }

        function updateLabels() {
            for(const [id, n] of Object.entries(npcs)) {
                const el = document.getElementById(`label-${id}`);
                if(!dirState.labels) { el.style.opacity = 0; continue; }
                const v = n.position.clone();
                v.y += 2;
                v.project(camera);
                if(v.z > 1) { el.style.opacity = 0; }
                else {
                    el.style.opacity = 1;
                    el.style.left = `${(v.x * 0.5 + 0.5) * window.innerWidth}px`;
                    el.style.top = `${(v.y * -0.5 + 0.5) * window.innerHeight}px`;
                }
            }
        }

        function flashEffect() {
            const f = document.getElementById('flash-fx');
            f.style.opacity = 0.8;
            setTimeout(() => f.style.opacity = 0, 200);
        }

        async function startOpeningSequence() {
            if (window.__sijieSequenceStarted) return;
            window.__sijieSequenceStarted = true;
            const ov = document.getElementById('overlay');
            document.getElementById('play-btn').disabled = true;
            ov.style.opacity = 0;
            setTimeout(() => ov.style.display = 'none', 900);
            await showIntroVideo();
            await showTeamStage();
            startTrailer();
        }

        function showIntroVideo() {
            return new Promise(resolve => {
                const stage = document.getElementById('intro-video-stage');
                const video = document.getElementById('intro-video');
                stage.style.display = 'flex';
                requestAnimationFrame(() => stage.classList.add('active'));

                let finished = false;
                const finish = () => {
                    if (finished) return;
                    finished = true;
                    clearTimeout(hardStop);
                    video.removeEventListener('timeupdate', checkTime);
                    video.removeEventListener('ended', finish);
                    video.removeEventListener('error', finish);
                    try { video.pause(); } catch (error) {}
                    stage.classList.remove('active');
                    setTimeout(() => {
                        stage.style.display = 'none';
                        resolve();
                    }, 700);
                };
                const checkTime = () => {
                    if (video.currentTime * 1000 >= INTRO_VIDEO_MS) finish();
                };
                const hardStop = setTimeout(finish, INTRO_VIDEO_MS + 900);

                video.src = INTRO_VIDEO_URL;
                video.playsInline = true;
                video.setAttribute('playsinline', '');
                video.setAttribute('webkit-playsinline', '');
                try { video.currentTime = 0; } catch (error) {}
                video.addEventListener('loadedmetadata', () => {
                    try { video.currentTime = 0; } catch (error) {}
                }, { once: true });
                video.addEventListener('timeupdate', checkTime);
                video.addEventListener('ended', finish);
                video.addEventListener('error', finish);
                const playAttempt = video.play();
                if (playAttempt && playAttempt.catch) {
                    playAttempt.catch(() => {
                        // 若瀏覽器或網路阻擋遠端影片，仍於 10 秒後進入下一段。
                    });
                }
            });
        }

        function showTeamStage() {
            return new Promise(resolve => {
                const stage = document.getElementById('team-stage');
                stage.style.display = 'flex';
                requestAnimationFrame(() => stage.classList.add('active'));
                setTimeout(() => {
                    stage.classList.remove('active');
                    setTimeout(() => {
                        stage.style.display = 'none';
                        resolve();
                    }, 700);
                }, TEAM_MS);
            });
        }

        function startTrailer() {
            if (isPlaying) return;
            const introStage = document.getElementById('intro-video-stage');
            const teamStage = document.getElementById('team-stage');
            const overlay = document.getElementById('overlay');
            if (introStage) { introStage.classList.remove('active'); introStage.style.display = 'none'; }
            if (teamStage) { teamStage.classList.remove('active'); teamStage.style.display = 'none'; }
            if (overlay) { overlay.style.display = 'none'; overlay.style.opacity = 0; }
            isPlaying = true;
            startTime = Date.now();
            currentTimelineIndex = -1;
            clock.start();
            animate();
        }

        function syncMusicByTime(elapsed) {
            if (elapsed < MUSIC_BOUNDARIES.firstEnd) playMusic('first');
            else if (elapsed < MUSIC_BOUNDARIES.secondEnd) playMusic('second');
            else playMusic('third');
        }

        function playMusic(key) {
            if (currentMusicKey === key) return;
            const next = audioTracks[key];
            const previous = currentMusicKey ? audioTracks[currentMusicKey] : null;
            currentMusicKey = key;

            if (previous) fadeOut(previous);
            if (next) {
                try {
                    next.currentTime = 0;
                    next.volume = 0;
                    next.play().then(() => fadeIn(next, 0.42)).catch(() => {});
                } catch (error) {}
            }

            const names = {
                first: '海底壓痕｜第一段',
                second: '狹縫奔逃｜第二段',
                third: '破曉回聲｜第三段'
            };
            musicIndicator.textContent = `配樂：${names[key] || '待機'}`;
        }

        function fadeIn(audio, targetVolume) {
            const step = () => {
                if (audio.paused) return;
                audio.volume = Math.min(targetVolume, audio.volume + 0.035);
                if (audio.volume < targetVolume) requestAnimationFrame(step);
            };
            step();
        }

        function fadeOut(audio) {
            const step = () => {
                audio.volume = Math.max(0, audio.volume - 0.055);
                if (audio.volume > 0.001) requestAnimationFrame(step);
                else {
                    audio.pause();
                    audio.currentTime = 0;
                }
            };
            step();
        }

        function stopAllMusic() {
            Object.values(audioTracks).forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
                audio.volume = 0;
            });
            currentMusicKey = null;
            musicIndicator.textContent = '配樂：結束';
        }

        function endTrailer() {
            isPlaying = false;
            stopAllMusic();
            const ov = document.getElementById('overlay');
            ov.style.display = 'flex';
            ov.style.opacity = 1;
            ov.innerHTML = `<div class="opening-card"><div class="title" style="font-size:clamp(38px,7vw,88px)">謝 謝 觀 賞</div><div class="subtitle-line">為了海洋的明天，我們一起努力</div></div>`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        window.onload = init;
    </script>
</body>
</html>
