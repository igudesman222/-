<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>五達悟：生計與文化之戰 - 官方預告片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght=700;900&display=swap');

        html,
        body {
            width: 100%;
            height: 100%;
        }

        body {
            margin: 0;
            background: #000;
            color: #f8fafc;
            font-family: 'Noto Serif TC', serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100svh;
            min-height: calc(var(--vh, 1vh) * 100);
        }

        #trailer-container {
            position: relative;
            width: 100vw;
            width: 100dvw;
            height: 100vh;
            height: 100svh;
            height: calc(var(--vh, 1vh) * 100);
            background: #000;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            filter: contrast(1.2) brightness(1.1);
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 30%, rgba(0, 0, 0, 0.9) 100%);
            pointer-events: none;
            z-index: 10;
        }

        #caption-overlay {
            position: absolute;
            bottom: 8%;
            left: 0;
            width: 100%;
            text-align: center;
            z-index: 100;
            pointer-events: none;
            display: flex;
            justify-content: center;
        }

        .caption-text {
            width: min(92vw, 1180px);
            max-height: 34vh;
            overflow: hidden;
            padding: 0.8rem 1.2rem;
            border-radius: 1rem;
            background: linear-gradient(180deg, rgba(2, 6, 23, 0.15), rgba(2, 6, 23, 0.62));
            font-size: clamp(1.05rem, 2.8vw, 2.1rem);
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px rgba(14, 165, 233, 0.9), 0 0 30px rgba(0, 0, 0, 1);
            letter-spacing: clamp(0.08rem, 0.5vw, 0.28rem);
            line-height: 1.55;
            opacity: 0;
            transform: translateY(20px);
            white-space: pre-line;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1), text-shadow 0.25s ease, color 0.25s ease;
        }

        .caption-text.speaker-wutao {
            color: #e0f7ff;
            text-shadow:
                0 0 8px rgba(186, 230, 253, 0.98),
                0 0 18px rgba(56, 189, 248, 0.95),
                0 0 34px rgba(14, 165, 233, 0.95),
                0 0 56px rgba(8, 145, 178, 0.8),
                0 0 30px rgba(0, 0, 0, 1);
        }

        .caption-text.speaker-enemy {
            color: #ffe4e6;
            text-shadow:
                0 0 8px rgba(254, 205, 211, 0.98),
                0 0 18px rgba(251, 113, 133, 0.95),
                0 0 34px rgba(225, 29, 72, 0.95),
                0 0 58px rgba(159, 18, 57, 0.88),
                0 0 30px rgba(0, 0, 0, 1);
        }

        .caption-text.speaker-elder {
            color: #f3e8ff;
            text-shadow:
                0 0 8px rgba(233, 213, 255, 0.98),
                0 0 18px rgba(192, 132, 252, 0.96),
                0 0 34px rgba(147, 51, 234, 0.95),
                0 0 58px rgba(126, 34, 206, 0.88),
                0 0 30px rgba(0, 0, 0, 1);
        }

        #timecode {
            position: absolute;
            top: max(14px, env(safe-area-inset-top));
            right: max(14px, env(safe-area-inset-right));
            z-index: 180;
            padding: 8px 14px;
            border: 1px solid rgba(125, 211, 252, 0.45);
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.72);
            color: #e0f2fe;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: clamp(0.78rem, 1.8vw, 1rem);
            letter-spacing: 0.08rem;
            box-shadow: 0 0 18px rgba(14, 165, 233, 0.25);
            backdrop-filter: blur(8px);
            pointer-events: none;
        }

        #scene-tag {
            position: absolute;
            top: max(58px, calc(env(safe-area-inset-top) + 50px));
            left: max(18px, env(safe-area-inset-left));
            z-index: 120;
            color: rgba(186, 230, 253, 0.9);
            font-size: clamp(0.8rem, 1.8vw, 1rem);
            letter-spacing: 0.18rem;
            text-shadow: 0 0 12px rgba(14, 165, 233, 0.6);
            pointer-events: none;
        }

        #title-card {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }

        #fake-ui {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 1s;
        }

        .hp-bar-container {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 320px;
        }

        .hp-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            width: 100%;
            box-shadow: 0 0 15px #0ea5e9;
            transition: width 0.3s;
        }

        #start-btn {
            z-index: 300;
            padding: 18px 48px;
            border: 1px solid rgba(14, 165, 233, 0.5);
            background: rgba(14, 165, 233, 0.1);
            color: #0ea5e9;
            font-weight: 900;
            letter-spacing: 0.2rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.4s;
            backdrop-filter: blur(4px);
        }

        #start-btn:hover {
            background: #0ea5e9;
            color: #fff;
            box-shadow: 0 0 40px rgba(14, 165, 233, 0.6);
            transform: scale(1.05);
        }

        #domain-flash {
            position: absolute;
            inset: 0;
            z-index: 150;
            background: #fff;
            opacity: 0;
            pointer-events: none;
        }

        #opening-visual-bg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: calc(var(--vh, 1vh) * 100);
            object-fit: contain;
            object-position: center center;
            z-index: 0;
            pointer-events: none;
            background: #000;
        }

        #video-intro {
            position: absolute;
            inset: 0;
            z-index: 400;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            opacity: 1;
            transition: opacity 1s ease-in-out;
        }

        #video-intro video {
            width: 100%;
            height: 100%;
            max-width: 100vw;
            max-height: calc(var(--vh, 1vh) * 100);
            object-fit: contain;
            object-position: center center;
            pointer-events: none;
            border: none;
            background: #000;
        }

        .audio-status {
            position: absolute;
            left: 50%;
            bottom: max(18px, env(safe-area-inset-bottom));
            transform: translateX(-50%);
            z-index: 1000;
            padding: 8px 14px;
            border: 1px solid rgba(56, 189, 248, 0.45);
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.72);
            color: #e0f2fe;
            font: 700 12px/1.4 system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
            letter-spacing: 0.08em;
            backdrop-filter: blur(8px);
            pointer-events: none;
            opacity: 0;
            transition: opacity .35s ease;
            max-width: min(88vw, 560px);
            text-align: center;
        }

        .audio-status.show {
            opacity: 1;
        }

        .mobile-audio-btn {
            position: absolute;
            left: 50%;
            bottom: calc(max(18px, env(safe-area-inset-bottom)) + 42px);
            transform: translateX(-50%);
            z-index: 1001;
            display: none;
            padding: 12px 20px;
            border-radius: 999px;
            border: 1px solid rgba(125, 211, 252, .7);
            background: rgba(14, 165, 233, .92);
            color: white;
            font-weight: 900;
            letter-spacing: .12em;
            box-shadow: 0 0 24px rgba(14, 165, 233, .45);
        }

        .mobile-audio-btn.show {
            display: block;
        }

        @media (orientation: portrait) {

            #opening-visual-bg,
            #video-intro video {
                width: 100vw;
                height: calc(var(--vh, 1vh) * 100);
                object-fit: contain;
            }
        }

        @media (orientation: landscape) {

            #opening-visual-bg,
            #video-intro video {
                width: 100vw;
                height: calc(var(--vh, 1vh) * 100);
                object-fit: contain;
            }
        }
    </style>
</head>

<body>

    <div id="trailer-container">
        <div class="vignette"></div>
        <div id="domain-flash"></div>
        <div id="timecode">00:00</div>
        <div id="scene-tag">PONGSO NO TAO</div>
        <canvas id="trailerCanvas"></canvas>

        <div id="caption-overlay">
            <div id="caption" class="caption-text"></div>
        </div>

        <div id="fake-ui">
            <div class="hp-bar-container">
                <div class="hp-bar">
                    <div id="hp-fill" class="hp-fill"></div>
                </div>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-[10px] font-bold text-sky-400 tracking-tighter">五達悟 (WUTAO)</span>
                    <span class="text-[10px] font-mono text-sky-500">咒力同步: 120%</span>
                </div>
            </div>
            <div class="absolute top-12 right-12 text-right">
                <div id="combo-text" class="text-5xl font-black text-white italic tracking-tighter">0 HIT</div>
                <div id="status-text" class="text-sky-400 text-xs mt-1 font-bold uppercase tracking-widest">穩固中...</div>
            </div>
        </div>

        <div id="title-card">
            <h1 class="text-6xl md:text-8xl font-black text-white mb-4 tracking-[1.5rem] md:tracking-[3rem] drop-shadow-2xl">五達悟</h1>
            <h2 class="text-xl md:text-3xl text-sky-500 font-bold tracking-[0.5rem] md:tracking-[1rem]">PONGSO NO TAO : 海之哀歌</h2>
            <div class="h-px w-64 bg-sky-900 my-12"></div>
            <p class="text-slate-500 font-mono tracking-widest uppercase">Coming Soon 2026 / 雅美靈魂</p>
        </div>

        <div id="overlay" class="absolute inset-0 flex flex-col items-center justify-center z-[500] bg-black">
            <video id="opening-visual-bg" autoplay muted loop playsinline preload="auto">
                <source src="https://raw.githubusercontent.com/igudesman222/igudesman2012/main/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90/04-001-%E5%BD%B1%E7%89%87/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E4%B8%BB%E8%A6%96%E8%A6%BA%E5%8B%95%E7%95%AB%28new%29.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-black/60 pointer-events-none z-[1]"></div>

            <div class="relative mb-8 z-10">
                <div class="w-24 h-24 border-2 border-sky-900 rounded-full animate-ping absolute"></div>
                <div class="w-24 h-24 border-2 border-sky-500 rounded-full flex items-center justify-center">
                    <div class="w-16 h-16 bg-sky-500/20 rounded-full animate-pulse"></div>
                </div>
            </div>
            <button id="start-btn" class="relative z-10">▶ 觀看互動預告</button>
        </div>

        <div id="video-intro">
            <!-- 影片將在此動態載入 -->
        </div>
    </div>

    <script>
        function syncViewportHeight() {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`);
        }
        syncViewportHeight();
        window.addEventListener('resize', syncViewportHeight);
        window.addEventListener('orientationchange', () => setTimeout(syncViewportHeight, 250));

        const canvas = document.getElementById('trailerCanvas');
        const ctx = canvas.getContext('2d');
        const caption = document.getElementById('caption');
        const titleCard = document.getElementById('title-card');
        const fakeUI = document.getElementById('fake-ui');
        const startBtn = document.getElementById('start-btn');
        const hpFill = document.getElementById('hp-fill');
        const domainFlash = document.getElementById('domain-flash');
        const timecode = document.getElementById('timecode');
        const sceneTag = document.getElementById('scene-tag');

        // 直接載入網路角色圖片
        let errWutao = false,
            errElder = false,
            errEnemy = false;

        const imgWutao = new Image();
        imgWutao.crossOrigin = "Anonymous";
        imgWutao.onload = () => errWutao = false;
        imgWutao.onerror = () => errWutao = true;
        imgWutao.src = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/49111a380bf2be0027cba3a8e50b664d8737abd0/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90/04-002-%E5%9C%96%E7%89%87/01-%E6%AD%A6%E9%81%94%E6%82%9F%28%E5%8E%BB%29.png';

        const imgElder = new Image();
        imgElder.crossOrigin = "Anonymous";
        imgElder.onload = () => errElder = false;
        imgElder.onerror = () => errElder = true;
        imgElder.src = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/49111a380bf2be0027cba3a8e50b664d8737abd0/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90/04-002-%E5%9C%96%E7%89%87/02-%E9%81%94%E6%82%9F%E9%95%B7%E8%80%81%28%E5%8E%BB%29.png';

        const imgEnemy = new Image();
        imgEnemy.crossOrigin = "Anonymous";
        imgEnemy.onload = () => errEnemy = false;
        imgEnemy.onerror = () => errEnemy = true;
        imgEnemy.src = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/49111a380bf2be0027cba3a8e50b664d8737abd0/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90/04-002-%E5%9C%96%E7%89%87/03-%E5%9C%8B%E5%AE%B6%E5%85%AC%E5%84%BA%28%E5%8E%BB%29.png';

        // 資源庫基礎位址
        const GITHUB_RAW_BASE = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/49111a380bf2be0027cba3a8e50b664d8737abd0/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90';
        const GITHUB_BLOB_BASE = 'https://github.com/igudesman222/igudesman2012/raw/49111a380bf2be0027cba3a8e50b664d8737abd0/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90';
        // 開場主視覺影片來源：GitHub raw 直連播放位址
        const INTRO_VIDEO_URL = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/main/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90/04-001-%E5%BD%B1%E7%89%87/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E4%B8%BB%E8%A6%96%E8%A6%BA%E5%8B%95%E7%95%AB%28new%29.mp4';

        const audioState = {
            ctx: null,
            unlocked: false,
            current: null,
            videoGain: null,
            videoSource: null,
            statusTimer: null
        };

        function showAudioStatus(message, persistent = false) {
            let el = document.getElementById('audio-status');
            if (!el) {
                el = document.createElement('div');
                el.id = 'audio-status';
                el.className = 'audio-status';
                document.getElementById('trailer-container').appendChild(el);
            }
            el.textContent = message;
            el.classList.add('show');
            clearTimeout(audioState.statusTimer);
            if (!persistent) {
                audioState.statusTimer = setTimeout(() => el.classList.remove('show'), 3600);
            }
        }

        function showMobileAudioButton(message = '點一下開啟聲音') {
            let btn = document.getElementById('mobile-audio-btn');
            if (!btn) {
                btn = document.createElement('button');
                btn.id = 'mobile-audio-btn';
                btn.className = 'mobile-audio-btn';
                btn.type = 'button';
                btn.textContent = '🔊 開啟聲音';
                document.getElementById('trailer-container').appendChild(btn);
            }
            showAudioStatus(message, true);
            btn.classList.add('show');
            const resume = async () => {
                btn.classList.remove('show');
                await unlockAllAudio();
                if (audioState.current) safePlayTrack(audioState.current, false);
                const introVideo = document.getElementById('intro-video');
                if (introVideo) safePlayIntroVideo(introVideo);
            };
            btn.onclick = resume;
            btn.ontouchstart = resume;
        }

        function normalizeGitHubCandidates(paths) {
            const out = [];
            paths.forEach(path => {
                out.push(`${GITHUB_RAW_BASE}/${path}`);
                out.push(`${GITHUB_BLOB_BASE}/${path}`);
            });
            return [...new Set(out)];
        }

        function makeGithubAudio(label, candidatePaths, volume = 0.96) {
            const audio = new Audio();
            audio.label = label;
            audio.candidateUrls = normalizeGitHubCandidates(candidatePaths);
            audio.candidateIndex = 0;
            audio.preload = 'auto';
            audio.crossOrigin = 'anonymous';
            audio.loop = true;
            audio.initialVolume = volume;
            audio.volume = volume;
            audio.muted = false;
            audio.playsInline = true;
            audio.setAttribute('playsinline', '');
            audio.setAttribute('webkit-playsinline', '');
            audio.src = audio.candidateUrls[0];
            audio.addEventListener('error', () => {
                if (audio.dataset.switching === 'true') return;
                tryNextAudioCandidate(audio);
            });
            return audio;
        }

        function tryNextAudioCandidate(audio) {
            if (audio.candidateIndex >= audio.candidateUrls.length - 1) {
                showAudioStatus(`⚠️ ${audio.label} 載入失敗：請確認 GitHub 音檔路徑`, true);
                showMobileAudioButton('音樂檔讀取失敗；請再點一次重啟');
                return false;
            }
            audio.dataset.switching = 'true';
            audio.candidateIndex += 1;
            audio.src = audio.candidateUrls[audio.candidateIndex];
            audio.load();
            setTimeout(() => {
                audio.dataset.switching = 'false';
            }, 80);
            return true;
        }

        // 建立【共管之海.mp3 第一段.mp3】背景音樂物件
        const bgmPart1 = makeGithubAudio('共管之海.mp3 第一段', [
            '04-003-%E9%9F%B3%E6%A8%82/%E5%85%B1%E7%AE%A1%E4%B9%8B%E6%B5%B7.mp3%20%E7%AC%AC%E4%B8%80%E6%AE%B5.mp3',
            '04-003-%E9%9F%B3%E6%A8%82/%E5%85%B1%E7%AE%A1%E4%B9%8B%E6%B5%B7%20%E7%AC%AC%E4%B8%80%E6%AE%B5.mp3'
        ], 0.75); // 設定適度音量做為背景

        // 建立【配音檔】物件並設為非循環播放
        const voiceOver = new Audio();
        voiceOver.label = '第四組互動預告配音';
        voiceOver.preload = 'auto';
        voiceOver.loop = false;
        voiceOver.volume = 1.0; // 配音檔維持最大音量
        voiceOver.playsInline = true;
        voiceOver.setAttribute('playsinline', '');
        voiceOver.setAttribute('webkit-playsinline', '');

        // 設定旁白音檔：第 16.2 秒由 draw() 主動觸發播放（GitHub raw 直連）
        const VOICE_OVER_URL = 'https://raw.githubusercontent.com/igudesman222/igudesman2012/main/04-%E7%AC%AC%E5%9B%9B%E7%B5%84%E8%B3%87%E6%BA%90/04-003-%E9%9F%B3%E6%A8%82/04-%E7%91%9E%E7%A5%A5%E9%AB%98%E4%B8%AD-%E7%AC%AC%E5%9B%9B%E7%B5%84%E9%85%8D%E9%9F%B3%28%E4%BF%AE%29.mp3';
        voiceOver.crossOrigin = 'anonymous';
        voiceOver.src = VOICE_OVER_URL;

        async function unlockAllAudio() {
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (AudioContextClass && !audioState.ctx) audioState.ctx = new AudioContextClass();
                if (audioState.ctx && audioState.ctx.state === 'suspended') await audioState.ctx.resume();
            } catch (e) {}

            // 解鎖背景音樂
            try {
                bgmPart1.muted = true;
                bgmPart1.volume = 0;
                bgmPart1.load();
                await bgmPart1.play();
                bgmPart1.pause();
                bgmPart1.currentTime = 0;
                bgmPart1.muted = false;
                bgmPart1.volume = bgmPart1.initialVolume || 0.75;
            } catch (e) {}

            // 解鎖配音音軌，配音檔本身初始時間為 0
            try {
                voiceOver.muted = true;
                voiceOver.volume = 0;
                voiceOver.load();
                await voiceOver.play();
                voiceOver.pause();
                voiceOver.currentTime = 0;
                voiceOver.muted = false;
                voiceOver.volume = 1.0;
            } catch (e) {}

            audioState.unlocked = true;
        }

        function stopAllAudio() {
            bgmPart1.pause();
            voiceOver.pause();
        }

        async function safePlayTrack(track, restart = true) {
            audioState.current = track;
            track.muted = false;
            if (restart) {
                try {
                    track.currentTime = 0;
                } catch (e) {}
            }
            try {
                await track.play();
                showAudioStatus(`♪ 播音中: ${track.label}`);
                return true;
            } catch (e) {
                showMobileAudioButton('請點一下開啟聲音');
                return false;
            }
        }

        function updateBGMVolume(elapsed) {
            if (!bgmPart1 || bgmPart1.paused) return;

            // 定義有人聲的時間段 (開始時間, 結束時間)
            // 16.2 ~ 168.8 (旁白、公儺、五達悟交涉與戰鬥)
            // 168.8 ~ 265.0 (長老介入協商)
            // 265.0 ~ 277.0 (最後旁白)
            // 基本上 16.2 秒之後都有人聲，所以在此設定一個主要人聲區間
            const hasVoiceOver = (elapsed >= 16.2 && elapsed <= 277.0);

            // 設定目標音量：有人聲時調低為 0.08 (確保不蓋過旁白音量)，無人聲時維持初始音量 (0.75)
            const targetVolume = hasVoiceOver ? 0.08 : (bgmPart1.initialVolume || 0.75);

            // 平滑漸變音量 (使用簡單的線性內插)
            const currentVolume = bgmPart1.volume;
            const volumeDiff = targetVolume - currentVolume;

            // 如果差距大於一個小閾值，就逐漸調整
            if (Math.abs(volumeDiff) > 0.01) {
                bgmPart1.volume = currentVolume + (volumeDiff * 0.05); // 0.05 決定漸變速度
            } else {
                bgmPart1.volume = targetVolume;
            }
        }

        async function amplifyIntroVideo(video, gainValue = 1.65) {
            video.volume = 1.0;
            video.muted = false;
            try {
                const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                if (!AudioContextClass) return;
                if (!audioState.ctx) audioState.ctx = new AudioContextClass();
                if (audioState.ctx.state === 'suspended') await audioState.ctx.resume();
                if (!audioState.videoSource) {
                    audioState.videoSource = audioState.ctx.createMediaElementSource(video);
                    audioState.videoGain = audioState.ctx.createGain();
                    audioState.videoGain.gain.value = gainValue;
                    audioState.videoSource.connect(audioState.videoGain).connect(audioState.ctx.destination);
                } else if (audioState.videoGain) {
                    audioState.videoGain.gain.value = gainValue;
                }
            } catch (e) {}
        }

        function getBezierPoint(t, p0, p1, p2, p3) {
            const u = 1 - t;
            const tt = t * t;
            const uu = u * u;
            const uuu = uu * u;
            const ttt = tt * t;

            return {
                x: uuu * p0.x + 3 * uu * t * p1.x + 3 * u * tt * p2.x + ttt * p3.x,
                y: uuu * p0.y + 3 * uu * t * p1.y + 3 * u * tt * p2.y + ttt * p3.y
            };
        }

                const orchidY = cy + 102 * mapScale;
                const hengchunX = cx - 8 * mapScale;
                const hengchunY = cy + 122 * mapScale;

                // 蘭嶼 (Pongso no Tao)脈衝光暈
                const pulseRadius = 5 + Math.sin(frame * 0.1) * 3;
                ctx.beginPath();
                ctx.arc(orchidX, orchidY, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#0ea5e9';
                ctx.shadowColor = '#38bdf8';
                ctx.shadowBlur = 15;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(orchidX, orchidY, pulseRadius + 4, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(56, 189, 248, 0.45)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // 恆春脈衝光暈
                ctx.beginPath();
                ctx.arc(hengchunX, hengchunY, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#f43f5e';
                ctx.shadowColor = '#fb7185';
                ctx.shadowBlur = 12;
                ctx.fill();

                // 文字標記
                ctx.shadowBlur = 0;
                ctx.font = 'bold 10px monospace';
                ctx.fillStyle = 'rgba(56, 189, 248, 0.9)';
                ctx.fillText('PONGSO NO TAO (蘭嶼)', orchidX + 12, orchidY + 3);

                ctx.fillStyle = 'rgba(251, 113, 133, 0.9)';
                ctx.fillText('HENGCHUN (恆春)', hengchunX - 98, hengchunY + 4);

                // 4. 定義極具張力的黑潮貝茲曲線流動航道（繞過蘭嶼，強力刷洗台灣東岸）
                const p0 = {
                    x: cx + 110 * mapScale,
                    y: cy + 240 * mapScale
                }; // 源自赤道附近的黑潮主流
                const p1 = {
                    x: orchidX + 15 * mapScale,
                    y: orchidY + 25 * mapScale
                }; // 穿越蘭嶼與巴士海峽
                const p2 = {
                    x: cx + 62 * mapScale,
                    y: cy - 25 * mapScale
                }; // 貼著東海岸強力向北推進
                const p3 = {
                    x: cx + 210 * mapScale,
                    y: cy - 230 * mapScale
                }; // 朝向日本/太平洋流去

                // 5. 繪製 5 層極度科幻的黑潮能量水流線 (能量水道)
                ctx.shadowBlur = 15;
                for (let j = 0; j < 5; j++) {
                    ctx.beginPath();
                    ctx.lineWidth = 1.5 + j * 1.5;
                    const streamGrad = ctx.createLinearGradient(0, 0, width, 0);
                    streamGrad.addColorStop(0, 'rgba(12, 74, 110, 0)');
                    streamGrad.addColorStop(0.3, `rgba(14, 165, 233, ${0.12 - j * 0.02})`);
                    streamGrad.addColorStop(0.65, `rgba(56, 189, 248, ${0.16 - j * 0.02})`);
                    streamGrad.addColorStop(1, 'rgba(12, 74, 110, 0)');
                    ctx.strokeStyle = streamGrad;
                    ctx.shadowColor = '#0ea5e9';

                    // 計算每條能量水道的微調偏移
                    const lineShiftY = (j - 2) * 15;
                    ctx.moveTo(p0.x + lineShiftY * 0.5, p0.y + lineShiftY);
                    for (let t = 0; t <= 1; t += 0.05) {
                        const pt = getBezierPoint(t, p0, p1, p2, p3);
                        ctx.lineTo(pt.x + lineShiftY * (1 - t), pt.y + lineShiftY * t);
                    }
                    ctx.stroke();
                }

                // 6. 渲染與更新 220 顆流光溢彩的黑潮曳尾粒子 (極度酷炫的能量流動)
                sceneState.kuroshioParticles.forEach(part => {
                    // 前進
                    part.progress += part.speed;
                    if (part.progress > 1) {
                        part.progress = 0;
                        part.speed = Math.random() * 0.003 + 0.0015; // (已調慢且平緩)
                        part.offsetY = (Math.random() - 0.5) * 45;
                    }

                    // 取出曲線上對應點
                    const pt = getBezierPoint(part.progress, p0, p1, p2, p3);

                    // 套用微調偏移 (橫向擴散)
                    const finalX = pt.x + part.offsetY * Math.cos(part.progress * Math.PI) + part.offsetX;
                    const finalY = pt.y + part.offsetY * Math.sin(part.progress * Math.PI);

                    // 設定粒子霓虹發光
                    ctx.shadowBlur = part.size * 3;
                    if (part.colorType === 1) {
                        ctx.fillStyle = `rgba(56, 189, 248, ${part.alpha})`; // 飛魚耀眼藍
                        ctx.shadowColor = '#38bdf8';
                    } else {
                        ctx.fillStyle = `rgba(14, 165, 233, ${part.alpha})`; // 深邃黑潮藍
                        ctx.shadowColor = '#0ea5e9';
                    }

                    // 繪製粒子本體
                    ctx.beginPath();
                    ctx.arc(finalX, finalY, part.size, 0, Math.PI * 2);
                    ctx.fill();

                    // 繪製酷炫的「水流粒子曳尾流光」
                    const tailLength = Math.max(0.01, part.speed * 2.2);
                    const prevT = Math.max(0, part.progress - tailLength);
                    const prevPt = getBezierPoint(prevT, p0, p1, p2, p3);
                    const prevX = prevPt.x + part.offsetY * Math.cos(prevT * Math.PI) + part.offsetX;
                    const prevY = prevPt.y + part.offsetY * Math.sin(prevT * Math.PI);

                    ctx.beginPath();
                    ctx.lineWidth = part.size * 0.8;
                    ctx.strokeStyle = part.colorType === 1 ? `rgba(56, 189, 248, ${part.alpha * 0.4})` : `rgba(14, 165, 233, ${part.alpha * 0.4})`;
                    ctx.moveTo(finalX, finalY);
                    ctx.lineTo(prevX, prevY);
                    ctx.stroke();
                });

                ctx.restore();

                drawPanel(width * 0.06, height * 0.16, Math.min(420, width * 0.38), 135, '黑潮與飛魚', ['四月，飛魚回歸', '文化存續與經濟命脈交會'], '#38bdf8');
                drawPanel(width * 0.58, height * 0.18, Math.min(430, width * 0.36), 135, '六海浬禁令', ['天秤傾斜', '生存與傳承即將對決'], '#fbbf24');
            }
            if (sceneState.mode === 'fairnessScan') {
                drawPanel(width * 0.28, height * 0.12, Math.min(560, width * 0.48), 150, '系統判定', ['同為國民，限制不同', '公平原則：未通過', '邏輯審查：衝突'], '#f43f5e');
            }
            if (sceneState.mode === 'enemyProtocol') {
                drawPanel(width * 0.33, height * 0.12, Math.min(600, width * 0.52), 160, '強制排除程序', ['產量不足 → 船隻停擺', '薪資斷鏈 → 生存風險', '交涉失敗：警告'], '#fb7185');
            }
            if (sceneState.battle.active) {
                drawBar(width * 0.08, height * 0.12, Math.min(420, width * 0.36), 18, '五達悟 HP', sceneState.battle.wutaoHp, 10000, '#38bdf8');
                drawBar(width * 0.55, height * 0.12, Math.min(460, width * 0.38), 18, '恆春公儺 HP', sceneState.battle.enemyHp, 25000, '#fb7185');
                drawBar(width * 0.28, height * 0.2, Math.min(520, width * 0.44), 14, '極限值 LIMIT', sceneState.battle.limit, 100, '#fbbf24');
                if (sceneState.battle.guard) drawPanel(width * 0.34, height * 0.28, Math.min(460, width * 0.4), 110, '海神障壁', ['抓準時機格擋', '成功後發動強力反擊'], '#67e8f9');
            }
            if (sceneState.mode === 'proposalLaw') {
                drawPanel(width * 0.18, height * 0.13, Math.min(760, width * 0.64), 145, '提案一：修改飛魚禁捕令', ['保障恆春漁民合理獵捕權益', '讓生計問題先被看見'], '#a7f3d0');
            }
            if (sceneState.mode === 'proposalQuota') {
                drawPanel(width * 0.13, height * 0.12, Math.min(850, width * 0.74), 155, '提案二：禁用破壞性網具＋合理捕撈配額', ['從「空間限制」轉向「行為規範」', '共同找出海洋永續的最大公約數'], '#fde68a');
            }
            if (sceneState.mode === 'recalculate' || sceneState.mode === 'commonManagement') {
                drawPanel(width * 0.16, height * 0.12, Math.min(820, width * 0.7), 145, '共同管理機制', ['達悟部落 × 恆春漁會 × 政府協助', '讓海洋永續，也讓生活繼續'], '#93c5fd');
            }
            if (sceneState.mode === 'finalTitle') {
                ctx.fillStyle = 'rgba(0,0,0,0.82)';
                ctx.fillRect(0, 0, width, height);
                ctx.textAlign = 'center';
                ctx.fillStyle = '#ffffff';
                ctx.font = `900 ${Math.max(24, width * 0.04)}px serif`;
                ctx.fillText('大海的豐饒，需要我們共同的節制。', width / 2, height * 0.42);
                ctx.fillStyle = '#38bdf8';
                ctx.font = `900 ${Math.max(28, width * 0.05)}px serif`;
                ctx.fillText('《潮間之秤：無量波光》', width / 2, height * 0.56);
                ctx.fillStyle = '#94a3b8';
                ctx.font = `bold ${Math.max(16, width * 0.02)}px sans-serif`;
                ctx.fillText('2026 準備登入', width / 2, height * 0.66);
            }
            ctx.restore();
        }

        // --- 動畫主迴圈 ---
        function draw() {
            if (!isRunning) return;
            const elapsed = (Date.now() - startTime) / 1000;
            frame++;
            timecode.textContent = formatTime(elapsed);

            ctx.clearRect(0, 0, width, height);

            if (sceneState.shake > 0) {
                ctx.save();
                ctx.translate((Math.random() - 0.5) * sceneState.shake, (Math.random() - 0.5) * sceneState.shake);
                sceneState.shake *= 0.95;
            }

            let bg = ctx.createLinearGradient(0, 0, 0, height);
            if (sceneState.mode === 'finalTitle') {
                bg.addColorStop(0, '#000');
                bg.addColorStop(1, '#020617');
            } else {
                bg.addColorStop(0, sceneState.domain > 0.5 ? '#000' : '#020617');
                bg.addColorStop(1, sceneState.domain > 0.5 ? '#0f172a' : '#0c4a6e');
            }
            ctx.fillStyle = bg;
            ctx.fillRect(0, 0, width, height);

            updateBGMVolume(elapsed);

            if (sceneState.elder.isGuardian && sceneState.elder.opacity > 0) {
                drawElder(width / 2, height * 0.62, 1.2, sceneState.elder.opacity * 0.34, true);
            }

            sceneState.waves.forEach((wave, idx) => {
                ctx.beginPath();
                ctx.moveTo(0, height);
                for (let i = 0; i <= width; i += 20) {
                    const yOffset = Math.sin(i * wave.length + (frame * wave.speed)) * wave.amplitude;
                    ctx.lineTo(i, wave.y + yOffset);
                }
                ctx.lineTo(width, height);
                ctx.fillStyle = sceneState.domain > 0.5 ? `rgba(255,255,255,0.05)` : `rgba(14, 165, 233, ${0.15 - idx*0.04})`;
                ctx.fill();
            });

            drawSceneOverlays(elapsed);

            if (!sceneState.elder.isGuardian && sceneState.elder.opacity > 0) {
                drawElder(sceneState.elder.x, sceneState.elder.y, 1, sceneState.elder.opacity, false);
            }
            if (sceneState.enemy.opacity > 0) drawEnemy(sceneState.enemy.x, sceneState.enemy.y, sceneState.enemy.opacity);
            if (sceneState.wutao.opacity > 0) drawWutao(sceneState.wutao.x, sceneState.wutao.y, 1, sceneState.wutao.opacity, sceneState.wutao.pose);

            if (sceneState.domain > 0) {
                ctx.strokeStyle = `rgba(56, 189, 248, ${sceneState.domain * 0.4})`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(width / 2, height / 2, (frame * 8) % (width * 1.2), 0, Math.PI * 2);
                ctx.stroke();

                const domainGrad = ctx.createRadialGradient(width / 2, height / 2, width * 0.2, width / 2, height / 2, width * 0.8);
                domainGrad.addColorStop(0, 'transparent');
                domainGrad.addColorStop(1, `rgba(0,0,0,${sceneState.domain * 0.8})`);
                ctx.fillStyle = domainGrad;
                ctx.fillRect(0, 0, width, height);
            }

            ctx.fillStyle = '#fff';
            sceneState.particles.forEach(p => {
                p.y -= p.v;
                if (p.y < 0) p.y = height;
                ctx.globalAlpha = p.o * 0.5;
                ctx.fillRect(p.x, p.y, p.s, p.s);
            });
            ctx.globalAlpha = 1;

            if (sceneState.shake > 0) ctx.restore();

            // 【核心】當計時器達到 16.2 秒時，才讓配音檔（從 0.0s 處）開始發聲並與計時器保持高精度校準
            if (elapsed >= 16.2) {
                const targetVoiceTime = elapsed - 16.2;
                if (targetVoiceTime >= 0 && targetVoiceTime < (voiceOver.duration || 999)) {
                    if (voiceOver.paused && !voiceOver.ended) {
                        voiceOver.play().catch(() => {});
                    }
                    // 主動漂移校對：若音訊播放偏差大於 0.3 秒，重設 currentTime 以對齊時間軸
                    if (Math.abs(voiceOver.currentTime - targetVoiceTime) > 0.3) {
                        voiceOver.currentTime = targetVoiceTime;
                    }
                } else if (targetVoiceTime >= (voiceOver.duration || 999)) {
                    voiceOver.pause();
                }
            } else {
                // 計時器小於 16.2 秒時，配音檔處於重設狀態
                if (!voiceOver.paused) {
                    voiceOver.pause();
                }
                voiceOver.currentTime = 0;
            }

            updateTimeline(elapsed);
            requestAnimationFrame(draw);
        }

        function applyCaptionSpeakerGlow(text) {
            caption.classList.remove('speaker-wutao', 'speaker-enemy', 'speaker-elder');
            if (!text) return;
            if (text.includes('五達悟：')) {
                caption.classList.add('speaker-wutao');
            } else if (text.includes('恆春公儺：')) {
                caption.classList.add('speaker-enemy');
            } else if (text.includes('達悟長者：')) {
                caption.classList.add('speaker-elder');
            }
        }

        function updateTimeline(elapsed) {
            const current = SCRIPT.findLast(s => s.time <= elapsed);
            if (current && caption.dataset.lastTime !== String(current.time)) {
                caption.dataset.lastTime = current.time;
                caption.style.opacity = 0;
                applyCaptionSpeakerGlow(current.text);
                setTimeout(() => {
                    caption.innerText = current.text;
                    if (current.text) caption.style.opacity = 1;
                }, 200);
                sceneTag.innerText = current.tag || '';
                handleAction(current.action);
            }
        }

        function setBattle(wutaoHp, enemyHp, limit, guard = false) {
            sceneState.battle.active = true;
            sceneState.battle.wutaoHp = wutaoHp;
            sceneState.battle.enemyHp = enemyHp;
            sceneState.battle.limit = limit;
            sceneState.battle.guard = guard;
        }

        function resetCharacters() {
            sceneState.wutao.opacity = 0;
            sceneState.enemy.opacity = 0;
            sceneState.elder.opacity = 0;
            sceneState.elder.isGuardian = false;
            sceneState.domain = 0;
            sceneState.battle.active = false;
            fakeUI.style.opacity = 0;
        }

        function handleAction(action) {
            sceneState.mode = action;
            switch (action) {
                case 'teamIntro':
                    resetCharacters();
                    break;
                case 'issueOcean':
                    resetCharacters();
                    sceneState.elder.x = width * 0.5;
                    sceneState.elder.opacity = 0.45;
                    break;
                case 'issueBalance':
                    sceneState.elder.opacity = 0.35;
                    sceneState.enemy.opacity = 0.45;
                    sceneState.enemy.x = width * 0.78;
                    sceneState.wutao.opacity = 0.45;
                    sceneState.wutao.x = width * 0.22;
                    break;
                case 'enemyArgue':
                    sceneState.enemy.opacity = 0.95;
                    sceneState.enemy.x = width * 0.72;
                    sceneState.wutao.opacity = 0.55;
                    sceneState.wutao.x = width * 0.25;
                    sceneState.elder.opacity = 0;
                    sceneState.shake = 8;
                    break;
                case 'wutaoArgue':
                    sceneState.wutao.opacity = 1;
                    sceneState.wutao.x = width * 0.25;
                    sceneState.wutao.pose = 'stand';
                    sceneState.enemy.opacity = 0.68;
                    sceneState.enemy.x = width * 0.74;
                    break;
                case 'fairnessScan':
                    sceneState.enemy.opacity = 1;
                    sceneState.enemy.x = width * 0.7;
                    sceneState.wutao.opacity = 0.72;
                    sceneState.wutao.x = width * 0.25;
                    break;
                case 'wutaoPressure':
                    sceneState.wutao.opacity = 1;
                    sceneState.wutao.x = width * 0.36;
                    sceneState.wutao.pose = 'attack';
                    sceneState.enemy.opacity = 0.68;
                    sceneState.enemy.x = width * 0.78;
                    sceneState.shake = 18;
                    break;
                case 'enemyProtocol':
                    sceneState.enemy.opacity = 1;
                    sceneState.enemy.x = width * 0.66;
                    sceneState.wutao.opacity = 0.75;
                    sceneState.wutao.x = width * 0.23;
                    sceneState.shake = 15;
                    break;
                case 'warStart':
                    sceneState.wutao.opacity = 1;
                    sceneState.wutao.x = width * 0.28;
                    sceneState.wutao.pose = 'attack';
                    sceneState.enemy.opacity = 1;
                    sceneState.enemy.x = width * 0.73;
                    sceneState.shake = 35;
                    break;
                case 'domainOpen':
                    fakeUI.style.opacity = 1;
                    sceneState.domain = 0.75;
                    sceneState.wutao.pose = 'domain';
                    sceneState.wutao.x = width * 0.42;
                    sceneState.wutao.opacity = 1;
                    sceneState.enemy.x = width * 0.76;
                    sceneState.enemy.opacity = 0.9;
                    sceneState.elder.isGuardian = true;
                    sceneState.elder.opacity = 0.4;
                    setBattle(10000, 25000, 8, false);
                    document.getElementById('combo-text').innerText = 'DOMAIN';
                    document.getElementById('status-text').innerText = '無量空間：深淵禁補';
                    hpFill.style.width = '100%';
                    break;
                case 'battleCalc':
                    sceneState.domain = 0.55;
                    sceneState.shake = 18;
                    setBattle(8200, 22000, 22, false);
                    document.getElementById('combo-text').innerText = '蒼潮穿';
                    document.getElementById('status-text').innerText = '極限值累積中';
                    hpFill.style.width = '82%';
                    break;
                case 'guardCounter':
                    sceneState.wutao.pose = 'attack';
                    sceneState.shake = 30;
                    setBattle(3600, 16800, 58, true);
                    document.getElementById('combo-text').innerText = 'GUARD';
                    document.getElementById('status-text').innerText = '海神障壁／逆轉盟約';
                    hpFill.style.width = '36%';
                    break;
                case 'killLine':
                    sceneState.enemy.opacity = 0.85;
                    sceneState.shake = 22;
                    setBattle(5200, 4800, 84, false);
                    document.getElementById('combo-text').innerText = '5000 ↓';
                    document.getElementById('status-text').innerText = '絕對斬殺線';
                    hpFill.style.width = '52%';
                    break;
                case 'finalSkill':
                    sceneState.domain = 1;
                    sceneState.wutao.pose = 'domain';
                    sceneState.wutao.x = width * 0.5;
                    sceneState.enemy.opacity = 0.42;
                    sceneState.enemy.x = width * 0.82;
                    sceneState.shake = 80;
                    setBattle(6800, 1200, 100, false);
                    document.getElementById('combo-text').innerText = '終焉術式';
                    document.getElementById('status-text').innerText = '深淵海禁';
                    break;
                case 'elderStop':
                    sceneState.domain = 0.18;
                    sceneState.battle.active = false;
                    fakeUI.style.opacity = 0;
                    sceneState.elder.isGuardian = false;
                    sceneState.elder.opacity = 1;
                    sceneState.elder.x = width * 0.5;
                    sceneState.wutao.opacity = 0.75;
                    sceneState.wutao.x = width * 0.24;
                    sceneState.wutao.pose = 'stand';
                    sceneState.enemy.opacity = 0.75;
                    sceneState.enemy.x = width * 0.76;
                    break;
                case 'enemyDoubt':
                    sceneState.elder.opacity = 0.86;
                    sceneState.enemy.opacity = 0.95;
                    sceneState.enemy.x = width * 0.72;
                    sceneState.wutao.opacity = 0.55;
                    break;
                case 'wutaoDoubt':
                    sceneState.wutao.opacity = 0.95;
                    sceneState.wutao.x = width * 0.25;
                    sceneState.elder.opacity = 0.86;
                    sceneState.enemy.opacity = 0.55;
                    break;
                case 'proposalLaw':
                    sceneState.elder.opacity = 1;
                    sceneState.elder.x = width * 0.5;
                    sceneState.wutao.opacity = 0.65;
                    sceneState.enemy.opacity = 0.65;
                    break;
                case 'proposalAccept':
                    sceneState.enemy.opacity = 0.95;
                    sceneState.enemy.x = width * 0.7;
                    sceneState.elder.opacity = 0.8;
                    sceneState.wutao.opacity = 0.55;
                    break;
                case 'proposalQuota':
                    sceneState.elder.opacity = 1;
                    sceneState.elder.x = width * 0.5;
                    sceneState.shake = 8;
                    sceneState.wutao.opacity = 0.72;
                    sceneState.enemy.opacity = 0.72;
                    break;
                case 'recalculate':
                    sceneState.enemy.opacity = 0.9;
                    sceneState.wutao.opacity = 0.65;
                    sceneState.elder.opacity = 0.75;
                    break;
                case 'commonManagement':
                    sceneState.wutao.opacity = 0.95;
                    sceneState.wutao.x = width * 0.28;
                    sceneState.enemy.opacity = 0.75;
                    sceneState.enemy.x = width * 0.72;
                    sceneState.elder.opacity = 0.9;
                    sceneState.elder.x = width * 0.5;
                    break;
                case 'finalTitle':
                    stopAllAudio();
                    caption.style.opacity = 1;
                    sceneState.wutao.opacity = 0;
                    sceneState.enemy.opacity = 0;
                    sceneState.elder.opacity = 0;
                    sceneState.domain = 0;
                    sceneState.battle.active = false;
                    fakeUI.style.opacity = 0;
                    break;
                case 'end':
                    caption.style.opacity = 0;
                    break;
            }
        }

        let videoTimer;

        function beginCanvasAnimation() {
            if (isRunning) return;

            const videoIntro = document.getElementById('video-intro');
            const introVideo = document.getElementById('intro-video');
            if (introVideo) {
                introVideo.pause();
                introVideo.muted = true;
            }
            videoIntro.style.opacity = '0';

            setTimeout(() => {
                videoIntro.style.display = 'none';
                videoIntro.innerHTML = '';

                isRunning = true;
                startTime = Date.now();

                // 開始播放預告，此時只會播放背景音樂 bgmPart1，而配音音軌將在 16.2 秒準時由 draw 主動觸發
                startFullTrailerAudio();
                draw();
            }, 650);
        }

        async function startInteractiveTrailer() {
            await unlockAllAudio();
            document.getElementById('overlay').style.display = 'none';

            const videoIntro = document.getElementById('video-intro');

            videoIntro.innerHTML = `
            <video id="intro-video" autoplay playsinline webkit-playsinline preload="auto" crossorigin="anonymous">
                <source src="${INTRO_VIDEO_URL}" type="video/mp4">
            </video>
            <button id="skip-btn" class="absolute top-6 right-6 z-[999] px-6 py-2 bg-black/60 text-white border border-white/50 rounded hover:bg-sky-600 transition tracking-widest font-bold">跳過影片 ⏭</button>
        `;
            videoIntro.style.display = 'flex';
            videoIntro.style.opacity = '1';

            const introVideo = document.getElementById('intro-video');
            await safePlayIntroVideo(introVideo);
            introVideo.addEventListener('ended', () => {
                clearTimeout(videoTimer);
                beginCanvasAnimation();
            });

            document.getElementById('skip-btn').addEventListener('click', () => {
                clearTimeout(videoTimer);
                beginCanvasAnimation();
            });
            document.getElementById('skip-btn').addEventListener('touchstart', () => {
                clearTimeout(videoTimer);
                beginCanvasAnimation();
            }, {
                passive: true
            });

            // 若開場影片未結束，10秒後強制過渡
            videoTimer = setTimeout(() => {
                beginCanvasAnimation();
            }, 10000);
        }

        startBtn.addEventListener('click', startInteractiveTrailer);
        startBtn.addEventListener('touchend', (event) => {
            event.preventDefault();
            startInteractiveTrailer();
        }, {
            passive: false
        });

        ['click', 'touchstart', 'pointerdown'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (audioState.ctx && audioState.ctx.state === 'suspended') audioState.ctx.resume().catch(() => {});
            }, {
                passive: true
            });
        });
    </script>
</body>

</html>
