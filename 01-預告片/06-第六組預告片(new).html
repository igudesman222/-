    <style>

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: 'Noto Sans TC', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        /* 影片播放層 */
        #intro-video {
            display: none;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* 維持影片完整比例不被裁切 */
            background-color: #000; /* 剩餘空間用純黑填滿 */
            z-index: 50;
        }



        /* Gameplay footage layer for the second major section */
        #gameplay-video {
            display: none;
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            object-fit: contain;
            background: #000;
            z-index: 18;
            opacity: 0;
            transition: opacity 0.55s ease-in-out;
        }

        #gameplay-controls {
            display: none;
            position: fixed;
            top: calc(5% + 3.2rem);
            left: 5%;
            z-index: 35;
            min-width: min(360px, 86vw);
            padding: 1rem 1.2rem;
            border: 1px solid rgba(251, 191, 36, 0.72);
            border-left-width: 4px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0,0,0,0.78), rgba(10,20,35,0.66));
            box-shadow: 0 0 28px rgba(251, 191, 36, 0.18), inset 0 0 20px rgba(255,255,255,0.04);
            backdrop-filter: blur(8px);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.45s ease, transform 0.45s ease;
            pointer-events: none;
        }

        #gameplay-controls.active {
            opacity: 1;
            transform: translateY(0);
        }

        #gameplay-controls .controls-title {
            display: block;
            color: #fbbf24;
            font-family: 'Noto Serif TC', serif;
            font-size: 1rem;
            letter-spacing: 0.25em;
            margin-bottom: 0.55rem;
            text-shadow: 0 0 12px rgba(251, 191, 36, 0.45);
        }

        #gameplay-controls .controls-line {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 1rem;
            color: rgba(255,255,255,0.92);
            font-size: 0.9rem;
            line-height: 1.7;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 0.25rem;
        }

        #gameplay-controls .controls-key {
            color: #ffffff;
            font-weight: 700;
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255,255,255,0.25);
        }

        #gameplay-controls .controls-desc {
            color: rgba(255,255,255,0.74);
            text-align: right;
        }

        #gameplay-controls .gameplay-badge {
            margin-top: 0.65rem;
            color: rgba(255,255,255,0.72);
            font-size: 0.75rem;
            letter-spacing: 0.18em;
            text-align: right;
        }

        @media (max-width: 640px) {
            #gameplay-controls {
                top: auto;
                left: 1rem;
                right: 1rem;
                bottom: 9rem;
                min-width: unset;
            }

            #gameplay-controls .controls-line {
                font-size: 0.78rem;
            }

        #white-flash {
            display: none;
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 55;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-out;

        #final-fade-overlay {
            display: block;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 95;
            opacity: 0;
            pointer-events: none;

        }

            opacity: 1;
            transform: translateY(0);
        }

        .glitch {

            text-shadow: 0 0 20px rgba(255,255,255,0.2);

        @media (min-width: 768px) {

        .glitch::before, .glitch::after {
            content: "銀羽守護者";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.8;

        .glitch::before {
            left: 2px;
            text-shadow: -2px 0 #00ffff;
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        .glitch::after {
            left: -2px;
            text-shadow: -2px 0 #ff00ff;
            animation: glitch-anim 3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip-path: inset(20% 0 80% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 40% 0); }

        #scene-title {
            position: absolute;
            top: 5%;
            left: 5%;

            letter-spacing: 4px;

            padding-left: 10px;
            z-index: 30;

            justify-content: center;

        #vignette {
            position: absolute;

            z-index: 14;
            pointer-events: none;
            transition: box-shadow 0.5s;

        #timer {

            top: 5%;
            right: 5%;

            color: #fbbf24;
            font-size: 1.2rem;
            z-index: 30;

            border-radius: 4px;

        #team-card {

            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease-in-out;
        }

        #team-card.active {
            opacity: 1;
        }

        .team-card-inner {
            width: min(86vw, 880px);
            padding: 3rem 2rem;
            border: 1px solid rgba(251, 191, 36, 0.45);
            border-radius: 18px;
            text-align: center;
            background: rgba(0, 0, 0, 0.42);
            box-shadow: 0 0 40px rgba(251, 191, 36, 0.15), inset 0 0 28px rgba(255,255,255,0.04);
            backdrop-filter: blur(8px);
        }

        .team-school {
            font-size: clamp(1.4rem, 4vw, 2.9rem);
            letter-spacing: 0.18em;
            color: #fef3c7;
            margin-bottom: 1rem;
            text-shadow: 0 0 22px rgba(251, 191, 36, 0.45);
        }

        .team-name {
            font-family: 'Noto Serif TC', serif;
            font-size: clamp(2.2rem, 8vw, 5.2rem);
            letter-spacing: 0.16em;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 1.2rem;
            text-shadow: 0 8px 30px rgba(0,0,0,1), 0 0 24px rgba(59, 130, 246, 0.45);
        }

        .team-members {
            font-size: clamp(1.2rem, 3.5vw, 2.4rem);
            letter-spacing: 0.35em;
            color: #bae6fd;
            text-shadow: 0 0 18px rgba(56, 189, 248, 0.35);
        }

    </style>
</head>

const scripts = [
    // 【第一大段：議題交代爭議與故事背景】
    { start: 13, end: 23, speaker: "農民1", text: "「大家一直說這是環保、綠能！說這叫『魚電共生』。但你有記得這片地原本的樣子嗎？」", scene: "第一段：議題交代爭議與故事背景", focus: "farmer1_sigh" },

    { start: 46, end: 56, speaker: "企業家", text: "「老先生，這是時代的必然。效率、碳權、乾淨能源，這才是未來的趨勢。至於那些鳥？我們部署了『雷虎自動驅趕系統』，保證發電效率不受任何生物干擾。」", scene: "第一段：議題交代爭議與故事背景", focus: "ceo" },
    { start: 57, end: 68, speaker: "旁白", text: "「當政策成為枷鎖，當科技切斷了自然的退路……沈默的土地，終於發出了最後一聲鳴叫。」", scene: "第一段：議題交代爭議與故事背景", focus: "wide" },

    // 【第二大段：介紹遊戲玩法與敘事推進】

function initThree() {
    scene = new THREE.Scene();
    // 夕陽斜照的暖色調背景與霧氣 (調亮背景色，並大幅降低霧氣濃度)
    scene.background = new THREE.Color(0x5a2d1a);
    scene.fog = new THREE.FogExp2(0x5a2d1a, 0.0006);

    camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 15000);
    
    renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    // 燈光設定 (夕陽氛圍 - 大幅增強環境光亮度以照亮暗部)
    ambientLight = new THREE.AmbientLight(0x7a4530, 2.0);
    scene.add(ambientLight);

    sunLight = new THREE.DirectionalLight(0xffddaa, 2.0);
    sunLight.position.set(0, 200, -3000); // 太陽在正前方極遠處
    sunLight.castShadow = true;
    sunLight.shadow.camera.left = -800;
    sunLight.shadow.camera.right = 800;
    sunLight.shadow.camera.top = 800;
    sunLight.shadow.camera.bottom = -800;
    sunLight.shadow.camera.far = 6000;
    scene.add(sunLight);

    const rimLight = new THREE.DirectionalLight(0x7777ff, 0.8); // 增強背面冷色補光
    rimLight.position.set(0, 500, 1000);
    scene.add(rimLight);

    buildEnvironment();
    buildCharacters();
    buildPlayer();
    buildBoss();

    camera.position.set(0, 50, 300);
}

function buildEnvironment() {
    // 1. 背景夕陽球體
    const sunGeo = new THREE.SphereGeometry(300, 32, 32);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xff6600, fog: false });
    sunMesh = new THREE.Mesh(sunGeo, sunMat);
    sunMesh.position.set(0, 250, -4500);
    scene.add(sunMesh);

    // 2. 魚塭水面 (調亮水面顏色，讓光電板剪影更清楚)
    const waterGeo = new THREE.PlaneGeometry(8000, 8000);
    const waterMat = new THREE.MeshPhongMaterial({ 
        color: 0x3a2015, 
        specular: 0xffaa33, 
        shininess: 80,
        transparent: true,
        opacity: 0.95
    });
    waterPlane = new THREE.Mesh(waterGeo, waterMat);
    waterPlane.rotation.x = -Math.PI / 2;
    waterPlane.position.y = -5;
    waterPlane.receiveShadow = true;
    scene.add(waterPlane);

    // 3. 無盡的光電板 (依據夕陽斜照圖)
    panelGroup = new THREE.Group();
    const panelSizeX = 40;
    const panelSizeZ = 60;
    
    // 調亮光電板的材質，加上偏藍的底色與更高的金屬反光感
    const panelGeo = new THREE.BoxGeometry(panelSizeX - 4, 1, panelSizeZ - 4);
    const panelMat = new THREE.MeshStandardMaterial({ 
        color: 0x1b2845, 
        roughness: 0.1, 
        metalness: 0.9,
        emissive: 0x051020,
        emissiveIntensity: 0.4
    });
    
    // 調亮支架顏色為銀灰色，使其在水面上更明顯
    const supportGeo = new THREE.CylinderGeometry(0.5, 0.5, 10);
    const supportMat = new THREE.MeshStandardMaterial({color: 0xaaaaaa, metalness: 0.5});

    for(let x = -20; x < 20; x++) {
        for(let z = -30; z < 20; z++) {
            const posZ = z * panelSizeZ;
            // 避開堤岸所在的區域 (z 大約在 20 ~ 180 之間)，以免穿模
            if(posZ > 20 && posZ < 180) continue; 
            
            if(Math.random() > 0.95) continue; 
            const pGroup = new THREE.Group();
            
            const panel = new THREE.Mesh(panelGeo, panelMat);
            panel.position.y = 8;
            panel.rotation.x = 0.25; 
            panel.castShadow = true;
            panel.receiveShadow = true;

            const support1 = new THREE.Mesh(supportGeo, supportMat);
            support1.position.set(-15, 4, -20);
            const support2 = new THREE.Mesh(supportGeo, supportMat);
            support2.position.set(15, 4, -20);
            const support3 = new THREE.Mesh(supportGeo, supportMat);
            support3.position.set(0, 4, 20);
            support3.scale.y = 0.5;
            support3.position.y = 2;

            pGroup.add(panel, support1, support2, support3);
            pGroup.position.set(x * panelSizeX, 0, posZ);
            pGroup.position.y += (Math.random() - 0.5) * 2;
            
            panelGroup.add(pGroup);
        }
    }
    scene.add(panelGroup);

    // 4. 建立農民與企業家站立的泥土堤岸
    const landGeo = new THREE.BoxGeometry(500, 20, 120);
    const landMat = new THREE.MeshStandardMaterial({
        color: 0x3d2b1f, // 深泥土色
        roughness: 1.0,
        metalness: 0.05
    });
    const landMesh = new THREE.Mesh(landGeo, landMat);
    // 水面在 y=-5，把堤岸放在這裡，讓它的頂部落在 y=5
    landMesh.position.set(0, -5, 100); 
    landMesh.receiveShadow = true;
    landMesh.castShadow = true;
    scene.add(landMesh);
}

function createRadialGradient() {
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 128;
    const ctx = canvas.getContext('2d');
    const gradient = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
    gradient.addColorStop(0, 'rgba(255,255,255,1)');
    gradient.addColorStop(0.2, 'rgba(255,0,0,0.8)');
    gradient.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 128, 128);
    const texture = new THREE.CanvasTexture(canvas);
    return texture;
}

    const slashGeo = new THREE.TorusGeometry(80, 3, 8, 64);

function createExplosion(pos) {
    const group = new THREE.Group();
    const particleGeo = new THREE.BoxGeometry(4, 4, 4);
    const particleMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
    
    for(let i = 0; i < 30; i++) {
        const p = new THREE.Mesh(particleGeo, particleMat);
        const velocity = new THREE.Vector3(
            (Math.random()-0.5)*25, 
            (Math.random()-0.5)*25, 
            (Math.random()-0.5)*25
        );
        p.userData = { velocity: velocity, rotationSpeed: new THREE.Vector3(Math.random(), Math.random(), Math.random()) };
        group.add(p);
    }

    const flashGeo = new THREE.SphereGeometry(20, 16, 16);
    const flashMat = new THREE.MeshBasicMaterial({color: 0xff5500, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending});
    const flash = new THREE.Mesh(flashGeo, flashMat);

    group.position.copy(pos);
    group.userData = { life: 40, maxLife: 40 };
    explosions.push(group);
    scene.add(group);
}

function getSegmentAudioId(elapsed) {
    if (elapsed >= FIRST_SECTION_START && elapsed < FIRST_SECTION_END) return 'bgm-first';
    if (elapsed >= FIRST_SECTION_END && elapsed < SECOND_SECTION_END) return 'bgm-second';
    if (elapsed >= SECOND_SECTION_END && elapsed < FINAL_FADE_START) return 'bgm-third';
    return null;
}

function stopAudioFade(audioId) {
    if (audioFadeTimers[audioId]) {
        clearInterval(audioFadeTimers[audioId]);
        audioFadeTimers[audioId] = null;
    }
}

function fadeAudioTo(audioEl, audioId, targetVolume, shouldPause, shouldReset) {
    if (!audioEl) return;
    stopAudioFade(audioId);
    const steps = 12;
    const startVolume = Number.isFinite(audioEl.volume) ? audioEl.volume : 0;
    let step = 0;
    audioFadeTimers[audioId] = setInterval(() => {
        step += 1;
        const ratio = step / steps;
        audioEl.volume = Math.max(0, Math.min(1, startVolume + (targetVolume - startVolume) * ratio));
        if (step >= steps) {
            stopAudioFade(audioId);
            audioEl.volume = Math.max(0, Math.min(1, targetVolume));
            if (shouldPause) audioEl.pause();
            if (shouldReset) {
                try { audioEl.currentTime = 0; } catch (e) {}
            }
        }
    }, 35);
}

function playSegmentAudio(audioId) {
    const audioEl = document.getElementById(audioId);
    if (!audioEl) return;
    stopAudioFade(audioId);
    audioEl.loop = true;
    audioEl.muted = false;
    audioEl.volume = 0;
    try { audioEl.currentTime = 0; } catch (e) {}
    audioEl.play()
        .then(() => fadeAudioTo(audioEl, audioId, BGM_TARGET_VOLUME[audioId] || 0.3, false, false))
        .catch((error) => console.warn('BGM could not play automatically.', audioId, error));
}

function stopSegmentAudio(audioId, resetToStart = false) {
    const audioEl = document.getElementById(audioId);
    if (!audioEl) return;
    fadeAudioTo(audioEl, audioId, 0, true, resetToStart);
}

function stopAllSegmentAudio(resetToStart = false) {
    ['bgm-first', 'bgm-second', 'bgm-third'].forEach((audioId) => {
        const audioEl = document.getElementById(audioId);
        if (!audioEl) return;
        stopAudioFade(audioId);
        audioEl.pause();
        audioEl.volume = 0;
        audioEl.muted = false;
        if (resetToStart) {
            try { audioEl.currentTime = 0; } catch (e) {}
        }
    });
    activeBgmId = null;
}

function syncSegmentAudio(elapsed) {
    const nextAudioId = getSegmentAudioId(elapsed);
    if (nextAudioId === activeBgmId) return;

    if (activeBgmId) stopSegmentAudio(activeBgmId, true);
    activeBgmId = nextAudioId;

    if (nextAudioId) playSegmentAudio(nextAudioId);
}

function primeBackgroundAudio() {
    ['bgm-first', 'bgm-second', 'bgm-third'].forEach((audioId) => {
        const audioEl = document.getElementById(audioId);
        if (!audioEl) return;
        audioEl.volume = 0;
        audioEl.muted = true;
        const playAttempt = audioEl.play();
        if (playAttempt && typeof playAttempt.then === 'function') {
            playAttempt
                .then(() => {
                    audioEl.pause();
                    try { audioEl.currentTime = 0; } catch (e) {}
                    audioEl.muted = false;
                })
                .catch(() => {
                    audioEl.muted = false;
                });
        } else {
            audioEl.pause();
            try { audioEl.currentTime = 0; } catch (e) {}
            audioEl.muted = false;
        }
    });
}

function syncGameplayVideo(elapsed) {
    const gameplayVideo = document.getElementById('gameplay-video');
    const gameplayControls = document.getElementById('gameplay-controls');
    if (!gameplayVideo || !gameplayControls) return;

    const shouldShow = elapsed >= FIRST_SECTION_END && elapsed < SECOND_SECTION_END;

    if (shouldShow && !gameplayVideoActive) {
        gameplayVideoActive = true;
        gameplayVideo.style.display = 'block';
        gameplayControls.style.display = 'block';
        gameplayControls.setAttribute('aria-hidden', 'false');
        gameplayVideo.muted = true;

        const desiredTime = Math.max(0, elapsed - FIRST_SECTION_END);
        try {
            if (Number.isFinite(gameplayVideo.duration) && gameplayVideo.duration > 0) {
                gameplayVideo.currentTime = desiredTime % gameplayVideo.duration;
            } else {
                gameplayVideo.currentTime = desiredTime;
            }
        } catch (e) {}

        gameplayVideo.play().catch((error) => console.warn('Gameplay video could not play automatically.', error));
        requestAnimationFrame(() => {
            gameplayVideo.style.opacity = '1';
            gameplayControls.classList.add('active');
        });
    } else if (shouldShow && gameplayVideoActive && gameplayVideo.paused) {
        gameplayVideo.play().catch((error) => console.warn('Gameplay video could not resume.', error));
    } else if (!shouldShow && gameplayVideoActive) {
        resetGameplayVideo();
    }
}

function resetGameplayVideo() {
    const gameplayVideo = document.getElementById('gameplay-video');
    const gameplayControls = document.getElementById('gameplay-controls');
    gameplayVideoActive = false;

    if (gameplayVideo) {
        gameplayVideo.style.opacity = '0';
        setTimeout(() => {
            if (!gameplayVideoActive) {
                gameplayVideo.pause();
                try { gameplayVideo.currentTime = 0; } catch (e) {}
                gameplayVideo.style.display = 'none';
            }
        }, 550);
    }

    if (gameplayControls) {
        gameplayControls.classList.remove('active');
        gameplayControls.setAttribute('aria-hidden', 'true');
        setTimeout(() => {
            if (!gameplayVideoActive) gameplayControls.style.display = 'none';
        }, 550);
    }
}

function updateFinalFade(elapsed) {
    const finalFade = document.getElementById('final-fade-overlay');
    if (!finalFade) return;

    if (elapsed >= FINAL_FADE_START) {
        const progress = Math.min(1, Math.max(0, (elapsed - FINAL_FADE_START) / FINAL_FADE_DURATION));
        finalFade.classList.remove('menu-reveal');
        finalFade.style.display = 'block';
        finalFade.style.opacity = progress.toFixed(3);
    } else {
        finalFade.classList.remove('menu-reveal');
        finalFade.style.display = 'block';
        finalFade.style.opacity = '0';
    }
}

function resetFinalFade() {
    const finalFade = document.getElementById('final-fade-overlay');
    if (!finalFade) return;
    finalFade.classList.remove('menu-reveal');
    finalFade.style.display = 'block';
    finalFade.style.opacity = '0';
}

function holdFinalFadeBlack() {
    const finalFade = document.getElementById('final-fade-overlay');
    if (!finalFade) return;
    finalFade.classList.remove('menu-reveal');
    finalFade.style.display = 'block';
    finalFade.style.opacity = '1';
}

function revealMainMenuFromBlack() {
    const finalFade = document.getElementById('final-fade-overlay');
    if (!finalFade) return;
    finalFade.classList.add('menu-reveal');
    finalFade.style.opacity = '1';
    setTimeout(() => {
        finalFade.style.opacity = '0';
    }, 80);
    setTimeout(() => {
        finalFade.classList.remove('menu-reveal');
    }, 1400);
}

function update() {
    if (!isRunning) return;
    const elapsed = clock.getElapsedTime() + timeOffset;
    syncSegmentAudio(elapsed);
    syncGameplayVideo(elapsed);

    // --- 0:00 - 0:08 主視覺影片播放階段 ---
    if (elapsed < INTRO_VIDEO_DURATION) {
        document.getElementById('intro-video').style.display = 'block';
        requestAnimationFrame(update); // <--- 重要修復：必須持續呼叫以維持時間軸運作
        return; 
    }

    // --- 0:08 閃白光過場 ---
    if (elapsed >= INTRO_VIDEO_DURATION && !videoHidden) {
        videoHidden = true;
        const videoEl = document.getElementById('intro-video');
        videoEl.style.display = 'none';
        videoEl.pause();

        const flash = document.getElementById('white-flash');
        flash.style.display = 'block';
        flash.style.opacity = '1';
        setTimeout(() => {
            document.getElementById('canvas-container').style.opacity = '1';
            flash.style.opacity = '0';
            setTimeout(() => flash.style.display = 'none', 1000);
        }, 100);
    }

    // 如果畫面被碰撞凍結 (1:49 定格)，停止物理更新，直接跳出
    if (isFrozen) {
        updateUI(elapsed); // 修復：畫面凍結時，仍要持續更新字幕，讓旁白正常顯示與淡出
        handleFullTexts(elapsed);
        updateFinalFade(elapsed);
        renderer.render(scene, camera);
        
        // 【新增】：當結尾字幕完成並黑幕淡入後，回到主畫面
        if (elapsed > RESET_TO_MENU_TIME) {
            resetToMainMenu();
            return;
        }

        requestAnimationFrame(update);
        return;
    }

    // --- 3D 環境與全螢幕文字 UI 更新 ---
    updateUI(elapsed);
    handleFullTexts(elapsed);
    updateFinalFade(elapsed);

    const mins = Math.floor(elapsed / 60).toString().padStart(2, '0');
    const secs = Math.floor(elapsed % 60).toString().padStart(2, '0');
    document.getElementById('timer').innerText = `T+ ${mins}:${secs}`;

    waterPlane.position.y = -5 + Math.sin(elapsed * 2) * 0.5;

    // --- 第零段：5 秒團隊介紹 (00:08 - 00:13) ---
    if (elapsed >= TEAM_CARD_START && elapsed < FIRST_SECTION_START) {
        // 給予一個緩慢的全景推進，避免畫面看起來像卡住
        camera.position.lerp(new THREE.Vector3(0, 80, 250), 0.01);
        camera.lookAt(0, 20, 0);
    }
    // --- 第一段：議題交代 (00:13 - 01:08) ---
    else if (elapsed >= FIRST_SECTION_START && elapsed < FIRST_SECTION_END) {
        document.getElementById('ui-layer').style.display = 'flex';
        const script = scripts.find(s => elapsed >= s.start && elapsed <= s.end);
        
        // 呼吸動畫 (加上堤岸的基礎高度 5)
        const breathe = Math.sin(elapsed * 3) * 0.5;
        farmer1.position.y = 5 + breathe;
        farmer2.position.y = 5 - breathe;
        ceoModel.position.y = 5 + breathe;

        if(script) {
            if(script.focus === "farmer1_sigh" || script.focus === "farmer1_angry") {
                camera.position.lerp(new THREE.Vector3(-100, 25, 180), 0.02);
                camera.lookAt(farmer1.position.x, 25, farmer1.position.z);
                if(script.focus === "farmer1_angry") farmer1.rotation.z = Math.sin(elapsed * 20) * 0.05; // 氣到發抖
            } else if (script.focus === "farmer2_sad") {
                camera.position.lerp(new THREE.Vector3(-70, 30, 190), 0.02);
                camera.lookAt(farmer2.position.x, 25, farmer2.position.z);
            } else if (script.focus === "ceo") {
                camera.position.lerp(new THREE.Vector3(70, 15, 140), 0.02);
                camera.lookAt(ceoModel.position.x, 30, ceoModel.position.z);
            } else {
                camera.position.lerp(new THREE.Vector3(0, 150, 400), 0.01);
                camera.lookAt(0, 0, 0);
            }
        }
    } 
    // --- 第二段：遊戲試玩影片 + 操作方式 (01:09 - 02:06) ---
    else if (elapsed >= FIRST_SECTION_END && elapsed < SECOND_SECTION_END) {
        document.getElementById('ui-layer').style.display = 'flex';

        // 以 GitHub 的「06-小遊戲試玩」取代原本 3D 戰鬥演出；影片層會顯示操作方式。
        player.visible = false;
        farmer1.visible = false;
        farmer2.visible = false;
        ceoModel.visible = false;
        bossDrone.visible = false;
        document.getElementById('boss-warning').style.opacity = 0;

        // 讓 3D 畫布維持在後方靜態運作，第三段能接回 Boss 對峙。
        camera.position.lerp(new THREE.Vector3(0, 95, 360), 0.02);
        camera.lookAt(0, 20, 0);
    } 
    // --- 第三段：Boss 對峙與碰撞 (02:07 - 02:49) ---
    else if (elapsed >= SECOND_SECTION_END && elapsed < THIRD_SECTION_END) {
        document.getElementById('ui-layer').style.display = 'flex';
        document.getElementById('canvas-container').style.opacity = '1';
        player.visible = true;
        player.rotation.z = 0; // 回復平飛
        bossDrone.visible = true;

        if (!thirdSegmentPrepared) {
            thirdSegmentPrepared = true;
            player.position.set(0, 180, -250);
            player.rotation.set(0, Math.PI, 0);
            slashes.forEach((s) => scene.remove(s));
            drones.forEach((d) => scene.remove(d));
            explosions.forEach((ex) => scene.remove(ex));
            slashes = [];
            drones = [];
            explosions = [];
        }

        const script = scripts.find(s => elapsed >= s.start && elapsed <= s.end);

        // 128-138 (2:08): 天空變暗，帶到農民
        if (elapsed < 138) {
            sunLight.intensity = Math.max(0.2, sunLight.intensity - 0.02); // 光源變暗
            ambientLight.intensity = 0.2;
            farmer1.visible = true;
            farmer2.visible = true;
            camera.position.lerp(new THREE.Vector3(-45, 10, 150), 0.05); // 由下往上看
            camera.lookAt(-45, 200, 0); // 仰望天空
        } 
        // 139-149 (2:19): 企業家狂笑
        else if (elapsed < 149) {
            ceoModel.visible = true;
            ceoModel.rotation.x = -0.2; // 狂妄仰頭
            camera.position.lerp(new THREE.Vector3(50, 15, 120), 0.05);
            camera.lookAt(ceoModel.position.x, 40, ceoModel.position.z);
        } 
        // 150-161 (2:30): Boss 擋住夕陽
        else if (elapsed < 161) {
            farmer1.visible = false;
            farmer2.visible = false;
            ceoModel.visible = false;
            
            // Boss 緩緩升起，擋在太陽正前方
            bossDrone.position.y = THREE.MathUtils.lerp(bossDrone.position.y, 250, 0.02);
            bossDrone.position.z = -3500;
            
            camera.position.lerp(new THREE.Vector3(0, 100, player.position.z + 200), 0.02);
            camera.lookAt(bossDrone.position);
            
            const warning = document.getElementById('boss-warning');
            warning.style.opacity = Math.sin(elapsed * 8) > 0 ? 0.8 : 0.1;
        } 
        // 162-170 (2:42): 雙方對峙與衝撞
        else {
            document.getElementById('boss-warning').style.opacity = 0;
            
            // 【修復核心】：電影級剪輯 (Cinematic Cut)
            // 在 162 秒時，強制將雙方拉近到適合拍攝「特寫」的距離
            if (elapsed >= 161 && elapsed < 161.2) {
                player.position.set(0, 250, bossDrone.position.z + 1200);
                // 鏡頭切換到銀翼側後方，準備拍攝對峙特寫
                camera.position.set(150, 270, player.position.z + 100); 
            }

            // 162 ~ 167.5秒：對峙特寫
            if (elapsed < 166.5) { 
                // 鏡頭緩慢橫移，營造大戰前的緊繃感
                const standoffCam = new THREE.Vector3(250, 260, player.position.z + 50);
                camera.position.lerp(standoffCam, 0.01);
                
                // 焦點精準鎖定在 Boss 身上，前景會帶到銀翼的側臉與翅膀
                camera.lookAt(bossDrone.position.x, bossDrone.position.y, bossDrone.position.z);
            } 
            // 167.5 秒後：雙方高速衝撞
            else {
                player.position.z -= 100;
                bossDrone.position.z += 60; // Boss 體型大，移動稍微沉重一點
                
                // 衝撞時：鏡頭快速切換到雙方正中央的側邊，捕捉衝擊瞬間
                const centerZ = (player.position.z + bossDrone.position.z) / 2;
                const impactCam = new THREE.Vector3(450, 250, centerZ);
                camera.position.lerp(impactCam, 0.3);
                camera.lookAt(0, 250, centerZ);

                // 相撞瞬間定格 (當 Boss 前緣與銀翼接觸時)
                if (player.position.z <= bossDrone.position.z + 250) {
                    isFrozen = true; // 凍結畫面
                    
                    const canvasCont = document.getElementById('canvas-container');
                    canvasCont.style.transition = "filter 2s";
                    canvasCont.style.filter = "brightness(0) grayscale(1)"; 
                    
                    document.getElementById('timer').style.display = 'none';
                    document.getElementById('scene-title').style.display = 'none';
                }
            }

            // Boss 動態維持
            bossRotors.forEach((r, i) => r.rotation.y += (i % 2 === 0 ? 0.5 : -0.5));
            const eye = bossDrone.getObjectByName("eye");
            const eyeGlow = bossDrone.getObjectByName("eyeGlow");
            const pulse = 1 + Math.sin(elapsed * 10) * 0.2;
            eye.scale.setScalar(pulse);
            eyeGlow.scale.setScalar(pulse * 1.5);
        }
    } // <-- 修復語法錯誤：補上這一個遺漏的右括號

    // 處理斬擊特效與爆炸物理
    slashes.forEach((s, i) => {
        s.scale.multiplyScalar(1.08); 
        s.userData.life--;
        s.material.opacity = (s.userData.life / s.userData.maxLife);
        if(s.userData.life <= 0) { 
            scene.remove(s); 
            s.geometry.dispose();
            s.material.dispose();
            slashes.splice(i, 1); 
        }
    });

    drones.forEach((d, i) => {
        if(!d.userData.dead) {
            d.position.z += 12; 
            d.position.x += d.userData.driftX;
            d.position.y += d.userData.driftY;
            d.rotation.z = Math.sin(elapsed * 5 + i) * 0.2;
        } else {
            d.position.y -= 5;
            d.rotation.x += 0.2;
            d.rotation.z += 0.1;
        }
        if(d.position.z > player.position.z + 800 || d.position.y < -50) {
            scene.remove(d); 
            drones.splice(i, 1);
        }
    });

    explosions.forEach((ex, i) => {
        ex.children.forEach(p => {
            if(p.name !== "flash") {
                p.position.add(p.userData.velocity);
                p.rotation.x += p.userData.rotationSpeed.x;
                p.rotation.y += p.userData.rotationSpeed.y;
                p.userData.velocity.y -= 0.5; 
            }
        });
        const flash = ex.getObjectByName("flash");
        if(flash) flash.scale.multiplyScalar(0.8); 
        ex.userData.life--;
        if(ex.userData.life <= 0) { 
            scene.remove(ex); 
            explosions.splice(i, 1); 
        }
    });

    renderer.render(scene, camera);
    requestAnimationFrame(update);
}

function handleFullTexts(elapsed) {
    const fullText = document.getElementById('full-text-content');
    const fullTextContainer = document.getElementById('full-text-overlay');
    const teamCard = document.getElementById('team-card');

    // 0:08 - 0:13 團隊介紹：高雄市立瑞祥高中 / 海洋探險隊 / 子家、威辰、楚峻
    if (elapsed >= TEAM_CARD_START && elapsed < FIRST_SECTION_START) {
        teamCard.classList.add('active');
        fullTextContainer.style.opacity = '0';
        return;
    } else {
        teamCard.classList.remove('active');
    }

    // 2:49 - 2:54 核心標語
    if (elapsed >= FINAL_TEXT_ONE_START && elapsed < FINAL_TEXT_TWO_START) {
        fullText.innerText = `魚電共生──這象徵七股未來的圖騰，
應建築在大家的福祉上。`;
        fullTextContainer.style.opacity = '1';
    } 
    // 2:54 起：遊戲宣傳標語；黑幕淡入時仍保留，讓字幕跟著畫面慢慢暗下去
    else if (elapsed >= FINAL_TEXT_TWO_START && elapsed < RESET_TO_MENU_TIME) {
        fullText.innerText = `七股的未來，應你我來守護！
一起加入銀翼守護者吧！
5月26日不會公測！`;
        fullTextContainer.style.opacity = '1';
    } 
    else {
        fullTextContainer.style.opacity = '0';
    }
}

function updateUI(t) {
    const script = scripts.find(s => t >= s.start && t <= s.end);
    const container = document.getElementById('subtitle-container');
    
    if (script) {
        document.getElementById('speaker').innerText = script.speaker;
        document.getElementById('content').innerText = script.text;
        document.getElementById('scene-title').innerText = script.scene.toUpperCase();
        container.classList.add('active');
        return script;
    } else {
        container.classList.remove('active');
        return null;
    }
}

// 【新增】：重置所有設定，回到起始主畫面的函式
function resetToMainMenu() {
    isRunning = false;
    isFrozen = false;
    videoHidden = false;
    timeOffset = 0;
    thirdSegmentPrepared = false;

    stopAllSegmentAudio(true);
    resetGameplayVideo();

    // 停止並重置開場影片
    const videoEl = document.getElementById('intro-video');
    videoEl.pause();
    videoEl.currentTime = 0;
    videoEl.style.display = 'none';

    // 移除舊的 3D 畫布與定格時的濾鏡特效
    const canvasCont = document.getElementById('canvas-container');
    canvasCont.innerHTML = ''; 
    canvasCont.style.transition = "none"; 
    canvasCont.style.filter = "none";
    canvasCont.style.opacity = "0";
    
    // 重置所有 UI 顯示；先保持全黑，等主畫面準備好後再淡出黑幕
    holdFinalFadeBlack();
    document.getElementById('full-text-overlay').style.opacity = '0';
    document.getElementById('team-card').classList.remove('active');
    document.getElementById('ui-layer').style.display = 'none';
    document.getElementById('timer').style.display = 'block';
    document.getElementById('scene-title').style.display = 'block';
    document.getElementById('boss-warning').style.opacity = '0';

    // 清空陣列避免重複累積與記憶體流失
    drones = [];
    slashes = [];
    explosions = [];
    bossRotors = [];

    // 重新顯示主畫面選單，並從黑畫面淡回最初畫面
    const overlay = document.getElementById('start-overlay');
    overlay.style.display = 'flex';
    setTimeout(() => {
        overlay.style.opacity = '1';
        revealMainMenuFromBlack();
    }, 50);
}

function startApp() {
    const overlay = document.getElementById('start-overlay');
    overlay.style.opacity = '0';
    
    const videoEl = document.getElementById('intro-video');
    resetFinalFade();
    stopAllSegmentAudio(true);
    resetGameplayVideo();
    thirdSegmentPrepared = false;
    primeBackgroundAudio();
    videoEl.currentTime = 0;
    videoEl.load();
    
    setTimeout(() => {
        overlay.style.display = 'none';
        isRunning = true;
        clock.start();
        initThree();
        
        // 嘗試播放影片 (處理瀏覽器自動播放政策)
        videoEl.play().catch(e => {
            console.warn("影片自動播放被阻擋或找不到檔案，直接進入 3D", e);
            timeOffset = INTRO_VIDEO_DURATION; // 跳過影片時間，仍保留 5 秒團隊畫面
            videoEl.style.display = 'none';
        });
        
        update();
    }, 1000);
}

// 處理視窗大小改變
window.addEventListener('resize', () => {
    if (!camera || !renderer) return;
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// 開發用快捷鍵：按 'S' 跳過 10 秒
window.addEventListener('keydown', (e) => {
    if(e.key === 's' || e.key === 'S') {
        timeOffset += 10; 
        console.log("快轉至 T+" + Math.floor(clock.getElapsedTime() + timeOffset) + "秒");
    }
});
