// 網頁音效生成器 (模擬震撼背景配樂)
class SoundGenerator {
  constructor() {
      this.ctx = null;
      this.currentPart = 0;
      this.interval = null;
  }

  init() {
      try {
          this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch(e) {
          console.warn("音訊系統初始化失敗: ", e);
      }
  }

  playDrone(freq, type, duration, vol) {
      if (!this.ctx || this.ctx.state === 'suspended') return;
      try {
          let osc = this.ctx.createOscillator();
          let gain = this.ctx.createGain();
          osc.type = type;
          osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
          gain.gain.setValueAtTime(vol, this.ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + duration);
          osc.connect(gain);
          gain.connect(this.ctx.destination);
          osc.start();
          osc.stop(this.ctx.currentTime + duration);
      } catch (err) {}
  }

  startMusic(part) {
      if (this.currentPart === part) return;
      this.currentPart = part;
      if (this.interval) clearInterval(this.interval);

      if (part === 1) {
          // 第一段配樂：悲傷低沉、沈默土地 (憂傷緩慢)
          this.interval = setInterval(() => {
              this.playDrone(55, 'triangle', 4, 0.5); // A1 低音 (音量調高)
              this.playDrone(110, 'sine', 3, 0.3); // (音量調高)
              if (Math.random() > 0.5) {
                  this.playDrone(165, 'sine', 2, 0.15); // 五度音 (音量調高)
              }
          }, 3000);
      } else if (part === 2) {
          // 第二段配樂：熱血戰鬥、銀羽反抗 (快速電子節奏)
          let step = 0;
          const notes = [110, 130, 146, 165, 196, 220];
          this.interval = setInterval(() => {
              let note = notes[step % notes.length];
              this.playDrone(note / 2, 'sawtooth', 0.2, 0.25); // 貝斯音 (音量調高)
              if (step % 4 === 0) {
                  this.playDrone(note, 'triangle', 0.4, 0.3); // 主音 (音量調高)
              }
              if (step % 8 === 0) {
                  this.playDrone(80, 'sine', 0.15, 0.5); // 模擬鼓點 (音量調高)
              }
              step++;
          }, 250);
      } else if (part === 3) {
          // 第三段配樂：終極Boss、雷虎首領警告音 (急促且不和諧重低音)
          let step = 0;
          this.interval = setInterval(() => {
              this.playDrone(45, 'sawtooth', 0.8, 0.5); // 極低壓迫感 (音量調高)
              if (step % 2 === 0) {
                  this.playDrone(440, 'sine', 0.1, 0.15); // 警報頻率 (音量調高)
                  this.playDrone(466, 'sine', 0.15, 0.15); // 詭異音程 (音量調高)
              }
              step++;
          }, 500);
      }
  }

  stop() {
      if (this.interval) {
          clearInterval(this.interval);
          this.interval = null;
      }
      if (this.ctx) {
          const tempCtx = this.ctx;
          this.ctx = null;
          if (tempCtx.state !== 'closed') {
              tempCtx.close().catch(e => {});
          }
      }
  }
}

  panelShieldR.rotation.z = -0.4;
  bossDrone.add(panelShieldL, panelShieldR);

  const rotorGeo = new THREE.CylinderGeometry(110, 110, 8, 32);
  const rotorMat = new THREE.MeshPhongMaterial({color: 0x333333, transparent: true, opacity: 0.6});
  const positions = [[-300, 30, -150], [300, 30, -150], [-300, 30, 150], [300, 30, 150]];
  positions.forEach(pos => {
      const r = new THREE.Mesh(rotorGeo, rotorMat);
      r.position.set(...pos);
      bossRotors.push(r);
      bossDrone.add(r);
  });
  bossDrone.add(bMainBody, bEye);
  bossDrone.position.set(0, 400, -2500);
  bossDrone.visible = false;
  scene.add(bossDrone);

  camera.position.set(0, 50, 300);
}

function createHumanoid(color, hasHat) {
  const group = new THREE.Group();
  const head = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.MeshPhongMaterial({color: 0xffdbac}));
  head.position.y = 28;
  head.name = "head";
  if(hasHat) {
      const hat = new THREE.Mesh(new THREE.CylinderGeometry(6, 8, 1, 16), new THREE.MeshPhongMaterial({color: 0xe3c58f}));
      hat.position.y = 31;
      group.add(hat);
  }

  const torso = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 6), new THREE.MeshPhongMaterial({color: color}));
  torso.position.y = 18;
  torso.name = "torso";
  const legs = new THREE.Mesh(new THREE.BoxGeometry(8, 12, 5), new THREE.MeshPhongMaterial({color: 0x333333}));
  legs.position.y = 6;
  group.add(head, torso, legs);
  return group;
}

function createSurroundSlash() {
  const slashGeo = new THREE.TorusGeometry(60, 2.0, 8, 32, Math.PI);
  const slashMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.95 });
  const slash = new THREE.Mesh(slashGeo, slashMat);
  slash.position.copy(player.position);
  slash.rotation.x = Math.PI / 2;
  slash.userData = { life: 20 };
  slashes.push(slash);
  scene.add(slash);
  drones.forEach((d) => {
      if(slash.position.distanceTo(d.position) < 100) {
          createExplosion(d.position);
          d.userData.dead = true;
      }
  });
}

function createExplosion(pos) {
  const group = new THREE.Group();
  for(let i = 0; i < 20; i++) {
      const p = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
      p.userData.velocity = new THREE.Vector3((Math.random()-0.5)*12, (Math.random()-0.5)*12, (Math.random()-0.5)*12);
      group.add(p);
  }
  group.position.copy(pos);
  group.userData.life = 35;
  explosions.push(group);
  scene.add(group);
}

function createDrone() {
  const drone = new THREE.Mesh(new THREE.BoxGeometry(12, 4, 12), new THREE.MeshPhongMaterial({ color: 0xff3300 }));
  drone.position.set(Math.random()*1000-500, 60 + Math.random()*120, player.position.z - 1200);
  drones.push(drone);
  scene.add(drone);
}

// 主渲染與動畫迴圈
function update() {
  if (!isRunning) return;
  const elapsed = clock.getElapsedTime();
  const script = updateUI(elapsed);

  // ==========================================
  // 語音配音動態播放控制 (在影片/3D執行到 17秒時開始)
  // ==========================================
  if (elapsed >= 17.0 && !voiceoverPlayed) {
      if (voiceoverAudio) {
          voiceoverAudio.play().catch(e => {
              console.warn("配音播放失敗 (可能被瀏覽器限制):", e);
          });
      }
      voiceoverPlayed = true;
  }

  const videoLayer = document.getElementById('video-layer');
  const introVideo = document.getElementById('intro-video');
  const creditsLayer = document.getElementById('credits-layer');
  const creditsContent = document.getElementById('credits-content');
  const endingLayer1 = document.getElementById('ending-layer-1');
  const endingLayer2 = document.getElementById('ending-layer-2');

  // ==========================================
  // 0:00 - 0:10 第一個畫面：主視覺
  // ==========================================
  if (elapsed < 11) {
      // 0:06 開始慢慢發光
      if (elapsed >= 8 && elapsed < 10) {
          videoLayer.classList.add('glow-active');
      }
      // 0:08 轉場到第二個畫面
      if (elapsed >= 10 && videoLayer.style.opacity !== '0') {
          videoLayer.style.opacity = '0';
          setTimeout(() => {
              videoLayer.style.display = 'none';
              try { introVideo.pause(); } catch(e) {}
          }, 1000);
      }
  }

  // ==========================================
  // 0:11 - 0:15 第二個畫面：瑞祥高中製作群
  // ==========================================
  if (elapsed >= 11 && elapsed < 16) {
      if (creditsLayer.style.opacity !== '1') {
          creditsLayer.style.opacity = '1';
          creditsContent.style.transform = 'scale(1.05)';
      }
      // 0:10 背景音樂(第一段) 漸漸出現
      if (elapsed >= 12) {
          BGM.startMusic(1);
      }
      // 0:13 畫面漸暗，轉場到 3D 場景
      if (elapsed >= 15 && creditsLayer.style.opacity !== '0') {
          creditsLayer.style.opacity = '0';
          setTimeout(() => { creditsLayer.style.display = 'none'; }, 1000);
      }
  }

  // ==========================================
  // 0:16 - 1:17 【第一大段：議題交代爭議與故事背景】(與講稿時間精準同步)
  // ==========================================
  if (elapsed >= 16 && elapsed < 81) {
      document.getElementById('scene-title').style.opacity = '1';

      BGM.startMusic(1);

      if (script) {
          if (script.focus === "farmer1") {
              camera.position.lerp(new THREE.Vector3(-85, 35, 150), 0.05);
              camera.lookAt(farmer1.position.x, 24, farmer1.position.z);
          } else if (script.focus === "farmer2") {
              camera.position.lerp(new THREE.Vector3(-55, 33, 155), 0.05);
              camera.lookAt(farmer2.position.x, 24, farmer2.position.z);
          } else if (script.focus === "farmer1_angry") {
              camera.position.lerp(new THREE.Vector3(-75, 40, 140), 0.06);
              camera.lookAt(farmer1.position.x, 25, farmer1.position.z);
              // 微微震動代表憤怒咬牙
              farmer1.position.x = -45 + Math.sin(elapsed * 40) * 0.4;
          } else if (script.focus === "ceo") {
              camera.position.lerp(new THREE.Vector3(75, 30, 145), 0.05);
              camera.lookAt(ceoModel.position.x, 24, ceoModel.position.z);
          } else if (script.focus === "wide") {
              // 漸暗轉場
              camera.position.lerp(new THREE.Vector3(0, 180, 500), 0.02);
              camera.lookAt(0, 40, 0);
              if (elapsed >= 76) {
                  renderer.domElement.style.filter = `brightness(${(77 - elapsed)})`;
              }
          }
      }
  }

  // ==========================================
  // 1:21 - 2:12 【第二大段：介紹遊戲玩法與敘事推進】
  // ==========================================
  if (elapsed >= 81 && elapsed < 137) {
      BGM.startMusic(2);
      renderer.domElement.style.filter = "brightness(1)";

      player.visible = true;
      farmer1.visible = true;
      farmer2.visible = true;
      ceoModel.visible = true;

      if (script) {
          if (script.focus === "player_reveal") {
              camera.position.lerp(new THREE.Vector3(-35, 20, 130), 0.05);
              camera.lookAt(player.position.x, player.position.y, player.position.z);
          }
          else if (script.focus === "player_fight_start" || script.focus === "player_action" || script.focus === "player_action_spin") {
              // 主角飛行戰鬥與自動攻擊
              leftWing.rotation.z = Math.sin(elapsed * 15) * 0.8;
              rightWing.rotation.z = -Math.sin(elapsed * 15) * 0.8;
              player.position.x = Math.sin(elapsed * 1.5) * 280;
              player.position.y = 120 + Math.cos(elapsed * 2.0) * 50;
              player.position.z -= 4.0; // 持續前進

              // 配合 1:54 旁白「強風氣旋」施展華麗旋轉特效
              if (script.focus === "player_action_spin") {
                  player.rotation.y += 0.25;
              } else {
                  player.rotation.y = 0;
              }

              // 無限地表滾動：當玩家向前飛行時，將過遠的光電板推到前方
              if (gridGroup) {
                  gridGroup.children.forEach(panel => {
                      const offsetZ = panel.position.z - player.position.z;
                      if (offsetZ > 800) {
                          panel.position.z -= 1600; // 移動到更遠的前方
                      }
                  });
              }

              // 每 0.8 秒斬擊
              if(elapsed - lastAttackTime > 0.8) {
                  createSurroundSlash();
                  lastAttackTime = elapsed;
              }
              if(Math.floor(elapsed * 10) % 5 === 0 && drones.length < 50) {
                  createDrone();
              }

              // 飛行鏡頭追蹤
              const targetCam = new THREE.Vector3(player.position.x * 0.5, player.position.y + 120, player.position.z + 280);
              camera.position.lerp(targetCam, 0.08);
              camera.lookAt(player.position.x, player.position.y, player.position.z - 150);
          }
          else if (script.focus === "ceo_mad") {
              camera.position.lerp(new THREE.Vector3(65, 35, 130), 0.08);
              camera.lookAt(ceoModel.position.x, 26, ceoModel.position.z);
              const torso = ceoModel.getObjectByName("torso");
              if (torso) torso.position.y = 18 + Math.sin(elapsed * 35) * 0.6;
          }
          else if (script.focus === "player_pose") {
              player.position.lerp(new THREE.Vector3(0, 160, player.position.z - 10), 0.05);
            
              // 華麗中二轉圈
              player.rotation.y += 0.15;
              player.rotation.z = Math.sin(elapsed * 5) * 0.5;

              camera.position.lerp(new THREE.Vector3(player.position.x, player.position.y + 15, player.position.z + 80), 0.06);
              camera.lookAt(player.position.x, player.position.y, player.position.z);

              leftWing.rotation.z = 0.9;
              rightWing.rotation.z = -0.9;
          }
      }
  }

  // ==========================================
  // 2:17 - 2:51 【第三大段：議題喚醒與遊戲宣傳】
  // ==========================================
  if (elapsed >= 137 && elapsed < 175) {
      BGM.startMusic(3);
      bossDrone.visible = true;

      if (script) {
          if (script.focus === "sky_darkens") {
              scene.fog.color.setHex(0x661100); // 變暗時改為深橘紅/暗紅色，避免過黑
              scene.background.setHex(0x661100); 
              backgroundSun.material.color.setHex(0x991100);
            
              camera.position.lerp(new THREE.Vector3(-40, 15, 125), 0.06);
              camera.lookAt(farmer1.position.x, 32, farmer1.position.z);
            
              const head1 = farmer1.getObjectByName("head");
              if (head1) head1.rotation.y = Math.sin(elapsed * 12) * 0.2;
              const head2 = farmer2.getObjectByName("head");
              if (head2) head2.rotation.y = Math.cos(elapsed * 12) * 0.2;
          }
          else if (script.focus === "ceo_laugh") {
              camera.position.lerp(new THREE.Vector3(30, 32, 120), 0.08);
              camera.lookAt(ceoModel.position.x, 26, ceoModel.position.z);
            
              const torso = ceoModel.getObjectByName("torso");
              const head = ceoModel.getObjectByName("head");
              if (torso && head) {
                  torso.position.y = 18 + Math.sin(elapsed * 45) * 0.8;
                  head.position.y = 28 + Math.sin(elapsed * 45) * 0.8;
              }
          }
          else if (script.focus === "boss_reveal") {
              bossDrone.position.z = THREE.MathUtils.lerp(bossDrone.position.z, player.position.z - 700, 0.03);
              bossRotors.forEach((r, i) => r.rotation.y += (i % 2 === 0 ? 0.4 : -0.4));
            
              camera.position.lerp(new THREE.Vector3(0, 450, player.position.z - 100), 0.04);
              camera.lookAt(bossDrone.position.x, bossDrone.position.y - 100, bossDrone.position.z);

              const warning = document.getElementById('boss-warning');
              warning.style.opacity = Math.sin(elapsed * 15) > 0 ? '1.0' : '0.1';
              document.getElementById('vignette').style.boxShadow = `inset 0 0 300px rgba(255,0,0,0.6)`;
          }
          else if (script.focus === "final_clash") {
              document.getElementById('boss-warning').style.opacity = '0';
            
              // 相向衝撞
              player.position.z = THREE.MathUtils.lerp(player.position.z, bossDrone.position.z + 100, 0.08);
              bossDrone.position.z = THREE.MathUtils.lerp(bossDrone.position.z, player.position.z - 100, 0.04);

              camera.position.lerp(new THREE.Vector3(300, 250, player.position.z + 150), 0.05);
              camera.lookAt(0, 160, player.position.z - 200);

              if (player.position.distanceTo(bossDrone.position) < 200) {
                  if (explosions.length === 0) {
                      createExplosion(new THREE.Vector3(0, 180, player.position.z - 50));
                  }
                  player.position.z = player.position.z;
                  bossDrone.position.z = bossDrone.position.z;
              }

              // 接近終點前淡入黑暗
              if (elapsed >= 175) {
                  renderer.domElement.style.filter = `brightness(${(175 - elapsed) / 2})`;
                  document.getElementById('vignette').style.boxShadow = `inset 0 0 500px rgba(0,0,0,1)`;
              }
          }
      }
  }

  // ==========================================
  // 2:53 起 - 尾聲字幕展示配合 (配音此時會繼續念)
  // ==========================================
  if (elapsed >= 175) {
      BGM.stop();
     
      // 讓配音在 2:55 (175秒) 到 3:11 (191秒) 之間繼續念，只有超過 191 秒才暫停配音
      if (elapsed >= 191) {
          if (voiceoverAudio) {
              try { voiceoverAudio.pause(); } catch(e) {}
          }
      }
     
      renderer.domElement.style.filter = "brightness(0)";
      document.getElementById('scene-title').style.opacity = '0';
      document.getElementById('ui-layer').style.display = 'none';

      // 2:55 - 3:01 尾聲字幕一 (175 - 181 秒)
      if (elapsed >= 175 && elapsed < 181) {
          endingLayer1.style.opacity = '1';
      } else {
          endingLayer1.style.opacity = '0';
      }

      // 3:05 - 3:11 尾聲字幕二 (185 - 191 秒)
      if (elapsed >= 185 && elapsed <= 191) {
          endingLayer2.style.opacity = '1';
      } else {
          endingLayer2.style.opacity = '0';
      }
  }

  // 動態特效更新
  slashes.forEach((s, i) => {
      s.scale.multiplyScalar(1.08);
      s.userData.life--;
      s.material.opacity = s.userData.life / 20;
      if(s.userData.life <= 0) { scene.remove(s); slashes.splice(i, 1); }
  });
  drones.forEach((d, i) => {
      d.position.z += 10;
      if(d.userData.dead || d.position.z > player.position.z + 500) {
          scene.remove(d); drones.splice(i, 1);
      }
  });
  explosions.forEach((ex, i) => {
      ex.children.forEach(p => p.position.add(p.userData.velocity));
      ex.userData.life--;
      if(ex.userData.life <= 0) { scene.remove(ex); explosions.splice(i, 1); }
  });

  renderer.render(scene, camera);
  requestAnimationFrame(update);
}

// Subtitle 更新控制
function updateUI(t) {
  const script = scripts.find(s => t >= s.start && t <= s.end);
  const container = document.getElementById('subtitle-container');
  if (script) {
      document.getElementById('speaker').innerText = script.speaker;
      document.getElementById('content').innerText = script.text;
      document.getElementById('scene-title').innerText = script.scene.toUpperCase();
      container.classList.add('active');
      return script;
  } else {
      container.classList.remove('active');
      return null;
  }
}

// 啟動應用
function startApp() {
  document.getElementById('start-overlay').style.display = 'none';
  BGM.init();

  // 初始化與預載配音檔案
  voiceoverPlayed = false;
  try {
      voiceoverAudio = new Audio("https://raw.githubusercontent.com/igudesman222/-/main/03-%E9%A0%90%E5%91%8A%E7%89%87(%E9%85%8D%E9%9F%B3)/01-%E9%85%8D%E9%9F%B3MP3/06-%E7%91%9E%E7%A5%A5%E9%AB%98%E4%B8%AD-%E7%AC%AC%E5%85%AD%E7%B5%84%E9%85%8D%E9%9F%B3(%E4%BF%AE).mp3");
      voiceoverAudio.preload = "auto";
      voiceoverAudio.volume = 1.0; // 確保旁白音量保持在最大值 100%
  } catch (e) {
      console.warn("無法初始化語音音軌:", e);
  }

  const introVideo = document.getElementById('intro-video');
  const fallbackLayer = document.getElementById('video-fallback');

  // 當影片出錯時，自動隱藏影片元素，呈現精緻的 CSS 備用主視覺
  introVideo.onerror = function() {
      introVideo.style.display = 'none';
      fallbackLayer.style.display = 'flex';
  };

  introVideo.play().catch(e => {
      console.warn("影片播放受限或未找到，啟動備用主視覺顯示機制: ", e);
      introVideo.style.display = 'none';
      fallbackLayer.style.display = 'flex';
  });

  isRunning = true;
  clock.start();
  initThree();
  update();
}

// 精準自適應大小調整
window.addEventListener('resize', () => {
  if (!camera) return;
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
