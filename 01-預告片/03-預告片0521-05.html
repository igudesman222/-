<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>七股風雲 - 互動敘事體驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --char-wen: #60a5fa;
            --char-mei: #f87171;
            --char-hui: #34d399;
            --char-nar: #e2e8f0;
        }
        body { 
            font-family: 'Noto Serif TC', serif; 
            background: #020617; 
            color: white; 
            margin: 0; 
            overflow: hidden; 
            user-select: none;
        }
        
        .trailer-overlay { position: fixed; inset: 0; z-index: 1000; background: #000; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: opacity 1s ease-in-out; } 
        .trailer-overlay.active { opacity: 1; } 
        .top-bar { position: absolute; top: 0; left: 0; width: 100%; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 1010; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); } 
        .trailer-timer { font-family: 'Courier New', Courier, monospace; font-size: 1.25rem; color: #ef4444; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(239, 68, 68, 0.5); } 
        .progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: rgba(255,255,255,0.1); z-index: 1020; } 
        .progress-bar { height: 100%; width: 0%; background: #ef4444; transition: width 1s linear; box-shadow: 0 0 10px #ef4444; }
        
        #video-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: stretch;
            justify-content: stretch;
            position: relative;
            overflow: hidden;
            background: #000;
        }
        
        /* 前 10 秒主視覺影片：改為全螢幕滿版呈現 */
        .yt-wrapper {
            position: absolute;
            inset: 0;
            width: 100vw;
            height: 100vh;
            max-width: none;
            aspect-ratio: auto;
            overflow: hidden;
            border-radius: 0;
            box-shadow: none;
            background: #000;
        }
        
        .yt-wrapper video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            max-width: none;
            object-fit: cover;
            object-position: center center;
            border: none;
        }

        .video-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, #1e293b, #000); text-align: center; }

        .scene-sim {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
            overflow: hidden; 
        }
        .scene-sim.active {
            opacity: 1;
        }

        .subtitle-box {
            position: absolute;
            left: 50%;
            bottom: 5%;
            width: 95%;
            max-width: 1300px;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-left: 8px solid transparent; 
            padding: 2.1rem 3.2rem;
            border-radius: 1.5rem;
            z-index: 1005;
            transform: translate(-50%, 30px) scale(0.95);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255,255,255,0.05);
        }
        .subtitle-box.visible {
            transform: translate(-50%, 0) scale(1);
            opacity: 1;
        }
        .subtitle-content {
            display: flex;
            align-items: flex-end;
            gap: clamp(1rem, 2vw, 2rem);
        }
        .subtitle-avatar-wrap {
            flex: 0 0 clamp(110px, 13vw, 210px);
            height: clamp(125px, 16vw, 245px);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            margin: -4rem 0 -1.15rem -1.8rem;
            pointer-events: none;
        }
        .subtitle-avatar-wrap.hidden { display: none; }
        .subtitle-avatar {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 18px 24px rgba(0,0,0,0.75));
        }
        .subtitle-copy {
            flex: 1 1 auto;
            min-width: 0;
        }

        /* 對話人物圖：來源目前是 JPG，以下搭配 JS canvas 近似去背；失敗時用 soft-key 降低白底感 */
        .subtitle-avatar.is-processing {
            opacity: 0.88;
        }
        .subtitle-avatar.cutout-ready {
            mix-blend-mode: normal;
            background: transparent;
        }
        .subtitle-avatar.soft-key {
            mix-blend-mode: multiply;
            filter: contrast(1.12) saturate(1.08) drop-shadow(0 18px 24px rgba(0,0,0,0.75));
        }


        .char-label { font-weight: 900; font-size: clamp(1.2rem, 2vw, 1.6rem); margin-bottom: 0.8rem; display: block; letter-spacing: 0.1em; text-transform: uppercase; } 
        .sub-text { font-size: clamp(1.45rem, 2.75vw, 2.3rem); line-height: 1.6; font-weight: 500; text-shadow: 0 4px 8px rgba(0,0,0,0.9); transition: color 0.3s; } 
        .action { opacity: 0.72; font-size: 0.82em; }
        .eff-sad { animation: breath 3s infinite alternate; } 
        .eff-sad .hl { color: #cbd5e1; text-shadow: 0 0 15px rgba(255,255,255,0.4); } 
        .eff-angry { animation: slight-shake 0.5s cubic-bezier(.36,.07,.19,.97) both; font-weight: 700; } 
        .eff-angry .hl { color: #fca5a5; text-shadow: 0 0 20px rgba(248, 113, 113, 0.6); } 
        .eff-tech { letter-spacing: 0.05em; } 
        .eff-tech .hl { color: #6ee7b7; font-family: monospace; text-shadow: 0 0 10px rgba(52, 211, 153, 0.8); animation: glitch 2s infinite; } 
        .eff-firm { letter-spacing: 0.08em; font-weight: 700; } 
        .eff-firm .hl { color: #fde047; text-shadow: 0 0 25px rgba(250, 204, 21, 0.5); } 
        
        @keyframes breath { 0% { opacity: 0.85; filter: blur(0px); } 100% { opacity: 1; filter: blur(0.5px); text-shadow: 0 0 20px rgba(255,255,255,0.2); } } 
        @keyframes slight-shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-3px, 0, 0); } 40%, 60% { transform: translate3d(3px, 0, 0); } } 
        @keyframes glitch { 0%, 100% { opacity: 1; } 95% { opacity: 0.5; } 98% { opacity: 1; text-shadow: 0 0 20px #6ee7b7; } }

        .v-tech { background: radial-gradient(circle at center, #064e3b 0%, #020617 70%); }
        .v-dark { background: #000; }
        
        .carousel-container {
            position: absolute;
            inset: 0;
            z-index: 0;
        }
        .carousel-slide {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 2s ease-in-out;
            animation: ken-burns 20s ease-in-out infinite alternate;
        }
        .carousel-slide.active {
            opacity: 1;
        }
        @keyframes ken-burns {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.15) translate(-2%, -1%); }
        }



        /* 第一大段：依講稿秒數指定單張背景，避免輪播與台詞不對位 */
        .scripted-stage {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: #020617;
            overflow: hidden;
        }
        .scripted-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center center;
            opacity: 1;
            transform: scale(1.04);
            transition: background-image 0.45s ease-in-out, opacity 0.45s ease-in-out, transform 5s ease-out;
            filter: saturate(0.95) contrast(1.04);
        }
        .scripted-bg.bg-pulse { transform: scale(1.1); }
        .scripted-vignette {
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to top, rgba(2, 6, 23, 0.88) 0%, rgba(2, 6, 23, 0.25) 42%, rgba(2, 6, 23, 0.15) 100%),
                radial-gradient(circle at 50% 40%, rgba(0,0,0,0.05), rgba(0,0,0,0.62));
            z-index: 1;
        }
        .scene-caption {
            position: absolute;
            top: 6rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            color: rgba(226,232,240,0.92);
            background: rgba(0, 0, 0, 0.42);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 999px;
            padding: 0.65rem 1.4rem;
            font-size: clamp(0.9rem, 1.4vw, 1.15rem);
            letter-spacing: 0.18em;
            font-weight: 700;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            white-space: nowrap;
            box-shadow: 0 18px 36px rgba(0,0,0,0.36);
        }
        .gameplay-full {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .gameplay-full video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }
        .gameplay-film-overlay {
            position: absolute;
            inset: 0;
            pointer-events: none;
            background: linear-gradient(to top, rgba(0,0,0,0.42), transparent 36%, rgba(0,0,0,0.28));
            z-index: 1;
        }
        .gameplay-title-badge {
            position: absolute;
            top: 6rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            padding: 0.65rem 1.35rem;
            border-radius: 999px;
            background: rgba(2, 6, 23, 0.62);
            border: 1px solid rgba(125, 211, 252, 0.32);
            color: #e0f2fe;
            font-weight: 900;
            letter-spacing: 0.2em;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 0 32px rgba(14, 165, 233, 0.18);
        }
        .gameplay-fallback {
            position: absolute;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.16), rgba(0,0,0,0.94));
            z-index: 3;
        }
        .gameplay-full.video-error .gameplay-fallback { display: flex; }

        .blue-glow-ext {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(14, 165, 233, 0.5) 0%, transparent 60%);
            z-index: 1015;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 1s ease-out, transform 1.5s ease-out;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        .blue-glow-ext.active { opacity: 1; transform: scale(1.3); }
        .black-transition { position: absolute; inset: 0; background: #000; z-index: 1016; opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none; } .black-transition.active { opacity: 1; }
        
        @media (max-width: 768px) {
            .subtitle-box { padding: 1.35rem 1.45rem; bottom: 8%; width: 92%; }
            .subtitle-content { align-items: flex-end; gap: 0.85rem; }
            .subtitle-avatar-wrap {
                flex-basis: clamp(76px, 24vw, 110px);
                height: clamp(90px, 30vw, 130px);
                margin: -2.4rem 0 -0.7rem -0.7rem;
            }
            .sub-text { font-size: clamp(1.15rem, 5.3vw, 1.65rem); }
            .char-label { font-size: clamp(1rem, 4.6vw, 1.25rem); margin-bottom: 0.45rem; }
        }
    </style>
</head>

<script>
// =========================================================================

// =========================================================================
const COMMIT_ID = "11e779ccbe2e1567b7b194b4aa1c47634652bcb7";
const GAME_REF = "main"; // 03-小遊戲試玩.mp4 已更新在 main 分支
const ROOT_DIR = "03-第三組資源";
const RAW_BASE_URL = `https://raw.githubusercontent.com/igudesman222/igudesman2012/${COMMIT_ID}/`;
const MEDIA_BASE_URL = `https://media.githubusercontent.com/media/igudesman222/igudesman2012/${COMMIT_ID}/`;

const GAME_VIDEO_PARTS = ["001-影片主視覺", "03-小遊戲試玩.mp4"];

const ASSETS = {
    mainVideo: asset(...MAIN_VIDEO_PARTS),
    mainVideoSources: [asset(...MAIN_VIDEO_PARTS), mediaAsset(...MAIN_VIDEO_PARTS), pagesAsset(...MAIN_VIDEO_PARTS)],
    gameVideo: mediaGameAsset(...GAME_VIDEO_PARTS),

    bgmAct1: asset("003-背景音樂", "01-海潮微光（第一幕）.mp3"),
    bgmAct2: asset("003-背景音樂", "02-遮天板（第二幕）.mp3"),

    backgrounds: {

const trailerScript = [
    { start: 0, end: 10, type: 'video' },
    { start: 11, end: 16, type: 'team' },

    // 第一大段：議題交代爭議與故事背景（依 03-第三組宣傳片講稿(操作).docx）

const mainVideo = document.getElementById('main-video');

const allBgms = [bgmAct1, bgmAct2, bgmAct3, bgmAct4];

let mainVideoSourceIndex = 0;
let mainVideoAutoplayRequested = false;

function setVideoFallbackMessage(message) {
    if (!videoFallback) return;
    const msg = videoFallback.querySelector('p');
    if (msg) msg.textContent = message;
    videoFallback.classList.remove('hidden');
}

function loadMainVideoSource(index = 0, autoplay = false) {
    if (!mainVideo) return;
    const sources = ASSETS.mainVideoSources || [ASSETS.mainVideo];
    if (index >= sources.length) {
        setVideoFallbackMessage('主視覺影片載入失敗：已嘗試 Raw、Media 與 GitHub Pages 路徑，請確認檔案可公開讀取。');
        return;
    }
    mainVideoSourceIndex = index;
    mainVideoAutoplayRequested = autoplay;
    videoFallback.classList.add('hidden');
    mainVideo.dataset.sourceIndex = String(index);
    mainVideo.src = sources[index];
    mainVideo.load();
    if (autoplay) {
        setTimeout(() => playMainVisual(), 80);
    }
}

function tryNextMainVideoSource() {
    const nextIndex = mainVideoSourceIndex + 1;
    const sources = ASSETS.mainVideoSources || [ASSETS.mainVideo];
    if (nextIndex < sources.length) {
        loadMainVideoSource(nextIndex, mainVideoAutoplayRequested);
    } else {
        setVideoFallbackMessage('主視覺影片無法顯示：瀏覽器無法讀取目前的 GitHub 影片來源。');
    }
}

async function playMainVisual() {
    if (!mainVideo) return;
    mainVideoAutoplayRequested = true;
    videoFallback.classList.add('hidden');
    if (!mainVideo.getAttribute('src')) loadMainVideoSource(0, false);
    try { mainVideo.currentTime = 0; } catch (e) {}
    mainVideo.volume = 1;
    mainVideo.muted = false;
    try {
        await mainVideo.play();
    } catch (e) {
        // 若瀏覽器阻擋帶聲音播放，改用靜音播放以確保畫面會出現。
        try {
            mainVideo.muted = true;
            await mainVideo.play();
        } catch (mutedError) {
            console.log('主視覺影片播放失敗', mutedError);
            setVideoFallbackMessage('主視覺影片播放失敗：已改用備援路徑，若仍無畫面請確認影片格式或網路權限。');
            tryNextMainVideoSource();
        }
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (mainVideo) {
        mainVideo.addEventListener('loadeddata', () => videoFallback.classList.add('hidden'));
        mainVideo.addEventListener('canplay', () => videoFallback.classList.add('hidden'));
        mainVideo.addEventListener('error', () => tryNextMainVideoSource());
        loadMainVideoSource(0, false);
    }
    if (avatarImg) {
        avatarImg.onerror = () => {
            avatarImg.classList.add('soft-key');
        };
    }
    bgmAct1.src = ASSETS.bgmAct1;
    bgmAct2.src = ASSETS.bgmAct2;
    bgmAct3.src = ASSETS.bgmAct3;
    bgmAct4.src = ASSETS.bgmAct4;
});

function playBGM(audioElement) {
    if(!audioElement) return;
    audioElement.volume = 0;
    audioElement.play().catch(e => console.log('BGM Play Error:', e));
    let vol = 0;
    const fadeIn = setInterval(() => {
        vol += 0.05;
        if (vol >= 0.8) { 
            audioElement.volume = 0.8;
            clearInterval(fadeIn);
        } else {
            audioElement.volume = vol;
        }
    }, 100);
}

function stopBGM(audioElement) {
    if(!audioElement) return;
    let vol = audioElement.volume;
    const fadeOut = setInterval(() => {
        vol -= 0.05;
        if (vol <= 0) {
            audioElement.volume = 0;
            audioElement.pause();
            clearInterval(fadeOut);
        } else {
            audioElement.volume = vol;
        }
    }, 100);
}

function startTrailer() {
    clearInterval(timerInterval);
    if (carouselInterval) { clearInterval(carouselInterval); carouselInterval = null; }

    introScreen.style.opacity = '0';
    trailerOverlay.style.display = 'flex';
    trailerOverlay.classList.add('active');
    videoContainer.style.display = 'flex';
    videoContainer.style.opacity = '1';
    sceneSim.style.display = 'none';
    sceneSim.classList.remove('active');
    subUI.classList.remove('visible');
    progressBar.style.width = '0%';

    if (mainVideo) {
        loadMainVideoSource(0, false);
        requestAnimationFrame(() => playMainVisual());
    }

    allBgms.forEach(bgm => {
        let playPromise = bgm.play();
        if (playPromise !== undefined) {
            playPromise.then(() => {
                bgm.pause();
                bgm.currentTime = 0;
            }).catch(e => console.log('Audio unlock prevented:', e));
        }
    });

    setTimeout(() => {
        introScreen.style.display = 'none';
    }, 650);

    startTimeline();
}

function startTimeline() {
    currentSeconds = 0;
    currentMainScene = '';
    updateUI(); 
    timerInterval = setInterval(() => {
        currentSeconds++;
        updateUI();
        if (currentSeconds >= TOTAL_DURATION) endTrailer();
    }, 1000);
}

function updateUI() {
    const mins = Math.floor(currentSeconds / 60);
    const secs = currentSeconds % 60;
    timerUI.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    progressBar.style.width = `${(currentSeconds / TOTAL_DURATION) * 100}%`;

    const entry = trailerScript.find(e => currentSeconds >= e.start && currentSeconds <= e.end);

    // 第 9 秒音量淡出
    if (currentSeconds === 9 && mainVideo) {
        let vol = 1;
        const fadeOut = setInterval(() => {
            vol -= 0.05;
            if (vol <= 0) { 
                mainVideo.volume = 0; 
                clearInterval(fadeOut); 
            } else { 
                mainVideo.volume = vol; 
            }
        }, 100);
    }

    if (currentSeconds === 17) playBGM(bgmAct1);
    if (currentSeconds === 70) { stopBGM(bgmAct1); playBGM(bgmAct2); }
    if (currentSeconds === 108) { stopBGM(bgmAct2); playBGM(bgmAct3); }
    if (currentSeconds === 153) { stopBGM(bgmAct3); playBGM(bgmAct4); }

    if (currentSeconds === 10) {
        const glow = document.getElementById('blue-glow-ext');
        glow.classList.remove('hidden');
        setTimeout(() => glow.classList.add('active'), 50);
    }
    if (currentSeconds === 11) {
        const blackScreen = document.getElementById('black-transition');
        blackScreen.classList.remove('hidden');
        setTimeout(() => blackScreen.classList.add('active'), 50);
    }
    if (currentSeconds === 12) {
        videoContainer.style.display = 'none';
        sceneSim.style.display = 'flex';
        sceneSim.classList.add('active'); 
        
        if (mainVideo) {
            mainVideo.pause();
            mainVideo.src = "";
            mainVideo.load();
        }
    }
    if (currentSeconds === 13) {
        const blackScreen = document.getElementById('black-transition');
        blackScreen.classList.remove('active');
        setTimeout(() => {
            blackScreen.classList.add('hidden');
            const glow = document.getElementById('blue-glow-ext');
            glow.classList.add('hidden');
            glow.classList.remove('active');
        }, 1000);
    }

    let newScene = '';
    if (currentSeconds >= 12 && currentSeconds <= 16) newScene = 'team'; 
    else if (currentSeconds >= 17 && currentSeconds <= 69) newScene = 'first_segment'; 
    else if (currentSeconds >= 70 && currentSeconds <= 152) newScene = 'gameplay';
    else if (currentSeconds >= 153 && currentSeconds <= 185) newScene = 'eco_carousel'; 
    else if (currentSeconds >= 186) newScene = 'logo';

    if (currentMainScene !== newScene) {
        currentMainScene = newScene;
        renderSceneLayout(newScene);
    }

    if (currentMainScene === 'first_segment') updateFirstSegmentBackground(entry);
    if (currentMainScene === 'gameplay') updateGamePanel();

    if (entry && entry.char) {
        showSubtitle(entry.char, entry.text, entry.effect, entry.avatar);
    } else {
        hideSubtitle();
    }
}

function updateFirstSegmentBackground(entry) {
    if (!entry || !entry.bg) return;
    const bg = document.getElementById('scripted-bg');
    const caption = document.getElementById('scene-caption');
    if (!bg) return;

    const src = ASSETS.backgrounds[entry.bg];
    if (src && bg.dataset.bg !== entry.bg) {
        bg.dataset.bg = entry.bg;
        bg.style.backgroundImage = `url('${src}')`;
        bg.classList.remove('bg-pulse');
        requestAnimationFrame(() => bg.classList.add('bg-pulse'));
    }
    if (caption) {
        caption.textContent = entry.sceneLabel ? `背景：${entry.sceneLabel}` : '第一大段：議題交代爭議與故事背景';
    }
}

function startCarousel(images) {
    const container = document.createElement('div');
    container.className = 'carousel-container';
    images.forEach((src, index) => {
        const slide = document.createElement('div');
        slide.className = `carousel-slide ${index === 0 ? 'active' : ''}`;
        slide.style.backgroundImage = `url('${src}')`;
        slide.style.animationDelay = `${index * -5}s`; 
        container.appendChild(slide);
    });
    sceneSim.appendChild(container);

    let currentIndex = 0;
    const slides = container.querySelectorAll('.carousel-slide');
    carouselInterval = setInterval(() => {
        slides[currentIndex].classList.remove('active');
        currentIndex = (currentIndex + 1) % slides.length;
        slides[currentIndex].classList.add('active');
    }, 6000);
}

    } else { 
        html = `<h3 class="text-3xl font-black text-purple-400 mb-6 tracking-widest border-b border-purple-400/30 pb-4">終章：生存契約</h3><p class="text-[1.1rem] text-slate-300 leading-loose font-medium">數據已就緒，人心已澄澈。站在歷史的分水嶺，由你來決定這片土地最終的色彩，完成對家園最後的承諾。</p>`;
    }

    if (panel.innerHTML !== html) {
        panel.innerHTML = html;
        panel.style.opacity = '0.5';
        setTimeout(() => panel.style.opacity = '1', 100);
    }
}

const avatarCutoutCache = new Map();

function median(values) {
    if (!values.length) return 255;
    values.sort((a, b) => a - b);
    return values[Math.floor(values.length / 2)];
}

function estimateEdgeBackground(data, w, h) {
    const rs = [], gs = [], bs = [];
    const padX = Math.max(4, Math.floor(w * 0.06));
    const padY = Math.max(4, Math.floor(h * 0.06));
    const step = Math.max(1, Math.floor(Math.max(w, h) / 160));
    const regions = [
        [0, 0, padX, padY],
        [w - padX, 0, w, padY],
        [0, h - padY, padX, h],
        [w - padX, h - padY, w, h]
    ];
    regions.forEach(([x1, y1, x2, y2]) => {
        for (let y = y1; y < y2; y += step) {
            for (let x = x1; x < x2; x += step) {
                const i = (y * w + x) * 4;
                rs.push(data[i]); gs.push(data[i + 1]); bs.push(data[i + 2]);
            }
        }
    });
    return { r: median(rs), g: median(gs), b: median(bs) };
}

function colorDistToBg(data, i, bg) {
    const dr = data[i] - bg.r;
    const dg = data[i + 1] - bg.g;
    const db = data[i + 2] - bg.b;
    return Math.sqrt(dr * dr + dg * dg + db * db);
}

function looksLikeBackground(data, i, bg, relaxed = false) {
    const r = data[i], g = data[i + 1], b = data[i + 2];
    const max = Math.max(r, g, b);
    const min = Math.min(r, g, b);
    const brightness = (r + g + b) / 3;
    const saturation = max - min;
    const bgBrightness = (bg.r + bg.g + bg.b) / 3;
    const dist = colorDistToBg(data, i, bg);
    const baseTolerance = relaxed ? 92 : 62;
    const brightKey = bgBrightness > 190 && brightness > (relaxed ? 210 : 225) && saturation < (relaxed ? 58 : 42);
    return dist < baseTolerance || brightKey;
}

function removeAvatarBackground(src) {
    if (avatarCutoutCache.has(src)) return Promise.resolve(avatarCutoutCache.get(src));
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
            const maxSide = 860;
            const scale = Math.min(1, maxSide / Math.max(img.naturalWidth, img.naturalHeight));
            const w = Math.max(1, Math.round(img.naturalWidth * scale));
            const h = Math.max(1, Math.round(img.naturalHeight * scale));
            const canvas = document.createElement('canvas');
            canvas.width = w;
            canvas.height = h;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            ctx.drawImage(img, 0, 0, w, h);

            let imageData;
            try {
                imageData = ctx.getImageData(0, 0, w, h);
            } catch (e) {
                reject(e);
                return;
            }
            const data = imageData.data;
            const bg = estimateEdgeBackground(data, w, h);
            const mask = new Uint8Array(w * h);
            const visited = new Uint8Array(w * h);
            const queue = new Int32Array(w * h);
            let head = 0, tail = 0;

            const tryPush = (p) => {
                if (visited[p]) return;
                visited[p] = 1;
                if (looksLikeBackground(data, p * 4, bg, false)) {
                    mask[p] = 1;
                    queue[tail++] = p;
                }
            };

            for (let x = 0; x < w; x++) {
                tryPush(x);
                tryPush((h - 1) * w + x);
            }
            for (let y = 0; y < h; y++) {
                tryPush(y * w);
                tryPush(y * w + (w - 1));
            }

            while (head < tail) {
                const p = queue[head++];
                const x = p % w;
                const y = Math.floor(p / w);
                if (x > 0) tryPush(p - 1);
                if (x < w - 1) tryPush(p + 1);
                if (y > 0) tryPush(p - w);
                if (y < h - 1) tryPush(p + w);
            }

            for (let p = 0; p < mask.length; p++) {
                const i = p * 4;
                if (mask[p]) {
                    data[i + 3] = 0;
                }
            }

            // 邊緣羽化：讓白底鋸齒不會留下明顯外框。
            const alphaCopy = new Uint8ClampedArray(w * h);
            for (let p = 0; p < mask.length; p++) alphaCopy[p] = data[p * 4 + 3];
            for (let y = 1; y < h - 1; y++) {
                for (let x = 1; x < w - 1; x++) {
                    const p = y * w + x;
                    if (mask[p]) continue;
                    const i = p * 4;
                    const touchesMask = mask[p - 1] || mask[p + 1] || mask[p - w] || mask[p + w];
                    if (touchesMask && looksLikeBackground(data, i, bg, true)) {
                        alphaCopy[p] = Math.round(alphaCopy[p] * 0.25);
                    }
                }
            }
            for (let p = 0; p < mask.length; p++) data[p * 4 + 3] = alphaCopy[p];

            ctx.putImageData(imageData, 0, 0);
            const out = canvas.toDataURL('image/png');
            avatarCutoutCache.set(src, out);
            resolve(out);
        };
        img.onerror = reject;
        img.src = src;
    });
}

function applyAvatarImage(avatar) {
    if (!avatar || !avatarImg || !avatarWrap) {
        if (avatarImg) avatarImg.removeAttribute('src');
        if (avatarWrap) avatarWrap.classList.add('hidden');
        return;
    }
    if (avatarImg.dataset.originalSrc === avatar.src && !avatarWrap.classList.contains('hidden')) return;

    avatarImg.dataset.originalSrc = avatar.src;
    avatarImg.alt = avatar.alt || '';
    avatarImg.classList.remove('cutout-ready');
    avatarImg.classList.add('is-processing', 'soft-key');
    avatarImg.src = avatar.src;
    avatarWrap.classList.remove('hidden');

    removeAvatarBackground(avatar.src).then(processedSrc => {
        if (avatarImg.dataset.originalSrc !== avatar.src) return;
        avatarImg.src = processedSrc;
        avatarImg.classList.remove('is-processing', 'soft-key');
        avatarImg.classList.add('cutout-ready');
    }).catch(() => {
        if (avatarImg.dataset.originalSrc !== avatar.src) return;
        avatarImg.src = avatar.src;
        avatarImg.classList.remove('is-processing');
        avatarImg.classList.add('soft-key');
    });
}

function getCharacterAvatar(character, avatarKey) {
    if (avatarKey && ASSETS.characters[avatarKey]) {
        return { src: ASSETS.characters[avatarKey], alt: avatarKey };
    }
    if (character.includes('阿文伯')) {
        return { src: ASSETS.characters.wenStand, alt: '角色01-阿文伯' };
    }
    if (character.includes('阿美') || character.includes('小美')) {
        return { src: ASSETS.characters.meiNormal, alt: '角色02-阿美' };
    }
    if (character.includes('小慧')) {
        return { src: ASSETS.characters.huiNormal, alt: '角色03-小慧' };
    }
    return null;
}

function showSubtitle(character, textHtml, effectClass, avatarKey) {
    let charColor = 'var(--char-nar)';
    if (character.includes('阿文伯')) charColor = 'var(--char-wen)';
    else if (character.includes('阿美') || character.includes('小美')) charColor = 'var(--char-mei)';
    else if (character.includes('小慧')) charColor = 'var(--char-hui)';

    const avatar = getCharacterAvatar(character, avatarKey);
    applyAvatarImage(avatar);

    charUI.innerText = character;
    charUI.style.color = charColor;
    subUI.style.borderLeftColor = charColor;
    textUI.className = `sub-text ${effectClass || ''}`;
    textUI.innerHTML = textHtml; 
    
    if (!subUI.classList.contains('visible')) {
        subUI.classList.remove('hidden');
        setTimeout(() => subUI.classList.add('visible'), 50);
    }
}

function hideSubtitle() {
    subUI.classList.remove('visible');
}

function endTrailer() {
    clearInterval(timerInterval);
    if (carouselInterval) clearInterval(carouselInterval);
    trailerOverlay.classList.remove('active');
    
    if (mainVideo) {
        mainVideo.pause();
    }

    allBgms.forEach(bgm => {
        stopBGM(bgm);
        setTimeout(() => { bgm.currentTime = 0; }, 500);
    });

    const blackScreen = document.getElementById('black-transition');
    const glow = document.getElementById('blue-glow-ext');
    if(blackScreen) { blackScreen.classList.remove('active'); blackScreen.classList.add('hidden'); }
    if(glow) { glow.classList.remove('active'); glow.classList.add('hidden'); }
    
    setTimeout(() => {
        trailerOverlay.style.display = 'none';
        videoContainer.style.display = 'flex';
        videoContainer.style.opacity = '1';
        sceneSim.style.display = 'none';
        sceneSim.classList.remove('active');
        subUI.classList.remove('visible');
        if (mainVideo) loadMainVideoSource(0, false);
        
        introScreen.style.display = 'flex';
        setTimeout(() => introScreen.style.opacity = '1', 50);
    }, 1000);
}
